        const pendingJobs = (jobs||[]).filter(j => j.status !== "completed" && j.type === diaryTab);
        if (pendingJobs.length === 0) return null;
        return (
          <div style={{background:"#fffdf5",border:"1px solid #c17f2422",borderRadius:10,padding:"8px 12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:"#c17f24",textTransform:"uppercase"}}>Pending Jobs ({pendingJobs.length})</div>
              <div style={{fontSize:9,color:"#94a394"}}>Created from programme tabs. Click to start recording.</div>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {pendingJobs.map(j => {
                const fCount = (j.fieldIds||[]).length;
                const fNames = (j.fieldIds||[]).slice(0,3).map(fid => fields.find(f=>f.id===fid)?.name||"").filter(Boolean).join(", ");
                const statusCol = j.status==="in-progress"?"#2c6e3f":"#c17f24";
                return (
                  <div key={j.id} style={{position:"relative",display:"inline-block"}}>
                    <button onClick={() => { if(diaryTab!==j.type) setDiaryTab(j.type); addFromJob(j); }}
                      style={{padding:"6px 12px",fontSize:10,borderRadius:8,border:`1px solid ${statusCol}22`,cursor:"pointer",textAlign:"left",
                        background:j.status==="in-progress"?"#2c6e3f08":"#fff",color:"#1a2e1a",maxWidth:280}}>
                      <div style={{fontWeight:700,fontSize:11,color:statusCol,marginBottom:2}}>{j.label}</div>
                      <div style={{fontSize:9,color:"#6b7b6b"}}>{j.description?.slice(0,60)}{j.description?.length>60?"…":""}</div>
                      <div style={{fontSize:9,color:"#94a394",marginTop:1}}>{fCount} field{fCount!==1?"s":""}{fNames?` · ${fNames}`:""}{fCount>3?"…":""}</div>
                      {j.status==="in-progress" && <div style={{fontSize:8,color:"#2c6e3f",fontWeight:700,marginTop:2}}>IN PROGRESS</div>}
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); if(confirm("Delete this pending job?")) setJobs(prev => (prev||[]).filter(job => job.id !== j.id)); }}
                      style={{position:"absolute",top:-2,right:-2,width:24,height:24,padding:0,borderRadius:"50%",background:"#c0392b",color:"#fff",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Toolbar */}

        if (viewMode==="grid" && !isOpen) {
          // Google Keep style card
          return (
            <div key={r.id} onClick={()=>setEditId(r.id)} style={{background:r.pinned?"#fffdf5":"#fff",border:`1px solid ${r.pinned?"#c17f2433":"#e2e6de"}`,borderRadius:12,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderTop:`3px solid ${activeType.color}`,position:"relative",minHeight:80}}>
              {r.pinned && <span style={{position:"absolute",top:4,right:6,fontSize:12}}>📌</span>}
              <div style={{fontSize:11,fontWeight:600,color:"#1a2e1a",marginBottom:3}}>{r.date}</div>
              <div style={{fontSize:12,marginBottom:4}}>{summaryLine(r)}</div>
              {fNames && <div style={{fontSize:9,color:"#94a394",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fNames}</div>}
              {r.notes && <div style={{fontSize:9,color:"#6b7b6b",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{r.notes}</div>}
              {(r.attachments||[]).length>0 && <span style={{fontSize:9,color:"#4a7c59"}}>📎 {r.attachments.length}</span>}
              {r.jobId && <span style={{fontSize:8,color:"#c17f24",marginLeft:4}}>From job</span>}
            </div>
          );
        }
        // List/expanded view
        return (
          <div key={r.id} style={{background:r.pinned?"#fffdf5":"#fff",border:`1px solid ${r.pinned?"#c17f2433":"#e2e6de"}`,borderRadius:10,padding:isOpen?"14px":"8px 14px",marginBottom:viewMode==="grid"?0:4,boxShadow:"0 1px 2px rgba(0,0,0,0.03)",borderLeft:`3px solid ${activeType.color}`,transition:"padding 0.15s",gridColumn:isOpen&&viewMode==="grid"?"1 / -1":"auto"}}>
            <div onClick={()=>setEditId(isOpen?null:r.id)} style={{display:"flex",gap:8,alignItems:"center",cursor:"pointer",flexWrap:"wrap"}}>
              {r.pinned && <span style={{fontSize:11}}>📌</span>}
              <span style={{fontSize:12,fontWeight:600,color:"#1a2e1a",minWidth:80}}>{r.date}</span>
              <span style={{flex:"1 1 auto",fontSize:12}}>{summaryLine(r)}</span>
              <span style={{fontSize:10,color:"#94a394",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fNames}</span>
              <span style={{fontSize:10,color:"#d4dace"}}>{isOpen?"▼":"▶"}</span>
            </div>
            {isOpen && (
              <div>
                {renderForm(r)}
                <div style={{display:"flex",gap:4,marginTop:8,borderTop:"1px solid #f0f2ee",paddingTop:6,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={(e)=>{e.stopPropagation();pinRec(r.id);}} style={{padding:"4px 10px",fontSize:10,background:r.pinned?"#c17f2410":"#f0f2ee",color:r.pinned?"#c17f24":"#6b7b6b",border:"none",borderRadius:6,cursor:"pointer"}}>{r.pinned?"📌 Unpin":"📌 Pin"}</button>
                  {r.jobId && (() => {
                    const job = (jobs||[]).find(j => j.id === r.jobId);
                    const done = job?.status === "completed";
                    return (
                      <button onClick={() => { if(!done) completeJob(r.jobId); }} style={{padding:"4px 12px",fontSize:10,fontWeight:700,background:done?"#2c6e3f10":"#2c6e3f",color:done?"#2c6e3f":"#fff",border:"none",borderRadius:6,cursor:done?"default":"pointer"}}>
                        {done ? "✓ Job Complete" : "Mark Job Complete"}
                      </button>
                    );
                  })()}
                  {r.jobId && <span style={{fontSize:9,color:"#94a394"}}>From: {(jobs||[]).find(j=>j.id===r.jobId)?.label || "Job"}</span>}
                  <button onClick={()=>dupRec(r.id)} style={{padding:"4px 10px",fontSize:10,background:"#f0f2ee",color:"#6b7b6b",border:"none",borderRadius:6,cursor:"pointer",marginLeft:r.jobId?"auto":0}}>Duplicate</button>
                  <button onClick={()=>rmRec(r.id)} style={{padding:"4px 10px",fontSize:10,background:"none",color:"#c0392b55",border:"none",borderRadius:6,cursor:"pointer"}}>Delete</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
      </div>
      {filtered.length === 0 && <div style={{padding:24,textAlign:"center",color:"#94a394",fontSize:12}}>No {activeType.label.toLowerCase()} records{filterField!=="all"||filterDateFrom?" matching filters":""}. Click "+ New {activeType.label}" to start.</div>}
      </>
      )}
    </div>
  );
};

// ─── T-SUM / GROWTH STAGE TRACKER ─────────────────────────────────────────
const TSumTracker = ({fields}) => {
  const [entries, setEntries] = useState([]);
  const [startDate, setStartDate] = useState(() => {
    const d = new Date(); d.setMonth(d.getMonth() - 2);
    return d.toISOString().split("T")[0];
  });
  const [baseTemp, setBaseTemp] = useState(0);
  const [mode, setMode] = useState("tsum"); // "tsum" | "blackgrass" | "custom"
  const [dailyTemps, setDailyTemps] = useState([]);
  const [location, setLocation] = useState("NE England");

  // Preset modes
  const modes = [
    {id:"tsum",label:"T-Sum 200 (Spring N)",base:0,target:200,desc:"Accumulated day-degrees above 0°C from 1st Jan. At T-Sum 200, apply first nitrogen. Typical target: late Feb–mid Mar in the North."},
    {id:"blackgrass",label:"Blackgrass Germination",base:6,target:150,desc:"Accumulated day-degrees above 6°C from drilling. Key for pre-em timing and stale seedbed decisions."},
    {id:"gdd_wheat",label:"Wheat Growth Stages",base:0,target:1100,desc:"General wheat thermal time accumulation. ~400 = GS30 (stem extension), ~700 = GS39 (flag leaf), ~1100 = GS61 (flowering)."},
    {id:"custom",label:"Custom",base:0,target:200,desc:"Set your own base temperature and target."},
  ];

  const activeMode = modes.find(m => m.id === mode) || modes[0];

  useEffect(() => {
    if (mode !== "custom") setBaseTemp(activeMode.base);
  }, [mode]);

  const addTemp = () => {
    const today = new Date().toISOString().split("T")[0];
    setDailyTemps(p => [...p, {date: today, min: "", max: ""}]);
  };
  const upTemp = (i, f, v) => setDailyTemps(p => p.map((t, j) => j === i ? {...t, [f]: v} : t));
  const rmTemp = (i) => setDailyTemps(p => p.filter((_, j) => j !== i));

  // Calculate T-Sum
  const sorted = [...dailyTemps].sort((a, b) => a.date.localeCompare(b.date));
  let tsum = 0;
  const accum = sorted.map(d => {
    const min = parseFloat(d.min);
    const max = parseFloat(d.max);
    if (isNaN(min) || isNaN(max)) return {...d, avg: null, dd: 0, tsum};
    const avg = (min + max) / 2;
    const dd = Math.max(0, avg - baseTemp);
    tsum += dd;
    return {...d, avg: avg.toFixed(1), dd: dd.toFixed(1), tsum: tsum.toFixed(0)};
  });

  const target = mode === "custom" ? 200 : activeMode.target;
  const pct = target > 0 ? Math.min(100, (tsum / target) * 100) : 0;

  // Milestones for wheat GDD
  const milestones = mode === "gdd_wheat" ? [
    {val:200,label:"T-Sum 200 — 1st N",color:"#4a7c59"},
    {val:400,label:"~GS30 Stem ext.",color:"#2c6e3f"},
    {val:550,label:"~GS31-32 T1 timing",color:"#c17f24"},
    {val:700,label:"~GS39 Flag leaf",color:"#c17f24"},
    {val:900,label:"~GS55 T3 timing",color:"#b8922a"},
    {val:1100,label:"~GS61 Flowering",color:"#c0392b"},
  ] : mode === "tsum" ? [
    {val:100,label:"100 — soil warming",color:"#4a7c59"},
    {val:200,label:"200 — 1st N timing",color:"#2c6e3f"},
    {val:300,label:"300 — late 1st N",color:"#c17f24"},
  ] : mode === "blackgrass" ? [
    {val:50,label:"50 — early flush",color:"#4a7c59"},
    {val:100,label:"100 — main flush",color:"#c17f24"},
    {val:150,label:"150 — most germinated",color:"#c0392b"},
  ] : [];

  // Generate sample data from start date
  const genSample = () => {
    const start = new Date(startDate);
    const end = new Date();
    const temps = [];
    let d = new Date(start);
    while (d <= end) {
      const month = d.getMonth();
      // Rough UK NE averages by month
      const baseMin = [-1,0,1,3,6,9,11,11,8,5,2,0][month];
      const baseMax = [5,6,9,12,15,18,20,20,17,13,8,6][month];
      const jitter = () => (Math.random() - 0.5) * 4;
      temps.push({
        date: d.toISOString().split("T")[0],
        min: (baseMin + jitter()).toFixed(1),
        max: (baseMax + jitter()).toFixed(1),
      });
      d.setDate(d.getDate() + 1);
    }
    setDailyTemps(temps);
  };

  return (
    <div>
      {/* Mode selector */}
      <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Thermal Time Tracker</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
          {modes.map(m => (
            <button key={m.id} onClick={() => setMode(m.id)} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",
              background:mode===m.id?"#2c6e3f":"#f0f2ee",color:mode===m.id?"#fff":"#6b7b6b"}}>{m.label}</button>
          ))}
        </div>
        <div style={{fontSize:11,color:"#6b7b6b",padding:"8px 12px",background:"#f7f8f6",borderRadius:8,marginBottom:8,lineHeight:1.5}}>
          {activeMode.desc}
          {mode === "custom" && (
            <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
              <span style={{fontSize:10}}>Base temp:</span>
              <NumInput value={baseTemp} onChange={v => setBaseTemp(v)} w={40} />
              <span style={{fontSize:10}}>°C</span>
            </div>
          )}
        </div>

        {/* Progress bar */}
        <div style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
            <span style={{fontSize:20,fontWeight:700,color:tsum>=target?"#c0392b":"#2c6e3f"}}>{tsum.toFixed(0)} day-degrees</span>
            <span style={{fontSize:11,color:"#94a394"}}>Target: {target} ({pct.toFixed(0)}%)</span>
          </div>
          <div style={{height:10,background:"#e2e6de",borderRadius:5,overflow:"hidden",position:"relative"}}>
            <div style={{height:"100%",background:tsum>=target?"#c0392b":"linear-gradient(90deg,#4a7c59,#2c6e3f)",borderRadius:5,width:`${pct}%`,transition:"width 0.3s"}} />
            {milestones.map(m => (
              <div key={m.val} style={{position:"absolute",top:0,left:`${Math.min(100,(m.val/target)*100)}%`,width:2,height:10,background:m.color,opacity:0.6}} />
            ))}
          </div>
          {/* Milestone labels */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}>
            {milestones.map(m => (
              <span key={m.val} style={{fontSize:9,color:tsum>=m.val?m.color:"#94a394",fontWeight:tsum>=m.val?700:400,padding:"2px 6px",background:tsum>=m.val?m.color+"10":"transparent",borderRadius:4}}>
                {tsum>=m.val?"✓ ":""}{m.label}
              </span>
            ))}
          </div>
        </div>
      </div>

      {/* Temperature data entry */}
      <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase"}}>Daily Temperatures</div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <div style={{fontSize:10,color:"#6b7b6b"}}>From:</div>
            <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} style={{...TI,fontSize:10,width:110,padding:"3px 6px"}} />
            <button onClick={genSample} style={{padding:"5px 12px",fontSize:10,fontWeight:600,background:"#c17f240a",color:"#c17f24",border:"none",borderRadius:8,cursor:"pointer"}}>Generate sample data</button>
            <button onClick={addTemp} style={{padding:"5px 12px",fontSize:10,fontWeight:600,background:"#2c6e3f",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>+ Add Day</button>
          </div>
        </div>
        <div style={{fontSize:10,color:"#94a394",marginBottom:8}}>Enter daily min/max temperatures from your weather station, Met Office, or farm records. "Generate sample data" creates approximate NE England averages for testing — replace with real readings for accuracy.</div>

        {dailyTemps.length > 0 && (
          <div style={{maxHeight:300,overflowY:"auto",borderRadius:8,border:"1px solid #e2e6de"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr style={{background:"#f7f8f6",position:"sticky",top:0}}>
                {["Date","Min °C","Max °C","Avg °C","Day-deg","Accum",""].map(h => <th key={h} style={{padding:"4px 6px",textAlign:h==="Date"?"left":"center",fontSize:10,color:"#6b7b6b",fontWeight:600}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {accum.map((d, i) => (
                  <tr key={i} style={{borderBottom:"1px solid #f0f2ee",background:+d.tsum>=target?"#c0392b06":"transparent"}}>
                    <td style={{padding:"3px 6px"}}><input type="date" value={d.date} onChange={e=>upTemp(i,"date",e.target.value)} style={{...TI,fontSize:10,width:105,padding:"1px 3px"}} /></td>
                    <td style={{padding:"3px 6px",textAlign:"center"}}><NumInput value={d.min} onChange={v=>upTemp(i,"min",v)} w={40} /></td>
                    <td style={{padding:"3px 6px",textAlign:"center"}}><NumInput value={d.max} onChange={v=>upTemp(i,"max",v)} w={40} /></td>
                    <td style={{padding:"3px 6px",textAlign:"center",color:"#6b7b6b"}}>{d.avg || "—"}</td>
                    <td style={{padding:"3px 6px",textAlign:"center",fontWeight:600,color:+d.dd>0?"#2c6e3f":"#94a394"}}>+{d.dd}</td>
                    <td style={{padding:"3px 6px",textAlign:"center",fontWeight:700,color:+d.tsum>=target?"#c0392b":"#2c6e3f"}}>{d.tsum}</td>
                    <td style={{padding:"3px 6px",textAlign:"center"}}><button onClick={()=>rmTemp(i)} style={{background:"none",border:"none",color:"#c0392b33",cursor:"pointer",fontSize:10}}>×</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {/* Chart */}
        {accum.length > 3 && (
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,fontWeight:600,color:"#6b7b6b",marginBottom:4}}>Accumulation curve</div>
            <svg viewBox={`0 0 ${Math.max(accum.length*4+20,200)} 140`} style={{width:"100%",height:140,background:"#f7f8f6",borderRadius:8}}>
              {/* Target line */}
              <line x1={10} y1={Math.max(5,130-target/Math.max(tsum,target,1)*120)} x2={accum.length*4+10} y2={Math.max(5,130-target/Math.max(tsum,target,1)*120)} stroke="#c0392b" strokeWidth={1} strokeDasharray="4,3" opacity={0.5} />
              <text x={accum.length*4+12} y={Math.max(12,130-target/Math.max(tsum,target,1)*120+3)} fontSize={8} fill="#c0392b">Target {target}</text>
              {/* Milestone lines */}
              {milestones.map(m => {
                const my = Math.max(5,130-m.val/Math.max(tsum,target,1)*120);
                return <line key={m.val} x1={10} y1={my} x2={accum.length*4+10} y2={my} stroke={m.color} strokeWidth={0.5} strokeDasharray="2,4" opacity={0.4} />;
              })}
              {/* Accumulation line */}
              <polyline fill="none" stroke="#2c6e3f" strokeWidth={2}
                points={accum.map((d,i) => `${i*4+10},${130-(+d.tsum)/Math.max(tsum,target,1)*120}`).join(" ")} />
              {/* Current point */}
              {accum.length > 0 && (() => {
                const last = accum[accum.length-1];
                const x = (accum.length-1)*4+10;
                const y = 130-(+last.tsum)/Math.max(tsum,target,1)*120;
                return <circle cx={x} cy={y} r={4} fill="#2c6e3f" stroke="#fff" strokeWidth={2} />;
              })()}
            </svg>
          </div>
        )}
      </div>

      {dailyTemps.length === 0 && (
        <div style={{padding:24,textAlign:"center",color:"#94a394",fontSize:12}}>
          Add daily temperature readings or click "Generate sample data" to see how thermal time accumulates. Replace sample data with real readings from your weather station for accurate decision support.
        </div>
      )}
    </div>
  );
};

const SeedCalc = ({fields, saved, onSave}) => {
  const [crop, setCrop] = useState(saved?.crop || "w_wheat");
  const [variety, setVariety] = useState(saved?.variety || "");
  const [seedsM2, setSeedsM2] = useState(saved?.seedsM2 || 0);
  const [tgw, setTgw] = useState(saved?.tgw || 0);
  const [germPc, setGermPc] = useState(saved?.germPc || 95);
  const [taggedFields, setTaggedFields] = useState(saved?.taggedFields || []);
  const [seedTickets, setSeedTickets] = useState(saved?.seedTickets || []);
  useEffect(() => { if(onSave) onSave({crop, variety, seedsM2, tgw, germPc, taggedFields, seedTickets}); }, [crop, variety, seedsM2, tgw, germPc, taggedFields, seedTickets]);

  const addTicket = (file) => {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) { alert("File too large (max 8MB)"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      setSeedTickets(p => [...p, {
        id: Date.now(), name: file.name, type: file.type, size: file.size,
        data: e.target.result, addedDate: new Date().toISOString().split("T")[0],
        variety: variety || "", crop: crop || "", notes: "",
      }]);
    };
    reader.readAsDataURL(file);
  };
  const rmTicket = (id) => setSeedTickets(p => p.filter(t => t.id !== id));
  const upTicket = (id, f, v) => setSeedTickets(p => p.map(t => t.id === id ? {...t, [f]: v} : t));
  const viewTicket = (t) => {
    const w = window.open("", "_blank");
    if (w) {
      if (t.type === "application/pdf") {
        w.document.write(`<html><head><title>${t.name}</title></head><body style="margin:0"><iframe src="${t.data}" style="width:100%;height:100vh;border:none"></iframe></body></html>`);
      } else {
        w.document.write(`<html><head><title>${t.name}</title></head><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a2e1a"><img src="${t.data}" style="max-width:100%;max-height:100vh;object-fit:contain" /></body></html>`);
      }
      w.document.close();
    }
  };

  const cropLabel = {"w_wheat":"Winter Wheat","s_wheat":"Spring Wheat","w_barley":"Winter Barley","s_barley":"Spring Barley","w_osr":"Winter OSR"};
  const vars = VARIETIES[crop] || [];

  const selectVariety = (v) => {
    setVariety(v.name);
    setTgw(v.tgw);
    setSeedsM2(v.seedRate);
  };

  const kgHa = germPc > 0 ? (seedsM2 * tgw) / (germPc / 100) / 100 : 0;
  const stAc = kgHa / 6.35029 / 2.47105; // kg/ha to stones/ac
  const taggedHa = taggedFields.reduce((s, id) => s + (fields.find(f => f.id === id)?.ha || 0), 0);
  const totalKg = kgHa * taggedHa;
  const totalT = totalKg / 1000;

  const CS = {padding: "8px 12px", background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.04)"};

  return (
    <div>
      {/* Crop selector */}
      <div style={{display: "flex", gap: 4, marginBottom: 12, flexWrap: "wrap"}}>
        {Object.entries(cropLabel).map(([id, label]) => (
          <button key={id} onClick={() => { setCrop(id); setVariety(""); setSeedsM2(VARIETIES[id]?.[0]?.seedRate || 0); setTgw(VARIETIES[id]?.[0]?.tgw || 0); }} style={{padding: "6px 16px", fontSize: 12, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
            background: crop === id ? "#2c6e3f" : "#f0f2ee", color: crop === id ? "#fff" : "#6b7b6b"}}>{label}</button>
        ))}
      </div>

      {/* Variety selection */}
      <div style={{...CS, marginBottom: 12}}>
        <div style={{fontSize: 12, fontWeight: 600, color: "#6b7b6b", marginBottom: 8}}>AHDB Recommended List — {cropLabel[crop]}</div>
        <div style={{display: "flex", gap: 4, flexWrap: "wrap"}}>
          {vars.map(v => (
            <button key={v.name} onClick={() => selectVariety(v)} style={{padding: "6px 12px", fontSize: 11, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s", textAlign: "left",
              background: variety === v.name ? "#2c6e3f0f" : "#f7f8f6", color: variety === v.name ? "#2c6e3f" : "#3a4a3a"}}>
              <div style={{fontWeight: 600}}>{v.name}</div>
              <div style={{fontSize: 10, color: "#6b7b6b"}}>{v.type} · TGW {v.tgw}g</div>
            </button>
          ))}
        </div>
        {variety && <div style={{fontSize: 11, color: "#94a394", marginTop: 6, fontStyle: "italic"}}>{vars.find(v=>v.name===variety)?.note}</div>}
      </div>

      {/* Calculator */}
      <div style={{...CS, marginBottom: 12}}>
        <div style={{fontSize: 12, fontWeight: 600, color: "#6b7b6b", marginBottom: 8}}>SEED RATE CALCULATOR</div>
        <div style={{display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-end"}}>
          <div>
            <div style={{fontSize: 11, color: "#6b7b6b", marginBottom: 3}}>Seeds/m²</div>
            <NumInput value={seedsM2} onChange={setSeedsM2} w={70} />
          </div>
          <div>
            <div style={{fontSize: 11, color: "#6b7b6b", marginBottom: 3}}>TGW (g)</div>
            <NumInput value={tgw} onChange={setTgw} w={60} />
          </div>
          <div>
            <div style={{fontSize: 11, color: "#6b7b6b", marginBottom: 3}}>Germ %</div>
            <NumInput value={germPc} onChange={setGermPc} w={55} />
          </div>
          <div style={{fontSize: 11, color: "#94a394", padding: "4px 0"}}>
            (seeds/m² × TGW) ÷ (germ% ÷ 100) ÷ 100
          </div>
        </div>
        {kgHa > 0 && (
          <div style={{display: "flex", gap: 12, marginTop: 12, flexWrap: "wrap"}}>
            <div style={{padding: "10px 16px", background: "#2c6e3f08", borderRadius: 8, textAlign: "center"}}>
              <div style={{fontSize: 11, color: "#6b7b6b"}}>kg/ha</div>
              <div style={{fontSize: 20, fontWeight: 700, color: "#2c6e3f"}}>{kgHa.toFixed(1)}</div>
            </div>
            <div style={{padding: "10px 16px", background: "#c17f240a", borderRadius: 8, textAlign: "center"}}>
              <div style={{fontSize: 11, color: "#6b7b6b"}}>stones/ac</div>
              <div style={{fontSize: 20, fontWeight: 700, color: "#c17f24"}}>{stAc.toFixed(1)}</div>
            </div>
          </div>
        )}
      </div>

      {/* Field tagging for total */}
      {fields.length > 0 && kgHa > 0 && (
        <div style={{...CS}}>
          <div style={{fontSize: 12, fontWeight: 600, color: "#6b7b6b", marginBottom: 6}}>TOTAL SEED REQUIRED</div>
          <FieldTag fields={fields} selectedIds={taggedFields} onChange={setTaggedFields} label={"Calculate seed for"} />
          {taggedHa > 0 && (
            <div style={{display: "flex", gap: 12, marginTop: 10, flexWrap: "wrap"}}>
              <div style={{padding: "10px 16px", background: "#4a7c590a", borderRadius: 8}}>
                <div style={{fontSize: 11, color: "#6b7b6b"}}>{taggedHa.toFixed(1)} ha @ {kgHa.toFixed(1)} kg/ha</div>
                <div style={{fontSize: 20, fontWeight: 700, color: "#4a7c59"}}>{totalT.toFixed(2)} tonnes ({totalKg.toFixed(0)} kg)</div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Seed Bag Tickets */}
      <div style={{...CS, marginTop: 12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:"#6b7b6b"}}>SEED BAG TICKETS</div>
            <div style={{fontSize:10,color:"#94a394"}}>Upload photos of seed labels for traceability and regulatory records</div>
          </div>
          <label style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:"#2c6e3f",color:"#fff",borderRadius:8,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
            <span>📷</span> Add ticket
            <input type="file" accept="image/*,.pdf" capture="environment" onChange={e => {if(e.target.files[0]) addTicket(e.target.files[0]); e.target.value="";}} style={{display:"none"}} />
          </label>
        </div>

        {seedTickets.length > 0 ? (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8}}>
            {seedTickets.map(t => {
              const isImg = t.type?.startsWith("image/");
              return (
                <div key={t.id} style={{background:"#f7f8f6",borderRadius:8,overflow:"hidden",border:"1px solid #e2e6de"}}>
                  {/* Preview */}
                  <div onClick={()=>viewTicket(t)} style={{cursor:"pointer",height:140,display:"flex",alignItems:"center",justifyContent:"center",background:"#e2e6de",position:"relative"}}>
                    {isImg ? (
                      <img src={t.data} style={{width:"100%",height:"100%",objectFit:"cover"}} />
                    ) : (
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:32}}>📄</div>
                        <div style={{fontSize:10,color:"#6b7b6b"}}>PDF</div>
                      </div>
                    )}
                    <div style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.5)",color:"#fff",fontSize:8,padding:"2px 6px",borderRadius:4}}>Tap to view</div>
                  </div>
                  {/* Details */}
                  <div style={{padding:"6px 8px"}}>
                    <input value={t.variety||""} onChange={e=>upTicket(t.id,"variety",e.target.value)} placeholder="Variety" style={{...TI,width:"100%",fontSize:11,fontWeight:600,marginBottom:3}} />
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <input value={t.notes||""} onChange={e=>upTicket(t.id,"notes",e.target.value)} placeholder="Lot no. / notes" style={{...TI,width:"100%",fontSize:10}} />
                      <button onClick={()=>rmTicket(t.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:12,flexShrink:0}}>×</button>
                    </div>
                    <div style={{fontSize:8,color:"#94a394",marginTop:2}}>{t.addedDate} · {(t.size/1024).toFixed(0)}KB</div>
                  </div>
                </div>
              );
            })}
          </div>
        ) : (
          <div style={{padding:16,textAlign:"center",color:"#b4bab4",fontSize:11,border:"1px dashed #d4dace",borderRadius:8}}>
            No seed tickets uploaded. Take a photo of the seed bag label to keep a digital record for traceability.
          </div>
        )}
      </div>
    </div>
  );
};

const SLURRY_CLOSED = {
  info: "NVZ closed periods: Grassland 15 Oct – 31 Jan (slurry), 1 Oct – 31 Jan (poultry/liquid digestate). Arable 1 Oct – 31 Jan (slurry/poultry). Manufactured N: grassland 15 Sep – 15 Jan, arable 1 Sep – 15 Jan.",
  fieldLimitOrg: 250, // max kg total N/ha/yr from organic manures
  wholeNVZ: 170, // max kg N/ha/yr whole farm avg from livestock manure
};

const LivestockTab = ({fields, saved, onSave}) => {
  const [herds, setHerds] = useState(saved?.herds || []);
  const [fieldStock, setFieldStock] = useState(saved?.fieldStock || {}); // {fieldId: [{herdIdx, count}]}
  const [grazing, setGrazing] = useState(saved?.grazing || []); // [{id, fieldId, herdIdx, count, startDate, endDate, notes}]
  const [housingMonths, setHousingMonths] = useState(saved?.housingMonths || 5); // months housed
  const [slurryCapM3, setSlurryCapM3] = useState(saved?.slurryCapM3 || 0);
  const [isNVZ, setIsNVZ] = useState(saved?.isNVZ !== false);
  const [inspTab, setInspTab] = useState("stock");

  useEffect(() => { if(onSave) onSave({herds, fieldStock, grazing, housingMonths, slurryCapM3, isNVZ}); }, [herds, fieldStock, grazing, housingMonths, slurryCapM3, isNVZ]);

  const addHerd = (typeId) => {
    const lt = LIVESTOCK_TYPES.find(l=>l.id===typeId);
    if(!lt) return;
    setHerds(prev => [...prev, {id: Date.now(), typeId, label: lt.label, icon: lt.icon, count: 0, nKgYr: lt.nKgYr, excretaM3: lt.excretaM3, luFactor: lt.luFactor}]);
  };
  const rmHerd = (id) => setHerds(prev => prev.filter(h=>h.id!==id));
  const uhf = (id,f,v) => setHerds(prev => prev.map(h=>h.id===id?{...h,[f]:v}:h));

  // Totals
  const totalN = herds.reduce((s,h) => s + h.count * h.nKgYr, 0);
  const totalExcreta = herds.reduce((s,h) => s + h.count * h.excretaM3, 0);
  const totalLU = herds.reduce((s,h) => s + h.count * h.luFactor, 0);
  const totalHa = fields.reduce((s,f) => s + (f.ha||0), 0);
  const grassHa = fields.filter(f => (f.crop||"").includes("grass")).reduce((s,f) => s + (f.ha||0), 0);
  const nPerHa = totalHa > 0 ? totalN / totalHa : 0;
  const luPerHa = grassHa > 0 ? totalLU / grassHa : 0;

  // Slurry storage calc
  const housedExcretaM3 = totalExcreta * (housingMonths / 12);
  const slurryProduced = housedExcretaM3 * 1.1; // +10% for washings/rainfall
  const storageWeeks = slurryCapM3 > 0 && slurryProduced > 0 ? (slurryCapM3 / slurryProduced) * (housingMonths * 4.33) : 0;
  const nvzMinWeeks = isNVZ ? 22 : 16; // NVZ = 5 months (22 weeks), non-NVZ = 4 months
  const storageCompliant = storageWeeks >= nvzMinWeeks;

  // Grazing helpers
  const addGrazing = () => setGrazing(prev => [...prev, {id: Date.now(), fieldId: fields[0]?.id||0, herdLabel: herds[0]?.label||"", count: 0, startDate: new Date().toISOString().split("T")[0], endDate: "", notes: ""}]);
  const rmGrazing = (id) => setGrazing(prev => prev.filter(g=>g.id!==id));
  const ugf = (id,f,v) => setGrazing(prev => prev.map(g=>g.id===id?{...g,[f]:v}:g));
  const grazingDays = (g) => { if(!g.startDate||!g.endDate) return 0; return Math.max(0, Math.round((new Date(g.endDate)-new Date(g.startDate))/(1000*60*60*24))); };

  return (
    <div>
      {/* Sub tabs */}
      <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
        {[{id:"stock",label:"🐄 Livestock Numbers"},{id:"grazing",label:"🌾 Paddock Grazing"},{id:"nitrogen",label:"⚗️ N Compliance"},{id:"slurry",label:"💧 Slurry Storage"},{id:"ea",label:"📋 EA Inspection"}].map(t => (
          <button key={t.id} onClick={()=>setInspTab(t.id)} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",background:inspTab===t.id?"#2c6e3f":"#f0f2ee",color:inspTab===t.id?"#fff":"#6b7b6b"}}>{t.label}</button>
        ))}
      </div>

      {/* ── LIVESTOCK NUMBERS ── */}
      {inspTab === "stock" && (
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase"}}>Livestock Inventory</div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <label style={{fontSize:10,color:"#6b7b6b",display:"flex",alignItems:"center",gap:3}}>
                  <input type="checkbox" checked={isNVZ} onChange={e=>setIsNVZ(e.target.checked)} /> NVZ Designation
                </label>
              </div>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
              <select id="ls-sel" style={{...SS,fontSize:10,width:200}}>
                {LIVESTOCK_TYPES.map(l => <option key={l.id} value={l.id}>{l.icon} {l.label}</option>)}
              </select>
              <button onClick={() => { addHerd(document.getElementById("ls-sel").value); }} style={{padding:"4px 12px",fontSize:11,fontWeight:600,background:"#2c6e3f10",color:"#2c6e3f",border:"1px solid #2c6e3f22",borderRadius:6,cursor:"pointer"}}>+ Add</button>
            </div>

            {herds.length === 0 && <div style={{padding:20,textAlign:"center",color:"#d4dace",fontSize:12}}>Add livestock categories above to build your farm inventory.</div>}

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:6}}>
              {herds.map(h => (
                <div key={h.id} style={{background:"#f7f8f6",border:"1px solid #e2e6de",borderRadius:8,padding:"8px 10px",borderLeft:"3px solid #4a7c59"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#1a2e1a"}}>{h.icon} {h.label}</span>
                    <button onClick={()=>rmHerd(h.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:14}}>×</button>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:11,color:"#6b7b6b"}}>Head:</span>
                    <NumInput value={h.count} onChange={v=>uhf(h.id,"count",v)} w={60} />
                    <span style={{fontSize:10,color:"#94a394",marginLeft:"auto"}}>{h.luFactor} LU/hd</span>
                  </div>
                  {h.count > 0 && (
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,padding:"2px 6px",background:"#4a7c5912",borderRadius:4,color:"#4a7c59"}}>{(h.count*h.nKgYr).toFixed(0)} kg N/yr</span>
                      <span style={{fontSize:10,padding:"2px 6px",background:"#6b5b7b12",borderRadius:4,color:"#6b5b7b"}}>{(h.count*h.excretaM3).toFixed(0)} m³ excreta/yr</span>
                      <span style={{fontSize:10,padding:"2px 6px",background:"#b8922a12",borderRadius:4,color:"#b8922a"}}>{(h.count*h.luFactor).toFixed(1)} LU</span>
                    </div>
                  )}
                </div>
              ))}
            </div>

            {/* Totals bar */}
            {herds.some(h=>h.count>0) && (
              <div style={{marginTop:10,padding:10,background:"#2c6e3f08",borderRadius:8,border:"1px solid #2c6e3f18"}}>
                <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
                  <div><span style={{fontSize:11,color:"#6b7b6b"}}>Total LU:</span> <span style={{fontSize:14,fontWeight:800,color:"#1a2e1a"}}>{totalLU.toFixed(1)}</span></div>
                  <div><span style={{fontSize:11,color:"#6b7b6b"}}>Total N:</span> <span style={{fontSize:14,fontWeight:800,color:"#4a7c59"}}>{totalN.toFixed(0)} kg/yr</span></div>
                  <div><span style={{fontSize:11,color:"#6b7b6b"}}>Excreta:</span> <span style={{fontSize:14,fontWeight:800,color:"#6b5b7b"}}>{totalExcreta.toFixed(0)} m³/yr</span></div>
                  {grassHa > 0 && <div><span style={{fontSize:11,color:"#6b7b6b"}}>Stocking rate:</span> <span style={{fontSize:14,fontWeight:800,color:luPerHa>2.5?"#c0392b":"#2c6e3f"}}>{luPerHa.toFixed(2)} LU/ha grass</span></div>}
                  {totalHa > 0 && <div><span style={{fontSize:11,color:"#6b7b6b"}}>N/ha (farm):</span> <span style={{fontSize:14,fontWeight:800,color:nPerHa>170?"#c0392b":"#2c6e3f"}}>{nPerHa.toFixed(0)} kg</span></div>}
                </div>
              </div>
            )}

            {/* Field stocking density */}
            {fields.length > 0 && herds.some(h=>h.count>0) && (
              <div style={{marginTop:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:6}}>Field Stocking Density</div>
                <div style={{fontSize:10,color:"#94a394",marginBottom:6}}>Assign livestock numbers to individual fields for stocking density calculations.</div>
                {fields.filter(f => (f.crop||"").includes("grass") || f.crop==="").map(f => {
                  const fs = fieldStock[f.id] || [];
                  const fieldLU = fs.reduce((s,a) => { const h = herds.find(hh=>hh.id===a.herdId); return s + (a.count||0) * (h?.luFactor||0); }, 0);
                  const fieldNKg = fs.reduce((s,a) => { const h = herds.find(hh=>hh.id===a.herdId); return s + (a.count||0) * (h?.nKgYr||0); }, 0);
                  return (
                    <div key={f.id} style={{display:"flex",gap:6,alignItems:"center",padding:"4px 8px",marginBottom:3,background:"#f7f8f6",borderRadius:6,borderLeft:`3px solid ${f.color}`,flexWrap:"wrap"}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#1a2e1a",minWidth:100}}>{f.name} <span style={{fontSize:10,fontWeight:400,color:"#6b7b6b"}}>{f.ha}ha</span></span>
                      <select onChange={e => {
                        const hid = +e.target.value; if(!hid) return;
                        setFieldStock(prev => ({...prev, [f.id]: [...(prev[f.id]||[]), {herdId:hid, count:0}]}));
                        e.target.value = "";
                      }} style={{...SS,fontSize:10,width:140}}>
                        <option value="">+ Add stock</option>
                        {herds.filter(h=>h.count>0).map(h => <option key={h.id} value={h.id}>{h.icon} {h.label}</option>)}
                      </select>
                      {fs.map((a,ai) => {
                        const h = herds.find(hh=>hh.id===a.herdId);
                        return (
                          <span key={ai} style={{display:"inline-flex",gap:3,alignItems:"center",fontSize:10,padding:"2px 6px",background:"#fff",borderRadius:4,border:"1px solid #e2e6de"}}>
                            {h?.icon} <NumInput value={a.count} onChange={v => setFieldStock(prev => ({...prev, [f.id]: (prev[f.id]||[]).map((x,xi) => xi===ai?{...x,count:v}:x)}))} w={35} /> hd
                            <button onClick={()=>setFieldStock(prev=>({...prev,[f.id]:(prev[f.id]||[]).filter((_,xi)=>xi!==ai)}))} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:10}}>×</button>
                          </span>
                        );
                      })}
                      {fieldLU > 0 && <span style={{fontSize:10,color:f.ha>0&&fieldLU/f.ha>2.5?"#c0392b":"#2c6e3f",fontWeight:700,marginLeft:"auto"}}>{f.ha>0?(fieldLU/f.ha).toFixed(2):0} LU/ha | {fieldNKg.toFixed(0)} kgN</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── PADDOCK GRAZING ── */}
      {inspTab === "grazing" && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase"}}>Paddock Grazing Records</div>
            <button onClick={addGrazing} style={{padding:"5px 12px",fontSize:11,fontWeight:600,background:"#2c6e3f",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>+ Add Record</button>
          </div>
          <div style={{fontSize:10,color:"#94a394",marginBottom:8}}>Track which livestock grazed which fields and for how long. Essential for NVZ records and farm assurance.</div>
          {grazing.length === 0 && <div style={{padding:20,textAlign:"center",color:"#d4dace",fontSize:12}}>No grazing records yet.</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:6}}>
            {grazing.map(g => {
              const days = grazingDays(g);
              const f = fields.find(ff=>ff.id===g.fieldId);
              return (
                <div key={g.id} style={{background:"#f7f8f6",border:"1px solid #e2e6de",borderRadius:8,padding:10,borderLeft:`3px solid ${f?.color||"#d4dace"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <select value={g.fieldId} onChange={e=>ugf(g.id,"fieldId",+e.target.value)} style={{...SS,fontSize:11,width:140}}>
                      {fields.map(ff => <option key={ff.id} value={ff.id}>{ff.name} ({ff.ha}ha)</option>)}
                    </select>
                    <button onClick={()=>rmGrazing(g.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:14}}>×</button>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>
                    <input value={g.herdLabel} onChange={e=>ugf(g.id,"herdLabel",e.target.value)} placeholder="e.g. Dairy herd" style={{...TI,fontSize:10,width:100}} />
                    <div><span style={{fontSize:9,color:"#6b7b6b"}}>Head</span><NumInput value={g.count} onChange={v=>ugf(g.id,"count",v)} w={45} /></div>
                    <div><span style={{fontSize:9,color:"#6b7b6b"}}>In</span><input type="date" value={g.startDate} onChange={e=>ugf(g.id,"startDate",e.target.value)} style={{...TI,fontSize:9,width:100,padding:"2px 4px"}} /></div>
                    <div><span style={{fontSize:9,color:"#6b7b6b"}}>Out</span><input type="date" value={g.endDate} onChange={e=>ugf(g.id,"endDate",e.target.value)} style={{...TI,fontSize:9,width:100,padding:"2px 4px"}} /></div>
                  </div>
                  <input value={g.notes||""} onChange={e=>ugf(g.id,"notes",e.target.value)} placeholder="Notes..." style={{...TI,fontSize:10,width:"100%",marginBottom:4}} />
                  {days > 0 && <div style={{display:"flex",gap:6,fontSize:10}}>
                    <span style={{padding:"2px 6px",background:"#2c6e3f12",borderRadius:4,color:"#2c6e3f",fontWeight:700}}>{days} days</span>
                    <span style={{color:"#6b7b6b"}}>{g.count} hd × {days} days = {(g.count*days).toLocaleString()} livestock days</span>
                    {f?.ha > 0 && <span style={{color:"#94a394"}}>{(g.count*days/f.ha).toFixed(0)} LD/ha</span>}
                  </div>}
                </div>
              );
            })}
          </div>
          {/* Grazing summary per field */}
          {grazing.length > 0 && (
            <div style={{marginTop:10,padding:8,background:"#2c6e3f06",borderRadius:8}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6b7b6b",marginBottom:4}}>Grazing Summary by Field</div>
              {fields.filter(f => grazing.some(g=>g.fieldId===f.id)).map(f => {
                const recs = grazing.filter(g=>g.fieldId===f.id);
                const totalLD = recs.reduce((s,g)=> s + g.count * grazingDays(g), 0);
                return (
                  <div key={f.id} style={{fontSize:11,padding:"2px 0",borderBottom:"1px solid #f0f2ee"}}>
                    <span style={{fontWeight:600,color:"#1a2e1a"}}>{f.name}</span>
                    <span style={{color:"#6b7b6b",marginLeft:6}}>{recs.length} record{recs.length>1?"s":""} | {totalLD.toLocaleString()} livestock-days{f.ha>0?` | ${(totalLD/f.ha).toFixed(0)} LD/ha`:""}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── NITROGEN COMPLIANCE ── */}
      {inspTab === "nitrogen" && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:6}}>Nitrogen Loading — Farm Assurance & NVZ Compliance</div>
          <div style={{fontSize:10,color:"#94a394",marginBottom:10}}>{SLURRY_CLOSED.info}</div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8,marginBottom:10}}>
            {/* Whole farm N */}
            <div style={{padding:12,background:nPerHa>170?"#c0392b08":"#2c6e3f06",borderRadius:10,border:`1px solid ${nPerHa>170?"#c0392b":"#2c6e3f"}18`}}>
              <div style={{fontSize:11,color:"#6b7b6b",marginBottom:4}}>Whole Farm Organic N Loading</div>
              <div style={{fontSize:28,fontWeight:800,color:nPerHa>170?"#c0392b":"#2c6e3f"}}>{nPerHa.toFixed(0)} <span style={{fontSize:14,fontWeight:400}}>kg N/ha/yr</span></div>
              <div style={{height:6,background:"#e2e6de",borderRadius:3,marginTop:6,overflow:"hidden"}}>
                <div style={{height:"100%",background:nPerHa>170?"#c0392b":"#2c6e3f",borderRadius:3,width:`${Math.min(100,nPerHa/170*100)}%`,transition:"width 0.3s"}} />
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginTop:3}}>
                <span style={{color:"#6b7b6b"}}>0</span>
                <span style={{color:nPerHa>170?"#c0392b":"#2c6e3f",fontWeight:700}}>NVZ limit: 170 kg/ha</span>
              </div>
              <div style={{fontSize:10,color:"#6b7b6b",marginTop:4}}>Total farm N: {totalN.toFixed(0)} kg / {totalHa.toFixed(1)} ha = {nPerHa.toFixed(1)} kg/ha</div>
              <div style={{fontSize:11,fontWeight:700,color:nPerHa>170?"#c0392b":"#2c6e3f",marginTop:4}}>
                {nPerHa > 170 ? `⚠️ EXCEEDS NVZ LIMIT by ${(nPerHa-170).toFixed(0)} kg/ha. Need ${((totalN-170*totalHa)/170).toFixed(1)} more ha or reduce ${(totalN-170*totalHa).toFixed(0)} kg N` : "✓ Within NVZ whole farm limit"}
              </div>
            </div>

            {/* Field limit */}
            <div style={{padding:12,background:"#f7f8f6",borderRadius:10,border:"1px solid #e2e6de"}}>
              <div style={{fontSize:11,color:"#6b7b6b",marginBottom:4}}>Field N Limit (Organic)</div>
              <div style={{fontSize:28,fontWeight:800,color:"#b8922a"}}>{SLURRY_CLOSED.fieldLimitOrg} <span style={{fontSize:14,fontWeight:400}}>kg total N/ha max</span></div>
              <div style={{fontSize:10,color:"#6b7b6b",marginTop:6}}>Maximum 250 kg/ha total N from organic manures on any individual field in any 12 month period. This is a field-level limit, not a farm average.</div>
              <div style={{fontSize:10,color:"#94a394",marginTop:4}}>NVZ additional: Grassland max 170 kg organic N/ha. Arable max 250 kg organic N/ha (but farm average must be &le;170).</div>
            </div>

            {/* Livestock LU summary */}
            <div style={{padding:12,background:"#f7f8f6",borderRadius:10,border:"1px solid #e2e6de"}}>
              <div style={{fontSize:11,color:"#6b7b6b",marginBottom:4}}>Stocking Rate</div>
              <div style={{fontSize:28,fontWeight:800,color:luPerHa>2.5?"#c0392b":"#4a7c59"}}>{luPerHa.toFixed(2)} <span style={{fontSize:14,fontWeight:400}}>LU/ha</span></div>
              <div style={{fontSize:10,color:"#6b7b6b",marginTop:6}}>Total {totalLU.toFixed(1)} LU on {grassHa>0?grassHa.toFixed(1):totalHa.toFixed(1)} ha {grassHa>0?"grassland":"(all land)"}.</div>
              <div style={{fontSize:10,color:"#94a394",marginTop:4}}>Farm assurance typical max ~2.5 LU/ha. Cross compliance — avoid overgrazing and poaching.</div>
            </div>
          </div>

          {/* Per-category N table */}
          {herds.some(h=>h.count>0) && (
            <div style={{marginTop:6}}>
              <div style={{fontSize:11,fontWeight:700,color:"#6b7b6b",marginBottom:4}}>Nitrogen by Livestock Category</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                  {["Category","Head","kg N/hd/yr","Total N (kg)","Excreta (m³)","LU"].map(h => <th key={h} style={{padding:"4px 6px",textAlign:h==="Category"?"left":"right",color:"#6b7b6b",fontWeight:600}}>{h}</th>)}
                </tr></thead>
                <tbody>{herds.filter(h=>h.count>0).map(h => (
                  <tr key={h.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                    <td style={{padding:"3px 6px",fontWeight:600}}>{h.icon} {h.label}</td>
                    <td style={{padding:"3px 6px",textAlign:"right"}}>{h.count}</td>
                    <td style={{padding:"3px 6px",textAlign:"right"}}>{h.nKgYr}</td>
                    <td style={{padding:"3px 6px",textAlign:"right",fontWeight:700,color:"#4a7c59"}}>{(h.count*h.nKgYr).toFixed(0)}</td>
                    <td style={{padding:"3px 6px",textAlign:"right"}}>{(h.count*h.excretaM3).toFixed(0)}</td>
                    <td style={{padding:"3px 6px",textAlign:"right"}}>{(h.count*h.luFactor).toFixed(1)}</td>
                  </tr>
                ))}</tbody>
                <tfoot><tr style={{borderTop:"2px solid #e2e6de"}}>
                  <td style={{padding:"4px 6px",fontWeight:700}}>TOTAL</td>
                  <td style={{padding:"4px 6px",textAlign:"right",fontWeight:700}}>{herds.reduce((s,h)=>s+h.count,0)}</td>
                  <td />
                  <td style={{padding:"4px 6px",textAlign:"right",fontWeight:700,color:"#4a7c59"}}>{totalN.toFixed(0)}</td>
                  <td style={{padding:"4px 6px",textAlign:"right",fontWeight:700}}>{totalExcreta.toFixed(0)}</td>
                  <td style={{padding:"4px 6px",textAlign:"right",fontWeight:700}}>{totalLU.toFixed(1)}</td>
                </tr></tfoot>
              </table>
            </div>
          )}
        </div>
      )}

      {/* ── SLURRY STORAGE ── */}
      {inspTab === "slurry" && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:6}}>Slurry Storage — SSAFO Compliance Calculator</div>
          <div style={{fontSize:10,color:"#94a394",marginBottom:10}}>SSAFO Regulations 2010 (as amended). Slurry stores must have sufficient capacity for the storage period. NVZ = minimum 5 months (22 weeks). Non-NVZ best practice = 4 months.</div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Months housed</div>
              <NumInput value={housingMonths} onChange={setHousingMonths} w={60} /></div>
            <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Slurry store capacity (m³)</div>
              <NumInput value={slurryCapM3} onChange={setSlurryCapM3} w={80} /></div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8}}>
            <div style={{padding:12,background:"#f7f8f6",borderRadius:10,border:"1px solid #e2e6de"}}>
              <div style={{fontSize:11,color:"#6b7b6b"}}>Annual Excreta Production</div>
              <div style={{fontSize:22,fontWeight:800,color:"#6b5b7b"}}>{totalExcreta.toFixed(0)} m³/yr</div>
              <div style={{fontSize:10,color:"#6b7b6b",marginTop:4}}>During {housingMonths} months housing: {housedExcretaM3.toFixed(0)} m³</div>
              <div style={{fontSize:10,color:"#6b7b6b"}}>+ 10% washings/rainfall: <strong>{slurryProduced.toFixed(0)} m³</strong></div>
            </div>

            <div style={{padding:12,background:storageCompliant?"#2c6e3f06":"#c0392b08",borderRadius:10,border:`1px solid ${storageCompliant?"#2c6e3f":"#c0392b"}18`}}>
              <div style={{fontSize:11,color:"#6b7b6b"}}>Storage Capacity Assessment</div>
              <div style={{fontSize:22,fontWeight:800,color:storageCompliant?"#2c6e3f":"#c0392b"}}>{storageWeeks.toFixed(1)} weeks</div>
              <div style={{height:8,background:"#e2e6de",borderRadius:4,marginTop:6,overflow:"hidden"}}>
                <div style={{height:"100%",background:storageCompliant?"#2c6e3f":"#c0392b",borderRadius:4,width:`${Math.min(100,storageWeeks/nvzMinWeeks*100)}%`}} />
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginTop:3}}>
                <span>0</span><span style={{fontWeight:700,color:storageCompliant?"#2c6e3f":"#c0392b"}}>{isNVZ?"NVZ":"Best practice"} min: {nvzMinWeeks} weeks</span>
              </div>
              <div style={{fontSize:11,fontWeight:700,color:storageCompliant?"#2c6e3f":"#c0392b",marginTop:6}}>
                {storageCompliant ? "✓ Storage meets requirements" : `⚠️ SHORTFALL: Need ${((slurryProduced/housingMonths*4.33*nvzMinWeeks)-slurryCapM3).toFixed(0)} m³ more capacity`}
              </div>
            </div>

const SAVE_KEY = "crop_dynamics_v3";

const exportJSON = (data, filename) => {

const parseSoilCSV = (text) => {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  // Detect delimiter: tab or comma
  const delim = lines[0].includes("\t") ? "\t" : ",";
  // Smart CSV split handling quoted fields
  const splitRow = (line) => {
    const result = []; let current = ""; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === delim && !inQ) { result.push(current.trim()); current = ""; continue; }
      current += c;
    }
    result.push(current.trim());
    return result;
  };
  const rawHeaders = splitRow(lines[0]);
  const headers = rawHeaders.map(h => h.toLowerCase().replace(/[^a-z0-9]/g, ""));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = splitRow(lines[i]);
    const row = {};
    headers.forEach((h, j) => { row[h] = vals[j] || ""; });
    // Map Lancrop: "Sample Name", "Olsen P", "Exch. K", "Exch. Mg", "pH", "Loss on Ignition"
    // Map NRM: "Field", "Sample", "P (Olsen)", "K", "Mg", "pH", "Organic Matter"
    // Map generic
    const fieldName = row.samplename || row.sample || row.field || row.fieldname || row.name || row.sitename || row.location || row.description || "";
    const pMg = +(row.olsenp || row.p || row.phosphorus || row.pmgl || row.polsen || row.pavailable || 0);
    const kMg = +(row.exchk || row.k || row.potassium || row.kmgl || row.kavailable || 0);
    const mgMg = +(row.exchmg || row.mg || row.magnesium || row.mgmgl || 0);
    const pH = +(row.ph || row.soilph || row.phwater || row.phcacl2 || 0);
    const om = +(row.lossonignition || row.om || row.organicmatter || row.ompc || row.loi || 0);
    // Tissue columns
    const nPc = +(row.n || row.nitrogen || row.totaln || row.npc || 0);
    const pPc = +(row.ppc || row.ptissue || 0);
    const kPc = +(row.kpc || row.ktissue || 0);
    const sPc = +(row.s || row.sulphur || row.sulfur || row.spc || 0);
    const mgPc = +(row.mgpc || row.mgtissue || 0);
    const mnPpm = +(row.mn || row.manganese || row.mnppm || 0);
    const znPpm = +(row.zn || row.zinc || row.znppm || 0);
    const cuPpm = +(row.cu || row.copper || row.cuppm || 0);
    // Grain columns
    const protein = +(row.protein || row.proteinpc || row.cp || row.crudeprotein || 0);
    const moisture = +(row.moisture || row.moisturepc || row.mc || 0);
    const sp = +(row.specificweight || row.sp || row.spwt || row.bushel || row.hectolitre || row.kghl || 0);
    const hagberg = +(row.hagberg || row.hfn || row.fallingnumber || 0);
    const screenings = +(row.screenings || row.screen || 0);
    const sampleDate = row.date || row.sampledate || row.datesampled || row.received || "";
    if (fieldName) rows.push({fieldName, pMg, kMg, mgMg, pH, om, nPc, pPc, kPc, sPc, mgPc, mnPpm, znPpm, cuPpm, protein, moisture, sp, hagberg, screenings, sampleDate});
  }
  return rows;
};

        // N compliance summary
        const nPerHa = totalHaPdf > 0 ? totN / totalHaPdf : 0;

        body += '<h3 style="color:' + (nvzOk?'#2c6e3f':'#c0392b') + ';margin:0 0 6px">Whole Farm Organic N Loading: ' + nPerHa.toFixed(0) + ' kg N/ha ' + (nvzOk?'✓ COMPLIANT':'⚠️ EXCEEDS 170 kg/ha LIMIT') + '</h3>';
        body += '<p style="font-size:11px;color:#6b7b6b;margin:2px 0">Total N: ' + totN.toFixed(0) + ' kg / ' + totalHaPdf.toFixed(1) + ' ha = ' + nPerHa.toFixed(1) + ' kg/ha (NVZ limit: 170 kg/ha)</p>';
        body += '<p style="font-size:11px;color:#6b7b6b;margin:2px 0">Total LU: ' + totLU.toFixed(1) + ' | Stocking rate: ' + luPerHa.toFixed(2) + ' LU/ha' + (grassHa>0?' (on ' + grassHa.toFixed(1) + ' ha grass)':'') + '</p>';
        body += '</div>';

        // Slurry storage
        const housingM = ls.housingMonths || 5;
        const slurryCap = ls.slurryCapM3 || 0;
        const housedEx = totEx * (housingM/12);
        const slurryProd = housedEx * 1.1;
        const storeWeeks = slurryCap>0 && slurryProd>0 ? (slurryCap/slurryProd)*(housingM*4.33) : 0;
        const nvzMin = isNVZ ? 22 : 16;
        const storeOk = storeWeeks >= nvzMin;
        body += '<div style="padding:12px;background:' + (storeOk?'#2c6e3f':'#c0392b') + '0a;border:2px solid ' + (storeOk?'#2c6e3f':'#c0392b') + '20;border-radius:8px;margin:12px 0">';
        body += '<h3 style="color:' + (storeOk?'#2c6e3f':'#c0392b') + ';margin:0 0 6px">Slurry Storage: ' + storeWeeks.toFixed(1) + ' weeks ' + (storeOk?'✓ COMPLIANT':'⚠️ SHORTFALL') + '</h3>';
        body += '<p style="font-size:11px;color:#6b7b6b;margin:2px 0">Annual excreta: ' + totEx.toFixed(0) + ' m&sup3; | Housed ' + housingM + ' months: ' + housedEx.toFixed(0) + ' m&sup3; (+10% = ' + slurryProd.toFixed(0) + ' m&sup3;)</p>';
        body += '<p style="font-size:11px;color:#6b7b6b;margin:2px 0">Store capacity: ' + slurryCap + ' m&sup3; | Required for ' + nvzMin + ' weeks: ' + (slurryProd>0?((slurryProd/(housingM*4.33))*nvzMin).toFixed(0):"0") + ' m&sup3;</p>';
        body += '</div>';
      } else {
        body += '<p style="color:#94a394">No livestock entered. Add livestock numbers in the Livestock tab.</p>';
      }
      // Grazing records
      const grazingRecs = ls.grazing || [];
      if (grazingRecs.length > 0) {
        body += H("Grazing Records", "#b8922a");
        body += '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#b8922a0a;border-bottom:2px solid #e2e6de"><th style="padding:4px;text-align:left">Field</th><th style="text-align:left">Livestock</th><th style="text-align:right">Head</th><th>Start</th><th>End</th><th style="text-align:right">Days</th><th style="text-align:left">Notes</th></tr></thead><tbody>';
        grazingRecs.forEach(g => {
          const f = fields.find(ff=>ff.id===g.fieldId);
          const days = g.startDate && g.endDate ? Math.max(0,Math.round((new Date(g.endDate)-new Date(g.startDate))/(86400000))) : 0;
          body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:3px 4px;font-weight:600">' + esc(f?.name||"") + '</td><td style="padding:3px 4px">' + esc(g.herdLabel) + '</td><td style="padding:3px 4px;text-align:right">' + (g.count||"") + '</td><td style="padding:3px 4px">' + esc(g.startDate) + '</td><td style="padding:3px 4px">' + esc(g.endDate) + '</td><td style="padding:3px 4px;text-align:right">' + days + '</td><td style="padding:3px 4px;font-size:9px">' + esc(g.notes||"") + '</td></tr>';
        });
        body += '</tbody></table>';
      }
    }
    // ─── FIELD REGISTER PDF ───
    if (type === "field_register") {
      body += H("Field Register", "#2c6e3f");
      body += '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#2c6e3f0a;border-bottom:2px solid #e2e6de">';
      body += '<th style="padding:4px 6px;text-align:left">Field Name</th><th style="text-align:right">Ha</th><th style="text-align:right">Acres</th><th style="text-align:left">Crop</th><th style="text-align:right">Yield (t/ha)</th><th style="text-align:left">Previous Crop</th><th style="text-align:left">Soil Type</th><th style="text-align:left">Notes</th>';
      body += '</tr></thead><tbody>';
      fields.forEach(f => {
        const cr = CROPS.find(c=>c.id===f.crop);
        const s = f.soil||{};
        body += '<tr style="border-bottom:1px solid #f0f2ee">';
        body += '<td style="padding:3px 6px;font-weight:600;border-left:3px solid ' + f.color + '">' + esc(f.name) + '</td>';
        body += '<td style="text-align:right;padding:3px 6px">' + (f.ha||"") + '</td>';
        body += '<td style="text-align:right;padding:3px 6px">' + (f.ha?(f.ha*2.471).toFixed(1):"") + '</td>';
        body += '<td style="padding:3px 6px">' + esc(cr?.label||"") + '</td>';
        body += '<td style="text-align:right;padding:3px 6px">' + (f.yieldT||"") + '</td>';
        body += '<td style="padding:3px 6px">' + esc(f.prevCrop||"") + '</td>';
        body += '<td style="padding:3px 6px;font-size:10px">' + esc(s.soilType||"") + '</td>';
        body += '<td style="padding:3px 6px;font-size:9px">' + esc(f.notes||"") + '</td>';
        body += '</tr>';
      });
      body += '</tbody></table>';
      body += '<p style="font-size:11px;color:#6b7b6b;margin-top:8px">Total: ' + fields.length + ' fields, ' + totalHaPdf.toFixed(1) + ' ha (' + (totalHaPdf*2.471).toFixed(0) + ' acres)</p>';
    }
    // ─── EA INSPECTION CHECKLIST PDF ───
    if (type === "ea_checklist") {
      body += H("Environment Agency Inspection Checklist", "#a63d2b");
      body += '<p style="font-size:10px;color:#94a394;margin-bottom:12px">Compliance status as of ' + new Date().toLocaleDateString() + '. Items confirmed by farm management.</p>';
      const eaChecks = progState.livestock?.eaChecks || {};
      const CHECKLIST = [
        {cat:"Slurry & Manure",items:["Slurry store meets SSAFO standards","Sufficient storage capacity for closed period","No slurry applied during closed periods","Spread records maintained","10m watercourse / 50m borehole buffers","Low-emission spreading where required","FYM heaps managed correctly","No runoff to watercourse"]},
        {cat:"Silage",items:["Silage clamp SSAFO compliant","Effluent collected and contained","Effluent tank adequately sized","Drainage to collection not surface water"]},
        {cat:"Fuel & Chemical Storage",items:["Fuel in bunded tank (110% capacity)","No leaks or staining","Pesticide store locked, labelled, bunded","COSHH assessments available","Spray records maintained"]},
        {cat:"Water Protection",items:["No point source pollution","Clean/dirty water separated","Dirty water collected and spread appropriately","6m buffer strips along watercourses","No erosion runoff to watercourses"]},
        {cat:"NVZ Records",items:["Risk map completed","N Plan completed before 1st application","Whole farm below 170 kg organic N/ha","Field limits not exceeded","Manufactured fertiliser records","Soil sampling within 5 years"]},
        {cat:"Animal Welfare",items:["Fallen stock via approved renderer","Medicine records (7-year retention)","Movement records maintained","Animal ID compliant"]},
        {cat:"General",items:["Waste exemptions registered","Environmental permit if needed","Sheep dip disposed correctly","Farm Environmental Plan in place"]},
      ];
      let totalItems=0,checkedCount=0;
      CHECKLIST.forEach(cat => {
        body += '<h3 style="font-size:12px;color:#a63d2b;margin:12px 0 4px;border-left:3px solid #a63d2b;padding-left:8px">' + esc(cat.cat) + '</h3>';
        cat.items.forEach((item,i) => {
          const key = cat.cat+"-"+i;
          const checked = !!eaChecks[key];
          totalItems++; if(checked) checkedCount++;
          body += '<div style="padding:3px 0 3px 8px;font-size:11px;border-bottom:1px solid #f0f2ee;color:' + (checked?"#2c6e3f":"#1a2e1a") + '">' + (checked?"☑ ":"☐ ") + (checked?'<s>':'') + esc(item) + (checked?'</s>':'') + '</div>';
        });
      });
      body += '<div style="margin:16px 0;padding:10px;background:#a63d2b0a;border:2px solid #a63d2b20;border-radius:8px"><strong>' + checkedCount + ' / ' + totalItems + ' items confirmed</strong> (' + (totalItems>0?Math.round(checkedCount/totalItems*100):0) + '% complete)</div>';
    }
    // ─── NUTRIENT MANAGEMENT PLAN (N PLAN) PDF ───
    if (type === "n_plan") {
      const fs = progState.fert || {};
      const lsState = progState.livestock || {};
      const isNVZ = lsState.isNVZ !== false;
      body += '<div style="padding:10px;background:#c0392b08;border:2px solid #c0392b20;border-radius:8px;margin-bottom:16px"><strong style="color:#c0392b">NVZ REQUIREMENT:</strong> <span style="font-size:11px;color:#6b7b6b">This Nitrogen Plan must be completed before the first application of nitrogen fertiliser each calendar year (Nitrate Pollution Prevention Regulations 2015, Reg 10). Retain for at least 5 years.</span></div>';

      // Section 1: Farm details
      body += H("1. Farm Details", "#2c6e3f");
      body += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px">';
