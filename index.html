// ─── NOMINATIM (OpenStreetMap) ADDRESS AUTOCOMPLETE ─────────────────────────
// Free alternative - no API key required. Uses Nominatim for geocoding.
// Rate limit: 1 req/sec - perfect for autocomplete
const searchAddresses = async (query) => {
  if (!query || query.length < 2) return [];
  try {
    const response = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&country=gb&q=${encodeURIComponent(query)}&limit=8`,
      { headers: { 'Accept': 'application/json' } }
    );
    if (!response.ok) return [];
    const results = await response.json();
    return results.slice(0, 8).map(r => ({
      place_id: r.place_id,
      display_name: r.display_name,
      main_text: r.name || r.display_name.split(',')[0],
      secondary_text: r.display_name.split(',').slice(1, 3).join(','),
      postcode: r.address?.postcode || '',
    }));
  } catch (err) {
    console.log('Address search error:', err);
    return [];
  }
};

const GaiBar = ({activeName, gai}) => {
  const opt = OPTIMA[activeName]; if (!opt) return null;
  return (
    <div style={{marginTop: 2}}>
      {Object.entries(opt).filter(([k]) => k !== "note").map(([d, r]) => {
        const pct = r.opt > 0 ? Math.min((gai / r.opt) * 100, 130) : 0;
        const st = gai >= r.opt ? "#2c6e3f" : gai >= r.min ? "#f39c12" : "#a63d2b";
        return (
          <div key={d} style={{display: "flex", alignItems: "center", gap: 4, marginBottom: 1}}>
            <span style={{fontSize: 12, color: "#6b7d8f", width: 50, textTransform: "capitalize"}}>{d}</span>
            <div style={{flex: 1, height: 3, background: "#e2e6de", borderRadius: 2, position: "relative", overflow: "hidden"}}>
              <div style={{height: "100%", width: `${Math.min(pct, 100)}%`, background: st, borderRadius: 2, transition: "width 0.2s"}} />
            </div>
            <span style={{fontSize: 12, color: st, fontWeight: 700, width: 20, textAlign: "right"}}>{Math.round(gai)}</span>
            <span style={{fontSize: 6, color: "#4a5a6a", width: 42}}>/{r.label}</span>
          </div>
        );
      })}
    </div>
  );
};

// ─── FIELD TAG SELECTOR ─────────────────────────────────────────────────────
const FieldTag = ({fields, selectedIds, onChange, label}) => {

  const cropTypes = [...new Set(fields.map(f => f.crop))].map(cId => {const cr = CROPS.find(c=>c.id===cId); return {id:cId, label:cr?.label||cId};});

// ─── FARM & FIELDS MANAGER ──────────────────────────────────────────────────
const FarmFields = ({fields, setFields, farm, setFarmName, setSbi, setFarmProp, budgets, advisorProfile, updateAdvisor}) => {
  const [subTab, setSubTab] = useState("farm"); // farm | fields | cropping
  const farmName = farm?.name || "";
  const sbi = farm?.sbi || "";
  const addField = () => setFields(p => [...p, {
    id: Date.now(), name: `Field ${p.length+1}`, ha: 0, crop: "w_wheat",
    yieldT: 8.5, grainPrice: 180, sns:"sns_med", pIdx:"i2", kIdx:"i2", sStat:"marg",
    color: `hsl(${p.length*47%360},55%,50%)`,
    soil: {pMg: "", kMg: "", mgMg: "", pH: "", om: "", pIdx: "", kIdx: "", mgIdx: "", sampleDate: ""},
    kml: null, bounds: null,
    rotation: ["","","","",""], // 5-year history: [yr-1, yr-2, yr-3, yr-4, yr-5]
    tissue: {nPc:"",pPc:"",kPc:"",sPc:"",mgPc:"",mnPpm:"",znPpm:"",cuPpm:"",gs:"",sampleDate:""},
    grain: {nPc:"",protein:"",moisture:"",sp:"",hagberg:"",screenings:"",sampleDate:""},
  }]);
  const rmField = id => setFields(p => p.filter(x => x.id !== id));
  const uf = (id,f,v) => setFields(p => p.map(x => x.id===id?{...x,[f]:v}:x));
  const onCropChange = (id, cropId) => {
    const ct = CROPS.find(c=>c.id===cropId);
    setFields(p => p.map(x => x.id===id?{...x, crop:cropId, yieldT:ct?ct.defaultYield:0, grainPrice:ct?ct.defaultPrice:0}:x));
  };

  // ── IMPORT: parse rows into fields ──
  const matchCrop = (text) => {
    if (!text) return "w_wheat";
    const t = text.toLowerCase().trim();
    const map = [
      [/winter\s*wheat|w[\.\s]*wheat|ww\b/i, "w_wheat"],
      [/spring\s*wheat|s[\.\s]*wheat|sw\b/i, "s_wheat"],
      [/winter\s*barley|w[\.\s]*barley|wb\b/i, "w_barley"],
      [/spring\s*barley|s[\.\s]*barley|sb\b/i, "s_barley"],
      [/winter\s*osr|w[\.\s]*osr|osr|oilseed|rape/i, "w_osr"],
      [/spring\s*oat|s[\.\s]*oat/i, "s_oats"],
      [/winter\s*oat|w[\.\s]*oat/i, "w_oats"],
      [/winter\s*bean|w[\.\s]*bean/i, "w_beans"],
      [/spring\s*bean|s[\.\s]*bean/i, "s_beans"],
      [/pea/i, "peas"],
      [/rye/i, "w_rye"],
      [/maize/i, "maize"],
      [/grass/i, "grass"],
      [/fallow|elm|set.?aside/i, "fallow"],
    ];
    for (const [re, id] of map) { if (re.test(t)) return id; }
    // Fallback: try CROPS labels
    const match = CROPS.find(c => c.label.toLowerCase().includes(t));
    return match ? match.id : "w_wheat";
  };

  const importRows = (rows) => {
    // rows: [{name, ha, crop?}]
    if (!rows.length) return;
    const newFields = rows.map((r, i) => {
      const cropId = matchCrop(r.crop);
      const ct = CROPS.find(c => c.id === cropId);
      return {
        id: Date.now() + i,
        name: (r.name || `Field ${fields.length + i + 1}`).trim(),
        ha: parseFloat(r.ha) || 0,
        crop: cropId,
        yieldT: ct ? ct.defaultYield : 0,
        grainPrice: ct ? ct.defaultPrice : 0,
        sns: "sns_med", pIdx: "i2", kIdx: "i2", sStat: "marg",
        color: `hsl(${(fields.length + i) * 47 % 360},55%,50%)`,
        soil: {pMg:"",kMg:"",mgMg:"",pH:"",om:"",sampleDate:""},
        kml: null, bounds: null,
      };
    });
    setFields(p => [...p, ...newFields]);
  };

  const [importMsg, setImportMsg] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [postcodeInput, setPostcodeInput] = useState("");
  const [placeSuggestions, setPlaceSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [searchTimeout, setSearchTimeout] = useState(null);

  // Close suggestions when clicking outside
  useEffect(() => {
    const handleClickOutside = (e) => {
      if (!e.target.closest('[data-autocomplete-container]')) {
        setShowSuggestions(false);
      }
    };
    document.addEventListener('click', handleClickOutside);
    return () => document.removeEventListener('click', handleClickOutside);
  }, []);

  // Handle postcode input and get suggestions
  const handlePostcodeChange = (value) => {
    setPostcodeInput(value);
    
    // Clear previous timeout
    if (searchTimeout) clearTimeout(searchTimeout);
    
    if (value.length < 2) {
      setPlaceSuggestions([]);
      setShowSuggestions(false);
      return;
    }
    
    // Debounce search by 400ms to avoid too many requests
    const timeout = setTimeout(async () => {
      const results = await searchAddresses(value);
      setPlaceSuggestions(results);
      setShowSuggestions(results.length > 0);
    }, 400);
    
    setSearchTimeout(timeout);
  };

  // Handle suggestion selection
  const handleSuggestionSelect = (suggestion) => {
    setFarmProp('address', suggestion.display_name);
    setFarmProp('postcode', suggestion.postcode);
    setPostcodeInput('');
    setPlaceSuggestions([]);
    setShowSuggestions(false);
  };

  const handleCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      let text = ev.target.result;
      // Strip BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 1) { setImportMsg("Empty file."); return; }
      // Detect separator
      const firstLine = lines[0];
      const sep = firstLine.includes("\t") ? "\t" : firstLine.split(",").length > 1 ? "," : firstLine.includes(";") ? ";" : null;
      if (!sep) { setImportMsg("Could not detect separator (comma, tab, or semicolon)."); return; }
      const clean = s => s.replace(/^["'\s]+|["'\s]+$/g, "").trim();
      const allRows = lines.map(l => l.split(sep).map(clean));
      // Try to find header row — check if first row looks like headers
      const hdr = allRows[0].map(h => h.toLowerCase());
      let nameCol = -1, haCol = -1, cropCol = -1, startRow = 0;
      // Broad matching for header columns — very permissive
      nameCol = hdr.findIndex(h => /name|field|parcel|block|title|description|land/i.test(h));
      haCol = hdr.findIndex(h => /ha\b|hectare|acre|area|size|\bac\b/i.test(h));
      cropCol = hdr.findIndex(h => /crop|cropping|use|variety|type|sow|plant/i.test(h));
      // Avoid matching the same column twice
      if (nameCol === haCol && nameCol >= 0) { haCol = hdr.findIndex((h, i) => i !== nameCol && /\d|ha|acre|area|size/i.test(h)); }
      if (nameCol === cropCol && nameCol >= 0) { cropCol = hdr.findIndex((h, i) => i !== nameCol && i !== haCol && /crop|cropping|use|variety|type/i.test(h)); }
      if (nameCol >= 0 || haCol >= 0) {
        startRow = 1; // has header
      } else {
        // No header detected — assume col 0 = name, col 1 = ha, col 2 = crop (if exists)
        // But first check: is the first row data? (col 1 is a number?)
        if (allRows[0].length >= 2 && /^\d/.test(allRows[0][1])) {
          nameCol = 0; haCol = 1; cropCol = allRows[0].length >= 3 ? 2 : -1;
          startRow = 0;
        } else if (allRows[0].length >= 2 && /^\d/.test(allRows[0][0])) {
          // Number first, then name
          haCol = 0; nameCol = 1; cropCol = allRows[0].length >= 3 ? 2 : -1;
          startRow = 0;
        } else {
          // First row is header we didn't recognise — just use column positions
          nameCol = 0; haCol = allRows[0].length >= 2 ? 1 : -1;
          cropCol = allRows[0].length >= 3 ? 2 : -1;
          startRow = 1;
        }
      }
      const rows = [];
      const isAcres = haCol >= 0 && startRow === 1 && /acre/i.test(hdr[haCol]);
      for (let i = startRow; i < allRows.length; i++) {
        const cols = allRows[i];
        if (cols.length < 2 && haCol >= 0) continue;
        const name = nameCol >= 0 && cols[nameCol] ? cols[nameCol] : "";
        let haStr = haCol >= 0 && cols[haCol] ? cols[haCol] : "0";
        let haNum = parseFloat(haStr.replace(/[^\d.]/g, "")) || 0;
        if (isAcres) haNum *= 0.404686;
        const crop = cropCol >= 0 && cols[cropCol] ? cols[cropCol] : "";
        if (name || haNum > 0) rows.push({name, ha: haNum, crop});
      }
      if (rows.length === 0) {
        setImportMsg("No fields found. Check your file has field names and sizes.");
      } else {
        importRows(rows);
        setImportMsg(`Imported ${rows.length} fields from ${file.name}`);
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const handlePDF = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Extract text from PDF using basic binary parsing
      const data = ev.target.result;
      const bytes = new Uint8Array(data);
      let text = "";
      // Try to extract readable text between stream/endstream or BT/ET
      const str = new TextDecoder("latin1").decode(bytes);
      // Extract text from PDF content streams
      const btMatches = str.match(/BT[\s\S]*?ET/g) || [];
      btMatches.forEach(block => {
        const tjMatches = block.match(/\(([^)]*)\)\s*Tj/g) || [];
        tjMatches.forEach(m => {
          const inner = m.match(/\(([^)]*)\)/);
          if (inner) text += inner[1] + " ";
        });
        const tdMatches = block.match(/\[(.*?)\]\s*TJ/g) || [];
        tdMatches.forEach(m => {
          const parts = m.match(/\(([^)]*)\)/g) || [];
          parts.forEach(p => { const inner = p.match(/\(([^)]*)\)/); if (inner) text += inner[1]; });
          text += " ";
        });
      });
      if (!text.trim()) {
        setImportMsg("Could not extract text from this PDF. Try copying the table and pasting it below, or save as CSV first.");
        e.target.value = "";
        return;
      }
      // Parse extracted text: look for field name + number patterns
      const rows = [];
      // Split into lines and look for "Name ... number ... crop" patterns
      const tLines = text.split(/\n|\s{3,}/).filter(l => l.trim());
      for (const line of tLines) {
        // Match: word(s) followed by a number (ha)
        const m = line.match(/^([A-Za-z][A-Za-z0-9\s\-'\.]{1,40}?)\s+([\d]+\.?\d*)\s*(ha|ac|hectare|acre)?s?\s*(.*)$/i);
        if (m) {
          let ha = parseFloat(m[2]) || 0;
          if (m[3] && /ac/i.test(m[3])) ha *= 0.404686;
          rows.push({name: m[1].trim(), ha, crop: m[4] ? m[4].trim() : ""});
        }
      }
      if (rows.length === 0) {
        setImportMsg("Found text but couldn't parse field names and sizes. Try pasting the data below instead.");
      } else {
        importRows(rows);
        setImportMsg(`Extracted ${rows.length} fields from PDF`);
      }
      e.target.value = "";
    };
    reader.readAsArrayBuffer(file);
  };

  const handlePaste = () => {
    if (!pasteText.trim()) return;
    const lines = pasteText.split(/\r?\n/).filter(l => l.trim());
    const rows = [];
    for (const line of lines) {
      const sep = line.includes("\t") ? "\t" : /,/.test(line) ? "," : /\s{2,}/.test(line) ? /\s{2,}/ : null;
      if (sep) {
        const parts = line.split(sep).map(s => s.trim());
        // Find the number
        const numIdx = parts.findIndex(p => /^\d+\.?\d*$/.test(p));
        if (numIdx >= 0) {
          const ha = parseFloat(parts[numIdx]) || 0;
          const nameParts = parts.slice(0, numIdx).filter(Boolean);
          const cropParts = parts.slice(numIdx + 1).filter(Boolean);
          rows.push({name: nameParts.join(" "), ha, crop: cropParts.join(" ")});
        } else if (parts.length >= 1) {
          // Just a name, no number
          const haM = parts.find(p => /\d/.test(p));
          rows.push({name: parts[0], ha: haM ? parseFloat(haM.replace(/[^\d.]/g,"")) : 0, crop: ""});
        }
      } else {
        // Single value per line — try "Name 12.5" or "Name 12.5 ha Winter Wheat"
        const m = line.match(/^(.+?)\s+([\d]+\.?\d*)\s*(ha|ac)?\s*(.*)$/i);
        if (m) {
          let ha = parseFloat(m[2]) || 0;
          if (m[3] && /ac/i.test(m[3])) ha *= 0.404686;
          rows.push({name: m[1].trim(), ha, crop: m[4]?.trim() || ""});
        }
      }
    }
    if (rows.length > 0) {
      importRows(rows);
      setImportMsg(`Imported ${rows.length} fields from pasted data`);
      setPasteText("");
    } else {
      setImportMsg("Couldn't parse any fields. Use format: Field Name, Ha, Crop (one per line)");
    }
  };

  // Per-field cost calculation from budgets
  const fieldCosts = (fId) => {
    const cp = budgets.cp.fieldIds.includes(fId) ? budgets.cp.costHa : 0;
    const hb = budgets.herb.fieldIds.includes(fId) ? budgets.herb.costHa : 0;
    const fe = budgets.fert.fieldIds.includes(fId) ? budgets.fert.costHa : 0;
    const op = budgets.ops.fieldIds.includes(fId) ? budgets.ops.costHa : 0;
    return {cp, herb: hb, fert: fe, ops: op, total: cp + hb + fe + op};
  };

  const totalHa = fields.reduce((s,f) => s+(f.ha||0), 0);
  const cropSummary = {};
  let farmGross = 0, farmCosts = 0;
  fields.forEach(f => {
    const cr = CROPS.find(c=>c.id===f.crop); const lbl = cr?cr.label:"Other";
    if(!cropSummary[lbl]) cropSummary[lbl]={ha:0,rev:0,cost:0};
    const rev = (f.ha||0)*(f.yieldT||0)*(f.grainPrice||0);
    const fc = fieldCosts(f.id);
    const cost = fc.total * (f.ha||0);
    cropSummary[lbl].ha += f.ha||0;
    cropSummary[lbl].rev += rev;
    cropSummary[lbl].cost += cost;
    farmGross += rev;
    farmCosts += cost;
  });
  const farmMargin = farmGross - farmCosts;
  const anyCosts = farmCosts > 0;

  return (
    <div>
      {/* Sub-tab navigation */}
      <div style={{display:"flex",gap:3,marginBottom:10}}>
        {[{id:"farm",label:"🏠 Farm Details"},{id:"fields",label:"🌾 Fields"},{id:"cropping",label:"🔄 Cropping Plan"}].map(t => (
          <button key={t.id} onClick={()=>setSubTab(t.id)} style={{padding:"6px 16px",fontSize:11,fontWeight:600,borderRadius:6,border:"none",cursor:"pointer",background:subTab===t.id?"#2c6e3f":"#f0f2ee",color:subTab===t.id?"#fff":"#6b7b6b",transition:"all 0.15s"}}>{t.label}</button>
        ))}
        <div style={{marginLeft:"auto",padding:"4px 10px",background:"#2c6e3f10",borderRadius:4,textAlign:"center"}}>
          <span style={{fontSize:9,color:"#6b7b6b"}}>Total: </span><strong style={{fontSize:13,color:"#2c6e3f"}}>{totalHa.toFixed(1)} ha</strong><span style={{fontSize:9,color:"#6b7b6b",marginLeft:6}}>{fields.length} fields</span>
        </div>
      </div>

      {/* ═══ FARM DETAILS ═══ */}
      {subTab === "farm" && (
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Farm & Business Details</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Farm name</div><input value={farmName} onChange={e=>setFarmName(e.target.value)} placeholder="e.g. Hill Top Farm" style={{...TI,fontWeight:700}} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Trading name / Business</div><input value={farm?.tradingName||""} onChange={e=>setFarmProp("tradingName",e.target.value)} placeholder="e.g. J Smith & Sons" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>SBI number</div><input value={sbi} onChange={e=>setSbi(e.target.value)} placeholder="123/456/789" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>CPH number</div><input value={farm?.cph||""} onChange={e=>setFarmProp("cph",e.target.value)} placeholder="12/345/6789" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Holding number</div><input value={farm?.holdingNo||""} onChange={e=>setFarmProp("holdingNo",e.target.value)} placeholder="" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>NVZ Designated?</div><select value={farm?.nvz?"yes":"no"} onChange={e=>setFarmProp("nvz",e.target.value==="yes")} style={SS}><option value="no">No</option><option value="yes">Yes — NVZ</option></select></div>
            </div>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Contact & Address</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              <div style={{gridColumn:"1/-1"}}><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Address</div><textarea value={farm?.address||""} onChange={e=>setFarmProp("address",e.target.value)} placeholder="Farm address..." rows={2} style={{...TI,resize:"vertical",fontSize:11}} /></div>
              <div style={{position:"relative"}} data-autocomplete-container>
                <div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Postcode</div>
                <input value={postcodeInput} onChange={e=>handlePostcodeChange(e.target.value)} onFocus={()=>placeSuggestions.length>0&&setShowSuggestions(true)} placeholder="Type postcode or address..." style={{...TI,position:"relative",zIndex:10}} />
                {showSuggestions && placeSuggestions.length > 0 && (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #d4dace",borderRadius:6,boxShadow:"0 4px 12px rgba(0,0,0,0.08)",zIndex:1001,maxHeight:"200px",overflowY:"auto",marginTop:4}}>
                    {placeSuggestions.map((suggestion, idx) => (
                      <div key={idx} onClick={(e)=>{e.preventDefault();e.stopPropagation();handleSuggestionSelect(suggestion);}} style={{padding:"8px 12px",cursor:"pointer",fontSize:11,borderBottom:"1px solid #f0f2ee",color:"#1a2e1a",transition:"background 0.15s",userSelect:"none"}} onMouseEnter={e=>e.currentTarget.style.background="#f7f8f6"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{fontWeight:600}}>{suggestion.main_text}</div>
                        <div style={{color:"#6b7b6b",fontSize:9}}>{suggestion.secondary_text}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Postcode (confirmed)</div><input value={farm?.postcode||""} onChange={e=>setFarmProp("postcode",e.target.value)} placeholder="Will auto-fill from selection" style={{...TI,background:"#f7f8f6"}} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Contact name</div><input value={farm?.contact||""} onChange={e=>setFarmProp("contact",e.target.value)} placeholder="" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Phone</div><input value={farm?.phone||""} onChange={e=>setFarmProp("phone",e.target.value)} placeholder="" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Email</div><input value={farm?.email||""} onChange={e=>setFarmProp("email",e.target.value)} placeholder="" style={TI} /></div>
            </div>
          </div>
          {/* Crop breakdown summary */}
          {Object.keys(cropSummary).length > 0 && (
            <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Cropping Summary</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {Object.entries(cropSummary).map(([lbl,d])=>(
                  <div key={lbl} style={{padding:"6px 12px",background:"#f7f8f6",borderRadius:6,fontSize:11}}>
                    <div style={{fontWeight:700,color:"#1a2e1a"}}>{lbl}</div>
                    <div style={{color:"#6b7b6b"}}>{d.ha.toFixed(1)} ha</div>
                    {d.rev > 0 && <div style={{color:"#2c6e3f",fontSize:10}}>{"£"}{(d.rev/1000).toFixed(0)}k gross</div>}
                  </div>
                ))}
              </div>
              {anyCosts && (
                <div style={{display:"flex",gap:12,marginTop:8,fontSize:12}}>
                  <span style={{color:"#2c6e3f",fontWeight:700}}>{"£"}{farmGross.toLocaleString()} gross</span>
                  <span style={{color:"#c0392b",fontWeight:700}}>{"-£"}{farmCosts.toLocaleString()} costs</span>
                  <span style={{fontWeight:800,color:farmMargin>=0?"#2c6e3f":"#c0392b"}}>{"£"}{farmMargin.toLocaleString()} margin</span>
                </div>
              )}
            </div>
          )}
          {/* Advisor Profile */}
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,marginTop:10,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Advisor Details</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Advisor name</div><input value={advisorProfile?.name||""} onChange={e=>updateAdvisor("name",e.target.value)} placeholder="e.g. Rob Smith" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Company</div><input value={advisorProfile?.company||""} onChange={e=>updateAdvisor("company",e.target.value)} placeholder="Crop Dynamics" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>BASIS Registration No.</div><input value={advisorProfile?.basis||""} onChange={e=>updateAdvisor("basis",e.target.value)} placeholder="e.g. B/1234/5678" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>FACTS Qualification No.</div><input value={advisorProfile?.facts||""} onChange={e=>updateAdvisor("facts",e.target.value)} placeholder="e.g. F/1234/5678" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Phone</div><input value={advisorProfile?.phone||""} onChange={e=>updateAdvisor("phone",e.target.value)} placeholder="" style={TI} /></div>
              <div><div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Email</div><input value={advisorProfile?.email||""} onChange={e=>updateAdvisor("email",e.target.value)} placeholder="" style={TI} /></div>
            </div>
            <div style={{fontSize:9,color:"#94a394",marginTop:6}}>These details appear on all recommendation documents and PDF exports. BASIS registration is required for crop protection recommendations. FACTS qualification is required for fertiliser recommendations.</div>
          </div>
        </div>
      )}

      {/* ═══ FIELDS ═══ */}
      {subTab === "fields" && (
        <div>
          {/* Import fields panel */}
          <div style={{background:"#ffffff",border:"1px solid #e2e6de",borderRadius:8,padding:10,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#6b7b6b",textTransform:"uppercase"}}>Import Fields</div>
              <button onClick={() => setShowImport(v => !v)} style={{padding:"4px 12px",fontSize:11,fontWeight:600,background:showImport?"#2c6e3f0a":"#f0f2ee",color:showImport?"#2c6e3f":"#6b7b6b",border:"none",borderRadius:8,cursor:"pointer"}}>{showImport ? "Close" : "Import from file"}</button>
            </div>
            {showImport && (
              <div style={{marginTop:8}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                  <label style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:"#4a7c590a",color:"#4a7c59",border:"none",borderRadius:8,cursor:"pointer"}}>Upload CSV / Excel<input type="file" accept=".csv,.tsv,.txt,.xls,.xlsx" onChange={handleCSV} style={{display:"none"}} /></label>
                  <label style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:"#c17f240a",color:"#c17f24",border:"none",borderRadius:8,cursor:"pointer"}}>Upload PDF<input type="file" accept=".pdf" onChange={handlePDF} style={{display:"none"}} /></label>
                </div>
                <div style={{fontSize:10,color:"#94a394",marginBottom:6}}>CSV/TSV with columns: Field Name, Ha/Acres, Crop. Or paste field data below.</div>
                <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste field data here (name, ha, crop per line)..." rows={3} style={{...TI,fontSize:11,resize:"vertical",width:"100%"}} />
                <button onClick={() => { if(!pasteText.trim())return; const lines=pasteText.trim().split(/\r?\n/).filter(l=>l.trim()); const sep=lines[0].includes("\t")?"\t":","; const rows=lines.map(l=>{const p=l.split(sep).map(s=>s.trim()); return{name:p[0]||"",ha:p[1]||"0",crop:p[2]||""};}); importRows(rows); setPasteText(""); setImportMsg(`Imported ${rows.length} fields from paste.`); }} style={{marginTop:4,padding:"4px 12px",fontSize:11,fontWeight:600,background:"#2c6e3f10",color:"#2c6e3f",border:"1px solid #2c6e3f22",borderRadius:6,cursor:"pointer"}}>Import pasted data</button>
                {importMsg && <div style={{fontSize:11,color:"#2c6e3f",marginTop:4,fontWeight:600}}>{importMsg}</div>}
              </div>
            )}
          </div>

          {/* Field rows */}
          {fields.map(f => {
            const cr = CROPS.find(c=>c.id===f.crop);
            const rev = (f.ha||0)*(f.yieldT||0)*(f.grainPrice||0);
            const fc = fieldCosts(f.id);
            const totalFieldCost = fc.total * (f.ha||0);
            const margin = rev - totalFieldCost;
            const hasCosts = fc.total > 0;
            return (
              <div key={f.id} style={{background:"#ffffff",border:"1px solid #e2e6de",borderRadius:6,padding:10,marginBottom:5,borderLeft:`4px solid ${f.color}`}}>
                <div style={{display:"flex",gap:6,alignItems:"flex-end",flexWrap:"wrap",marginBottom:4}}>
                  <div style={{flex:"1 1 130px"}}><div style={{fontSize:8,color:"#6b7b6b",marginBottom:2}}>Field name</div><input value={f.name} onChange={e=>uf(f.id,"name",e.target.value)} style={{...TI,fontWeight:700}} /></div>
                  <div style={{flex:"0 0 55px"}}><div style={{fontSize:8,color:"#6b7b6b",marginBottom:2}}>Ha</div><NumInput value={f.ha} onChange={v=>uf(f.id,"ha",v)} w={55} /></div>
                  <div style={{flex:"0 0 125px"}}><div style={{fontSize:8,color:"#6b7b6b",marginBottom:2}}>Crop</div><select value={f.crop} onChange={e=>onCropChange(f.id,e.target.value)} style={SS}>{CROPS.map(c=>(<option key={c.id} value={c.id}>{c.label}</option>))}</select></div>
                  <div style={{flex:"0 0 55px"}}><div style={{fontSize:8,color:"#6b7b6b",marginBottom:2}}>Yield t/ha</div><NumInput value={f.yieldT} onChange={v=>uf(f.id,"yieldT",v)} w={55} /></div>
                  <div style={{flex:"0 0 60px"}}><div style={{fontSize:8,color:"#6b7b6b",marginBottom:2}}>{"£"}/t</div><NumInput value={f.grainPrice} onChange={v=>uf(f.id,"grainPrice",v)} w={60} /></div>
                  <button onClick={()=>rmField(f.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:14}}>{"x"}</button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom: hasCosts ? 6 : 0}}>
                  <span style={{fontSize:8,color:"#6b7b6b"}}>Soil:</span>
                  <div><span style={{fontSize:7,color:"#6b7b6b"}}>SNS </span><select value={f.sns} onChange={e=>uf(f.id,"sns",e.target.value)} style={{...SS,fontSize:8,padding:"2px 4px"}}><option value="sns_low">Low</option><option value="sns_med">Med</option><option value="sns_high">High</option></select></div>
                  <div><span style={{fontSize:7,color:"#6b7b6b"}}>P </span><select value={f.pIdx} onChange={e=>uf(f.id,"pIdx",e.target.value)} style={{...SS,fontSize:8,padding:"2px 4px"}}><option value="i0">0</option><option value="i1">1</option><option value="i2">2</option><option value="i3">3+</option></select></div>

                {(rev > 0 || hasCosts) && (

                    {fc.cp > 0 && <span style={{color:"#c17f24"}}>Fung {"£"}{(fc.cp * (f.ha||0)).toFixed(0)}</span>}
                    {fc.herb > 0 && <span style={{color:"#3a8a6e"}}>Herb {"£"}{(fc.herb * (f.ha||0)).toFixed(0)}</span>}
                    {fc.fert > 0 && <span style={{color:"#4a7c59"}}>Fert {"£"}{(fc.fert * (f.ha||0)).toFixed(0)}</span>}
                    {fc.ops > 0 && <span style={{color:"#b8922a"}}>Ops {"£"}{(fc.ops * (f.ha||0)).toFixed(0)}</span>}
                    {hasCosts && <span style={{color:"#a63d2b",fontWeight:600}}>Costs {"£"}{totalFieldCost.toFixed(0)}</span>}

      {/* ═══ CROPPING PLAN ═══ */}
      {subTab === "cropping" && (

            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>

                  {["Yr-1","Yr-2","Yr-3","Yr-4","Yr-5"].map((yr,i) => (
                    <th key={yr} style={{textAlign:"center",padding:"5px 6px",color:"#6b7b6b",fontWeight:600,fontSize:10}}>{yr} ({new Date().getFullYear()-i-1})</th>

                </tr></thead>
                <tbody>
                  {fields.map(f => {
                    const rot = f.rotation || ["","","","",""];
                    const isLeg = ["w_beans","s_beans","peas"].includes(rot[0]);
                    const is2W = f.crop==="w_wheat" && rot[0]==="w_wheat";
                    const is3W = f.crop==="w_wheat" && rot[0]==="w_wheat" && rot[1]==="w_wheat";
                    return (
                      <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                        <td style={{padding:"4px 6px",fontWeight:700,borderLeft:`3px solid ${f.color}`,whiteSpace:"nowrap"}}>{f.name}</td>

                          <select value={f.crop} onChange={e=>onCropChange(f.id,e.target.value)} style={{...SS,fontSize:10,padding:"2px 3px",width:"100%"}}>
                            {CROPS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                          </select>
                        </td>
                        {[0,1,2,3,4].map(yi => (
                          <td key={yi} style={{padding:"3px 4px",textAlign:"center"}}>
                            <select value={rot[yi]||""} onChange={e => { const r=[...rot]; r[yi]=e.target.value; uf(f.id,"rotation",r); }} style={{...SS,fontSize:10,padding:"2px 3px",width:"100%",color:rot[yi]?"#1a2e1a":"#d4dace"}}>
                              <option value="">—</option>
                              {CROPS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
                            </select>

                        <td style={{padding:"4px 6px",fontSize:9,color:isLeg?"#2c6e3f":is3W?"#c0392b":is2W?"#c17f24":"#94a394",fontWeight:isLeg||is2W||is3W?700:400}}>
                          {isLeg ? "↓ Legume credit" : is3W ? "⚠ 3rd wheat" : is2W ? "↑ 2nd wheat +20kg N" : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:10,color:"#94a394",marginTop:8}}>Previous legume crop (beans, peas) = raise SNS index by 1. 2nd continuous wheat = add ~20kg N/ha. 3rd+ continuous wheat = yield penalty and take-all risk. This rotation data is automatically used in the Fertiliser tab nutrient recommendations.</div>
          </div>
          {/* Rotation summary badges */}
          {fields.length > 0 && (
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {(() => { const counts = {}; fields.forEach(f => { const lbl = CROPS.find(c=>c.id===f.crop)?.label||"Other"; counts[lbl] = (counts[lbl]||0) + (f.ha||0); }); return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([lbl,ha]) => <span key={lbl} style={{padding:"3px 10px",background:"#f0f2ee",borderRadius:4,fontSize:10,color:"#6b7b6b"}}>{lbl}: <strong style={{color:"#1a2e1a"}}>{ha.toFixed(1)} ha</strong></span>); })()}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// PGR & Trace product database

];

const CropProtProgramme = ({fields, onBudget, onHerbBudget, saved, savedHerb, onSave, onHerbSave, jobs, setJobs}) => {
  const [cropMode, setCropMode] = useState(saved?.cropMode || "cereal");
  const ts = UNI_TIMINGS[cropMode];
  const mkEmpty = () => { const o = {}; ts.ids.forEach(t => o[t] = []); return o; };
  // Migrate old data: if saved has T0/T1/T2/T3 only, expand to unified
  const migrateOld = (oldProgs) => {
    if (!oldProgs) return [{id:1,name:"Programme 1",prog:mkEmpty(),fieldIds:[],progNote:""}];
    return oldProgs.map(p => {
      const np = mkEmpty();
      // Copy existing timing data
      Object.keys(p.prog||{}).forEach(k => { if(np.hasOwnProperty(k)) np[k] = p.prog[k]; else if(ts.ids.includes(k)) np[k] = p.prog[k]; });
      return {...p, prog: np, progNote: p.progNote || ""};
    });
  };
  const [progs, setProgs] = useState(() => migrateOld(saved?.progs));
  const [activeProg, setActiveProg] = useState(saved?.activeProg || 1);
  const [prices, setPrices] = useState(saved?.prices || {});
  const [showPricing, setShowPricing] = useState(false);
  const [customProds, setCustomProds] = useState(saved?.customProds || []);
  const [showCF, setShowCF] = useState(false);
  const [cf, setCf] = useState({name:"",maxRate:1,notes:"",ptype:"fung",actives:[{name:"",conc:0}]});
  const [pdfProgs, setPdfProgs] = useState(saved?.pdfProgs || {});
  const [prodFilter, setProdFilter] = useState("all"); // all|fung|herb|pgr|trace
  const [prodSearch, setProdSearch] = useState(""); // product search query
  const [showTemplates, setShowTemplates] = useState(false);
  const [templates, setTemplates] = useState(saved?.templates || []);
  const [customTimingLabels, setCustomTimingLabels] = useState(saved?.customTimingLabels || {});
  const [editingTimingId, setEditingTimingId] = useState(null);
  const [editLabel, setEditLabel] = useState("");

  // Also load herb data if present
  const [herbPrices, setHerbPrices] = useState(savedHerb?.prices || {});

  // Merge all prices
  const allPrices = {...prices, ...herbPrices};

  useEffect(() => {
    if(onSave) onSave({progs, activeProg, prices, customProds, pdfProgs, templates, cropMode, customTimingLabels});
  }, [progs, activeProg, prices, customProds, pdfProgs, templates, cropMode, customTimingLabels, ap?.progNote]);

  // Build unified product catalogue
  const allFung = PRODUCTS.map(p => ({...p, ptype:"fung"}));
  const allHerb = HERB_PRODUCTS.filter(p => {
    const cropIds = cropMode === "cereal" ? ["w_wheat","s_wheat","w_barley","s_barley","w_oats","s_oats"] : ["w_osr"];
    return p.crops.some(c => cropIds.includes(c));
  }).map(p => ({...p, ptype:"herb"}));
  const allPGR = PGR_PRODUCTS.filter(p => {
    const cropIds = cropMode === "cereal" ? ["w_wheat","s_wheat","w_barley","s_barley","w_oats","s_oats"] : ["w_osr"];
    return p.crops.some(c => cropIds.includes(c));
  });
  const allTrace = TRACE_PRODUCTS.filter(p => {
    const cropIds = cropMode === "cereal" ? ["w_wheat","s_wheat","w_barley","s_barley","w_oats","s_oats"] : ["w_osr"];
    return p.crops.some(c => cropIds.includes(c));
  });
  const allCustom = customProds.map(p => ({...p, ptype: p.ptype || "custom"}));
  const allProds = [...allFung, ...allHerb, ...allPGR, ...allTrace, ...allCustom];

  const gp = n => allPrices[n]||{price:0,packSize:0};
  const sp = (n,f,v) => setPrices(p=>({...p,[n]:{...(p[n]||{price:0,packSize:0}),[f]:Math.max(0,+v||0)}}));
  const cph = p => { const pr=gp(p.name); return (pr.price&&pr.packSize)?(p.rate/pr.packSize)*pr.price:null; };

  // Programme CRUD
  const addProg = () => {
    const id = Date.now();
    setProgs(p => [...p, {id, name: `Programme ${p.length + 1}`, prog: mkEmpty(), fieldIds: [], progNote: ""}]);
    setActiveProg(id);
  };
  const rmProg = id => { if (progs.length <= 1) return; setProgs(p => p.filter(x => x.id !== id)); if (activeProg === id) setActiveProg(progs.find(x => x.id !== id)?.id); };
  const dupProg = (id) => { const src = progs.find(p => p.id === id); if (!src) return; const nid = Date.now(); const np = {}; Object.keys(src.prog).forEach(k => np[k] = [...src.prog[k]]); setProgs(p => [...p, {id: nid, name: src.name + " (copy)", prog: np, fieldIds: [], progNote: src.progNote || ""}]); setActiveProg(nid); };
  const uProgName = (id, name) => setProgs(p => p.map(x => x.id === id ? {...x, name} : x));
  const uProgNote = (id, note) => setProgs(p => p.map(x => x.id === id ? {...x, progNote: note} : x));

  const ap = progs.find(p => p.id === activeProg) || progs[0];
  const prog = ap?.prog || mkEmpty();
  const setProg = (newProg) => setProgs(p => p.map(x => x.id === ap.id ? {...x, prog: typeof newProg === "function" ? newProg(x.prog) : newProg} : x));

  // Field assignment
  const toggleField = (fId) => {
    const inThis = ap.fieldIds.includes(fId);
    if (inThis) { setProgs(p => p.map(x => x.id === ap.id ? {...x, fieldIds: x.fieldIds.filter(id => id !== fId)} : x)); }
    else { setProgs(p => p.map(x => x.id === ap.id ? {...x, fieldIds: [...x.fieldIds, fId]} : {...x, fieldIds: x.fieldIds.filter(id => id !== fId)})); }
  };

  const add = (t,p) => { if((prog[t]||[]).find(x=>x.name===p.name))return; setProg(prev => ({...prev,[t]:[...(prev[t]||[]),{...p,rate:+(p.maxRate*0.75).toFixed(2)}]})); };
  const rm = (t,n) => setProg(prev => ({...prev,[t]:(prev[t]||[]).filter(p=>p.name!==n)}));
  const sr = (t,n,r) => setProg(prev => ({...prev,[t]:(prev[t]||[]).map(p=>p.name===n?{...p,rate:Math.max(0,+r||0)}:p)}));

  // Cost calculation
  const calcProgCost = (pr) => {
    let cost = 0;
    ts.ids.forEach(t => (pr.prog[t]||[]).forEach(p => { const c = cph(p); if(c) cost += c; }));
    return cost;
  };
  // Cost by product type
  const calcTypeCosts = (pr) => {
    const costs = {fung:0,herb:0,pgr:0,trace:0,custom:0};
    ts.ids.forEach(t => (pr.prog[t]||[]).forEach(p => { const c = cph(p); if(c) costs[p.ptype||"custom"] += c; }));
    return costs;
  };

  const anyP = Object.values(allPrices).some(p=>p.price>0&&p.packSize>0);
  const progCost = calcProgCost(ap);
  const typeCosts = calcTypeCosts(ap);
  const apFieldHa = ap.fieldIds.reduce((s, id) => s + (fields.find(f => f.id === id)?.ha || 0), 0);

  // Report to budget — split fung/herb costs
  useEffect(() => {
    const allFieldIds = [];
    let totalFungWeighted = 0, totalHerbWeighted = 0, totalHa = 0;
    progs.forEach(pr => {
      const tc = calcTypeCosts(pr);
      const fungCost = tc.fung + tc.pgr + tc.trace + tc.custom;
      const herbCost = tc.herb;
      pr.fieldIds.forEach(fId => {
        if (!allFieldIds.includes(fId)) {
          allFieldIds.push(fId);
          const fHa = fields.find(f => f.id === fId)?.ha || 0;
          totalFungWeighted += fungCost * fHa;
          totalHerbWeighted += herbCost * fHa;
          totalHa += fHa;
        }
      });
    });
    const avgFung = totalHa > 0 ? totalFungWeighted / totalHa : (typeCosts.fung+typeCosts.pgr+typeCosts.trace+typeCosts.custom);
    const avgHerb = totalHa > 0 ? totalHerbWeighted / totalHa : typeCosts.herb;
    onBudget(avgFung, allFieldIds, {programmes: progs.map(pr => ({id:pr.id,name:pr.name,fieldIds:pr.fieldIds,fieldCount:pr.fieldIds.length,totalHa:pr.fieldIds.reduce((s,id)=>s+(fields.find(f=>f.id===id)?.ha||0),0),costHa:calcProgCost(pr),timings:ts.ids.map(t=>({id:t,label:ts.info[t].gs,products:(pr.prog[t]||[]).map(p=>({name:p.name,rate:p.rate,unit:p.unit||"L/ha",maxRate:p.maxRate,ptype:p.ptype,costHa:cph(p),actives:(p.actives||[]).map(a=>({name:a.name,gHa:Math.round(a.conc*p.rate)}))}))}))})),totalCostHa:calcProgCost(ap)});
    if(onHerbBudget) onHerbBudget(avgHerb, allFieldIds, {mode:cropMode,totalCostHa:avgHerb});
  }, [progs, prices, fields, cropMode]);

  // Stewardship checks
  const warns = [];
  {
    const allItems = ts.ids.flatMap(t => (prog[t]||[]));
    const fungItems = allItems.filter(p => p.ptype === "fung");
    const herbItems = allItems.filter(p => p.ptype === "herb");
    // Fungicide checks
    let c7=0,c21=0,c11=0,cI=0;
    ts.ids.forEach(t=>{const items=prog[t]||[];if(items.some(p=>p.ptype==="fung"&&(p.fracs||"").includes("7")))c7++;if(items.some(p=>p.ptype==="fung"&&(p.fracs||"").includes("21")))c21++;if(items.some(p=>p.ptype==="fung"&&(p.fracs||"").includes("11")))c11++;if(items.some(p=>p.actives?.some(a=>a.name==="isoflucypram")))cI++;});

    setProductSearch(prev => ({...prev, [itemKey]: query}));
    if (query.length < 1) {
      setProductSuggestions(prev => ({...prev, [itemKey]: []}));
      setShowProductSuggestions(prev => ({...prev, [itemKey]: false}));
      return;
    }
    const q = query.toLowerCase();
    const matches = FERT_CATALOGUE.filter(p => p.name.toLowerCase().includes(q)).slice(0, 7);
    const withCustom = [...matches, {id:"custom_product",name:"+ Create Custom Product",grade:"Custom",isCustom:true}];
    setProductSuggestions(prev => ({...prev, [itemKey]: withCustom}));
    setShowProductSuggestions(prev => ({...prev, [itemKey]: matches.length > 0 || query.length > 0}));
  };

  const handleProductSelect = (splitId, itemId, product) => {
    const itemKey = `${splitId}-${itemId}`;
    if (product.isCustom) {
      // Open custom product dialog - for now just clear search
      const grade = productSearch[itemKey] || '';
      setSplits(s=>s.map(sp=>sp.id===splitId?{...sp,items:sp.items.map(x=>x.id===itemId?{...x,name:grade,grade:'custom',N:0,P:0,K:0,SO3:0,isCustom:true}:x)}:sp));
    } else {
      setSplits(s=>s.map(sp=>sp.id===splitId?{...sp,items:sp.items.map(x=>x.id===itemId?{...x,name:product.name,grade:product.grade,N:product.N,P:product.P,K:product.K,SO3:product.SO3,isCustom:false}:x)}:sp));
    }
    setProductSearch(prev => ({...prev, [itemKey]: ''}));
    setProductSuggestions(prev => ({...prev, [itemKey]: []}));
    setShowProductSuggestions(prev => ({...prev, [itemKey]: false}));
  };

  // Handle closing product suggestions when clicking outside
  useEffect(() => {
    const handleClickOutside = (e) => {
      if (!e.target.closest('[data-product-search]')) {
        setShowProductSuggestions({});
      }
      if (!e.target.closest('[data-comp-search]')) {
        setShowCompSuggestions({});
      }
    };
    document.addEventListener('click', handleClickOutside);
    return () => document.removeEventListener('click', handleClickOutside);
  }, []);

  // Comparison product search handlers
  const handleCompProductSearch = (progKey, itemKey, query) => {
    setCompSearch(prev => ({...prev, [`${progKey}-${itemKey}`]: query}));
    if (query.length < 1) {
      setCompSuggestions(prev => ({...prev, [`${progKey}-${itemKey}`]: []}));
      setShowCompSuggestions(prev => ({...prev, [`${progKey}-${itemKey}`]: false}));
      return;
    }
    const q = query.toLowerCase();
    const matches = FERT_CATALOGUE.filter(p => p.name.toLowerCase().includes(q)).slice(0, 7);
    const withCustom = [...matches, {id:"custom_product",name:"+ Create Custom Product",grade:"Custom",isCustom:true}];
    setCompSuggestions(prev => ({...prev, [`${progKey}-${itemKey}`]: withCustom}));
    setShowCompSuggestions(prev => ({...prev, [`${progKey}-${itemKey}`]: matches.length > 0 || query.length > 0}));
  };

  const handleCompProductSelect = (progId, itemId, product) => {
    const itemKey = `${progId}-${itemId}`;
    if (product.isCustom) {
      const grade = compSearch[itemKey] || '';
      setCompProgs(progs => progs.map(p => p.id === progId ? {...p, items: p.items.map(x => x.id === itemId ? {...x, name: grade, grade: 'custom', N: 0, P: 0, K: 0, SO3: 0, isCustom: true, isLiquid: false, sg: 1.2} : x)} : p));
    } else {
      setCompProgs(progs => progs.map(p => p.id === progId ? {...p, items: p.items.map(x => x.id === itemId ? {...x, name: product.name, grade: product.grade, N: product.N, P: product.P, K: product.K, SO3: product.SO3, isCustom: false, isLiquid: product.isLiquid || false, sg: product.sg || 1.2} : x)} : p));
    }
    setCompSearch(prev => ({...prev, [itemKey]: ''}));
    setCompSuggestions(prev => ({...prev, [itemKey]: []}));
    setShowCompSuggestions(prev => ({...prev, [itemKey]: false}));
  };

  const addCompItem = (progId, isManure=false) => setCompProgs(p => p.map(prog => prog.id === progId ? {...prog, items: [...prog.items, isManure ? {id: Date.now(), name: '', isManure: true, manureType: 'slurry', rateT: 0, N: 0, P: 0, K: 0, SO3: 0, price: 0, costUnit: '£/t', isLiquid: false} : {id: Date.now(), name: '', grade: '', N: 0, P: 0, K: 0, SO3: 0, driveNut: 'N', driveKg: 0, isLiquid: false, sg: 1.2, isCustom: false, isManure: false, price: 0}]} : prog));
  const rmCompItem = (progId, itemId) => setCompProgs(p => p.map(prog => prog.id === progId ? {...prog, items: prog.items.filter(x => x.id !== itemId)} : prog));
  const ufComp = (progId, itemId, f, v) => setCompProgs(p => p.map(prog => prog.id === progId ? {...prog, items: prog.items.map(x => x.id === itemId ? {...x, [f]: v} : x)} : prog));
  const addCompProg = () => setCompProgs(p => [...p, {id: Date.now(), name: `Programme ${p.length + 1}`, crop: '', items: []}]);
  const rmCompProg = (id) => setCompProgs(p => p.filter(x => x.id !== id));
  const renCompProg = (id, name) => setCompProgs(p => p.map(x => x.id === id ? {...x, name} : x));
  const setCompProgCrop = (id, crop) => setCompProgs(p => p.map(x => x.id === id ? {...x, crop} : x));

  const calcCompCost = (prog) => {
    const cropRb = compCrop ? RB209[compCrop] : null;
    const compNeedN = cropRb ? cropRb.N.sns_med : 0;
    let totalCost = 0;
    let totalN = 0;
    let totalP = 0;
    let totalK = 0;
    let totalSO3 = 0;
    let totalTha = 0;
    let totalLiquidM3 = 0;
    prog.items.forEach(it => {
      // Manure handling
      if (it.isManure && it.rateT) {
        const cost = it.rateT * (it.price || 0);
        totalCost += cost;
        totalTha += it.rateT;
        if (it.isLiquid) {
          totalLiquidM3 += it.rateT; // For manures, rateT can represent m³
        }
        totalN += it.rateT * (it.N || 0);
        totalP += it.rateT * (it.P || 0);
        totalK += it.rateT * (it.K || 0);
        totalSO3 += it.rateT * (it.SO3 || 0);
      } else if (it.driveKg && it[it.driveNut]) {
        // Regular fertiliser handling
        const tHa = it.driveKg / (it[it.driveNut] * 10);
        const cost = tHa * (it.price || 0);
        totalCost += cost;
        totalTha += tHa;
        if (it.isLiquid && it.sg) {
          const m3Ha = tHa / (it.sg || 1.2);
          totalLiquidM3 += m3Ha;
        }
        // Track all nutrients
        totalN += tHa * it.N * 10;
        totalP += tHa * it.P * 10;
        totalK += tHa * it.K * 10;
        totalSO3 += tHa * it.SO3 * 10;
      }
    });
    return {cost: totalCost * compHa, costHa: totalCost, N: totalN, P: totalP, K: totalK, SO3: totalSO3, needN: compNeedN, percent: compNeedN > 0 ? (totalN / compNeedN * 100).toFixed(0) : 0, totalTha, totalTotalT: totalTha * compHa, totalLiquidM3, totalLiquidM3Total: totalLiquidM3 * compHa};
  };

  const progMatchesFilter = (prog) => {
    if (compProductType === "all") return true;
    const hasLiquid = prog.items.some(it => it.isLiquid);
    const hasSolid = prog.items.some(it => !it.isLiquid);
    if (compProductType === "liquid") return hasLiquid;
    if (compProductType === "solid") return hasSolid;
    return true;
  };

  const getNutrientMatchColor = (prog) => {
    // If no target nutrients set, return neutral
    if (targetN === 0 && targetP === 0 && targetK === 0 && targetSO3 === 0) return "#f7f8f6";
    
    const costs = calcCompCost(prog);
    let matches = 0;
    let total = 0;
    
    // Check each nutrient - must be within 10% tolerance
    if (targetN > 0) {
      total++;
      if (costs.N >= targetN * 0.9 && costs.N <= targetN * 1.1) matches++;
    }
    if (targetP > 0) {
      total++;
      if (costs.P >= targetP * 0.9 && costs.P <= targetP * 1.1) matches++;
    }
    if (targetK > 0) {
      total++;
      if (costs.K >= targetK * 0.9 && costs.K <= targetK * 1.1) matches++;
    }
    if (targetSO3 > 0) {
      total++;
      if (costs.SO3 >= targetSO3 * 0.9 && costs.SO3 <= targetSO3 * 1.1) matches++;
    }
    
    if (total === 0) return "#f7f8f6";
    const matchPercent = matches / total;
    
    if (matchPercent === 1) return "#2c6e3f1a"; // Green - all match
    if (matchPercent >= 0.5) return "#f39c121a"; // Amber - some match
    return "#c0392b1a"; // Red - most don't match
  };

  const getNutrientMatchBorder = (prog) => {
    if (targetN === 0 && targetP === 0 && targetK === 0 && targetSO3 === 0) return "#d4dace";
    
    const costs = calcCompCost(prog);
    let matches = 0;
    let total = 0;
    
    if (targetN > 0) {
      total++;
      if (costs.N >= targetN * 0.9 && costs.N <= targetN * 1.1) matches++;
    }
    if (targetP > 0) {
      total++;
      if (costs.P >= targetP * 0.9 && costs.P <= targetP * 1.1) matches++;
    }
    if (targetK > 0) {
      total++;
      if (costs.K >= targetK * 0.9 && costs.K <= targetK * 1.1) matches++;
    }
    if (targetSO3 > 0) {
      total++;
      if (costs.SO3 >= targetSO3 * 0.9 && costs.SO3 <= targetSO3 * 1.1) matches++;
    }
    
    if (total === 0) return "#d4dace";
    const matchPercent = matches / total;
    
    if (matchPercent === 1) return "#2c6e3f";
    if (matchPercent >= 0.5) return "#f39c12";
    return "#c0392b";
  };

  const livestockHerds = progState?.livestock?.herds || [];
  const taggedFieldData = fields.filter(f=>taggedFields.includes(f.id));
  const splitTotals = splits.map(sp => { const t={N:0,P:0,K:0,SO3:0}; sp.items.forEach(it=>FNUTS.forEach(n=>{t[n]+=nutAt(it,n);})); let cost=0; sp.items.filter(it=>!it.isManure).forEach(it=>{const{tHa}=calcRate(it);if(it.price>0)cost+=tHa*it.price;}); const mNT=sp.items.filter(it=>it.isManure).reduce((s,it)=>s+(it.rateT||0)*(it.nTotal||0),0); return{id:sp.id,label:sp.label,...t,cost,mNT}; });
  const grandTot = {N:0,P:0,K:0,SO3:0,cost:0,mNT:0}; splitTotals.forEach(st=>{FNUTS.forEach(n=>{grandTot[n]+=st[n];}); grandTot.cost+=st.cost; grandTot.mNT+=st.mNT;});
  const rb = crop ? RB209[crop] : null;
  const nRec=rb?rb.N[sns]:0, pRec=rb?rb.P[pIdx]:0, kRec=rb?rb.K[kIdx]:0, sRec=rb?rb.S[sStat]:0;
  const recs = {N:nRec, P:pRec?Math.round(pRec/0.4364):0, K:kRec?Math.round(kRec/0.8302):0, SO3:sRec};
  const taggedHa = taggedFields.reduce((s,id)=>s+(fields.find(f=>f.id===id)?.ha||0),0);
  useEffect(() => { const pd={splits:splits.map(sp=>({label:sp.label,completedDate:sp.completedDate,items:sp.items.filter(it=>it.name).map(it=>({name:it.name,grade:it.grade,isManure:it.isManure,driveKg:it.driveKg,rateT:it.rateT,price:it.price}))})),totalCostHa:grandTot.cost}; onBudget(grandTot.cost,taggedFields,pd); }, [grandTot.cost,taggedFields,splits]);
  const toggleFav = (id,type) => type==="fert"?setFavFerts(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]):setFavManures(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  return (<div>
    {/* Tab navigation */}
    <div style={{display:"flex",gap:3,marginBottom:12}}>
      <button onClick={()=>setFertTab("fertiliser")} style={{padding:"8px 16px",fontSize:12,fontWeight:700,borderRadius:6,border:"none",cursor:"pointer",background:fertTab==="fertiliser"?"#2c6e3f":"#f0f2ee",color:fertTab==="fertiliser"?"#fff":"#6b7b6b",transition:"all 0.15s"}}><span style={{display:"inline-block",marginRight:6}}>💚</span>Fertiliser Programme</button>
      <button onClick={()=>setFertTab("comparison")} style={{padding:"8px 16px",fontSize:12,fontWeight:700,borderRadius:6,border:"none",cursor:"pointer",background:fertTab==="comparison"?"#2c6e3f":"#f0f2ee",color:fertTab==="comparison"?"#fff":"#6b7b6b",transition:"all 0.15s"}}><span style={{display:"inline-block",marginRight:6}}>📊</span>Cost Comparison</button>
    </div>

    {fertTab === "fertiliser" && (<div>
      {fields.length > 0 && <FieldTag fields={fields} selectedIds={taggedFields} onChange={setTaggedFields} label="Apply fertiliser programme to" />}
    {taggedHa > 0 && grandTot.cost > 0 && (
      <div style={{background:"#b8922a08",border:"1px solid #b8922a22",borderRadius:8,padding:"4px 10px",marginBottom:8,display:"flex",gap:12,flexWrap:"wrap",fontSize:10,alignItems:"center"}}>
        <span style={{color:"#b8922a",fontWeight:700}}>{"£"}{grandTot.cost.toFixed(2)}/ha × {taggedHa.toFixed(1)} ha = {"£"}{(grandTot.cost*taggedHa).toFixed(0)} total</span>
        <button onClick={()=>{ const nj=[]; splits.forEach(sp=>{ const its=sp.items.filter(it=>it.name); if(!its.length)return; if((jobs||[]).find(j=>j.source==="fertiliser"&&j.splitId===sp.id))return; nj.push({id:Date.now()+Math.random(),source:"fertiliser",splitId:sp.id,type:"fert",status:sp.completedDate?"completed":"planned",created:new Date().toISOString().split("T")[0],completedDate:sp.completedDate||"",label:`Fert — ${sp.label}`,products:its.map(it=>({name:it.name,rate:it.isManure?it.rateT:it.driveKg,unit:it.isManure?"t/ha":"kg/ha",grade:it.grade})),fieldIds:[...taggedFields],description:its.map(it=>it.isManure?`${it.name} ${it.rateT||""}t/ha`:`${it.name} ${it.driveKg||""}kg/ha`).join(" + ")}); }); if(nj.length>0){setJobs(p=>[...(p||[]),...nj]);alert(`Created ${nj.length} job${nj.length>1?"s":""}`);}else alert("No new jobs."); }} style={{padding:"3px 10px",fontSize:10,background:"#2c6e3f0a",color:"#2c6e3f",border:"1px solid #2c6e3f22",borderRadius:6,cursor:"pointer",fontWeight:600,marginLeft:"auto"}}>Create Jobs →</button>
      </div>
    )}
    {/* Per-field nutrient requirements from cropping data */}
    {taggedFieldData.length > 0 && (
      <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:"8px 12px",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:"#6b5b7b",marginBottom:4}}>📋 Field Nutrient Requirements (from Cropping Plan)</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {taggedFieldData.map(f => {
            const cr = CROPS.find(c=>c.id===f.crop);
            const crLabel = cr?.label||"";
            // Map field crop to RB209 key
            const rb209Key = Object.keys(RB209).find(k => k.toLowerCase().replace(/\s/g,"").includes(crLabel.toLowerCase().replace(/\s/g,"").substring(0,6))) || "";
            const rb209 = rb209Key ? RB209[rb209Key] : null;
            const rot = f.rotation||[];
            const isLeg = ["w_beans","s_beans","peas"].includes(rot[0]);
            const is2W = f.crop==="w_wheat"&&rot[0]==="w_wheat";
            // Calculate field-specific RB209 recommendations
            const fSns = isLeg ? (f.sns==="sns_low"?"sns_med":f.sns==="sns_med"?"sns_high":"sns_high") : f.sns;
            const nRec = rb209 ? (rb209.N[fSns]||0) + (is2W ? 20 : 0) : 0;
            const pRec = rb209 ? (rb209.P[f.pIdx]||0) : 0;
            const kRec = rb209 ? (rb209.K[f.kIdx]||0) : 0;
            const sRec = rb209 ? (rb209.S[f.sStat]||0) : 0;
            const hasData = rb209 && f.crop && f.sns && f.pIdx && f.kIdx;
            const prevLabel = rot[0] ? (CROPS.find(c=>c.id===rot[0])?.label||"") : "";
            return (
              <div key={f.id} style={{background:"#f7f8f6",borderRadius:6,padding:"6px 10px",borderLeft:`3px solid ${f.color}`,minWidth:140,flex:"1 1 160px"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#1a2e1a",marginBottom:2}}>{f.name} <span style={{fontSize:9,fontWeight:400,color:"#6b7b6b"}}>{f.ha}ha</span></div>
                <div style={{fontSize:10,color:"#6b7b6b"}}>{crLabel}{prevLabel ? ` (prev: ${prevLabel})` : ""}</div>
                {hasData ? (
                  <div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,padding:"1px 5px",background:"#2c6e3f12",borderRadius:3,color:"#2c6e3f",fontWeight:700}}>N: {nRec}</span>
                    <span style={{fontSize:10,padding:"1px 5px",background:"#4a7c5912",borderRadius:3,color:"#4a7c59",fontWeight:700}}>P: {pRec}</span>
                    <span style={{fontSize:10,padding:"1px 5px",background:"#b8922a12",borderRadius:3,color:"#b8922a",fontWeight:700}}>K: {kRec}</span>
                    {sRec > 0 && <span style={{fontSize:10,padding:"1px 5px",background:"#7a8a7a12",borderRadius:3,color:"#7a8a7a",fontWeight:700}}>S: {sRec}</span>}
                  </div>
                ) : (
                  <div style={{fontSize:9,color:"#d4dace",marginTop:3}}>Set crop & soil indices for recommendations</div>
                )}
                {isLeg && <div style={{fontSize:8,color:"#2c6e3f",marginTop:2}}>↓ SNS raised (legume prev)</div>}
                {is2W && <div style={{fontSize:8,color:"#c17f24",marginTop:2}}>↑ +20kg N (2nd wheat)</div>}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:9,color:"#94a394",marginTop:4}}>kg/ha recommendations from RB209. N adjusted for previous cropping from Cropping Plan tab. Set soil indices per field in Fields tab.</div>
      </div>
    )}
    {/* RB209 */}
    <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:6}}>RB209 Guidance</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Crop</div><select value={crop} onChange={e=>setCrop(e.target.value)} style={SS}><option value="">{"-- Select --"}</option>{Object.keys(RB209).map(c=>(<option key={c} value={c}>{c}</option>))}</select></div>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>N (SNS)</div><select value={sns} onChange={e=>setSns(e.target.value)} style={SS}><option value="sns_low">Low (0-1)</option><option value="sns_med">Medium (2-3)</option><option value="sns_high">High (4-5)</option></select></div>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>P index</div><select value={pIdx} onChange={e=>setPIdx(e.target.value)} style={SS}><option value="i0">0</option><option value="i1">1</option><option value="i2">2 (target)</option><option value="i3">3+</option></select></div>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>K index</div><select value={kIdx} onChange={e=>setKIdx(e.target.value)} style={SS}><option value="i0">0</option><option value="i1">1</option><option value="i2">2- (target)</option><option value="i3">2+/3</option></select></div>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>S status</div><select value={sStat} onChange={e=>setSStat(e.target.value)} style={SS}><option value="def">Deficient</option><option value="marg">Marginal</option></select></div>
        <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Field (ha)</div><NumInput value={fieldHa} onChange={setFieldHa} w={60} /></div>
      </div>
      {rb && (<div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{FNUTS.map(n=>(<div key={n} style={{background:"#f0f2ee",borderRadius:8,padding:"5px 10px",flex:"1 1 120px"}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,color:"#7a8a7a"}}>{n==="P"?"P2O5":n==="K"?"K2O":n}</span><span style={{fontSize:12,fontWeight:800,color:"#4a7c59"}}>{recs[n]} kg/ha</span></div><div style={{fontSize:12,color:"#6b7b6b"}}>{rb[n==="SO3"?"S":n].note}</div></div>))}</div>)}
    </div>
    {/* Grand totals */}
    {splits.some(sp=>sp.items.length>0) && (<div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:10,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:4}}>
        <span style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase"}}>Total Nutrients — all splits (kg/ha)</span>
        {grandTot.cost>0&&<span style={{fontSize:15,fontWeight:800,color:"#b8922a"}}>{"£"}{grandTot.cost.toFixed(2)}/ha</span>}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{FNUTS.map(n=>{const rec=rb?recs[n]:0;const tot=grandTot[n];const col=!rb?"#1a2e1a":rec===0?"#2c6e3f":tot>=rec*0.95?"#2c6e3f":tot>=rec*0.7?"#f39c12":"#a63d2b";return(<div key={n} style={{background:"#f0f2ee",borderRadius:8,padding:"6px 12px",textAlign:"center",minWidth:60}}><div style={{fontSize:12,color:"#6b7b6b"}}>{n==="P"?"P2O5":n==="K"?"K2O":n}</div><div style={{fontSize:16,fontWeight:800,color:col}}>{Math.round(tot)}</div>{rec>0&&<div style={{fontSize:11,color:"#4a5a6a"}}>/ {rec} rec</div>}{rec>0&&tot>0&&<div style={{fontSize:12,color:col}}>{Math.round(tot/rec*100)}%</div>}</div>);})}</div>
      {grandTot.mNT>0&&<div style={{fontSize:10,color:"#6b5b7b",marginTop:4}}>Organic N total: {grandTot.mNT.toFixed(0)} kg/ha (available N counted above). {grandTot.mNT>250?<span style={{color:"#c0392b",fontWeight:700}}>⚠ Exceeds 250 kg/ha NVZ field limit!</span>:""}</div>}
    </div>)}
    {/* Favourites bar */}

          <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Nutrient to supply</div><select value={ccNutrient} onChange={e=>setCcNutrient(e.target.value)} style={SS}><option value="N">Nitrogen (N)</option><option value="P">Phosphate (P2O5)</option><option value="K">Potash (K2O)</option><option value="SO3">Sulphur (SO3)</option></select></div>
          <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Amount (kg/ha)</div><NumInput value={ccNutrientAmount} onChange={setCcNutrientAmount} w={80} /></div>
          <div><div style={{fontSize:11,color:"#6b7b6b",marginBottom:2}}>Field size (ha)</div><NumInput value={ccFieldHa} onChange={setCcFieldHa} w={70} /></div>
        </div>
        {ccCrop && !ccUseRB209 && <div style={{fontSize:9,color:"#6b7b6b",marginTop:6}}>💡 Or <button onClick={()=>{const rb=RB209[ccCrop]; if(rb){let val=0; if(ccNutrient==="N") val=rb.N.sns_med; else if(ccNutrient==="P") val=rb.P.i2; else if(ccNutrient==="K") val=rb.K.i2; else if(ccNutrient==="SO3") val=rb.S.marg; setCcNutrientAmount(val||0);}}} style={{background:"none",border:"none",color:"#2c6e3f",fontWeight:700,cursor:"pointer",textDecoration:"underline"}}>use RB209 recommendation</button> for {ccCrop}</div>}
      </div>

      {/* Product selection area */}
      {ccCrop && ccNutrientAmount > 0 && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>🧪 Select Products</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {/* Solid Products */}
            <div style={{flex:"1 1 200px",minWidth:200}}>
              <div style={{fontSize:10,fontWeight:700,color:"#2c6e3f",marginBottom:6}}>🟫 Solid Products</div>
              <select onChange={e=>{if(e.target.value){const prod=FERT_CATALOGUE.find(p=>p.id===e.target.value&&!p.isLiquid); if(prod){const nutVal=prod[ccNutrient]||0; if(nutVal>0){const rateNeeded=ccNutrientAmount/(nutVal*10); setCcProducts(p=>[...p,{id:Date.now(),productId:prod.id,productName:prod.name,category:"solid_fert",rate:rateNeeded,price:0,unitPrice:"£/t"}]);} e.target.value="";}}} style={{...SS,fontSize:10,width:"100%",background:"#fff"}}><option value="">+ Add solid product...</option>{FERT_CATALOGUE.filter(p=>!p.isLiquid).map(p=>(<option key={p.id} value={p.id}>{p.name} ({p.grade})</option>))}</select>
            </div>
            
            {/* Liquid Products */}
            <div style={{flex:"1 1 200px",minWidth:200}}>
              <div style={{fontSize:10,fontWeight:700,color:"#4a7c59",marginBottom:6}}>💧 Liquid Products</div>
              <select onChange={e=>{if(e.target.value){const prod=FERT_CATALOGUE.find(p=>p.id===e.target.value&&p.isLiquid); if(prod){const nutVal=prod[ccNutrient]||0; if(nutVal>0){const rateNeeded=ccNutrientAmount/(nutVal*10); setCcProducts(p=>[...p,{id:Date.now(),productId:prod.id,productName:prod.name,category:"liquid_fert",rate:rateNeeded,price:0,unitPrice:"£/m³"}]);} e.target.value="";}}} style={{...SS,fontSize:10,width:"100%",background:"#fff"}}><option value="">+ Add liquid product...</option>{FERT_CATALOGUE.filter(p=>p.isLiquid).map(p=>(<option key={p.id} value={p.id}>{p.name} ({p.grade})</option>))}</select>
            </div>
            
            {/* Organic Manures */}
            <div style={{flex:"1 1 200px",minWidth:200}}>
              <div style={{fontSize:10,fontWeight:700,color:"#6b5b7b",marginBottom:6}}>🌱 Organic Manures</div>
              <select onChange={e=>{if(e.target.value){const manure=MANURE_CATALOGUE.find(m=>m.id===e.target.value); if(manure){const nutVal=ccNutrient==="N"?manure.nTotal:ccNutrient==="P"?manure.p2o5:ccNutrient==="K"?manure.k2o:manure.so3||0; if(nutVal>0){const rateNeeded=ccNutrientAmount/nutVal; setCcProducts(p=>[...p,{id:Date.now(),productId:manure.id,productName:manure.name,category:"organic",rate:rateNeeded,price:0,unitPrice:"£/t"}]);} e.target.value="";}}} style={{...SS,fontSize:10,width:"100%",background:"#fff"}}><option value="">+ Add manure...</option>{MANURE_CATALOGUE.map(m=>(<option key={m.id} value={m.id}>{m.name}</option>))}</select>
            </div>
          </div>

            {/* Selected products table */}
            {ccProducts.length > 0 && (
              <div style={{background:"#f7f8f6",borderRadius:8,overflow:"hidden",marginBottom:12}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{background:"#2c6e3f",color:"#fff"}}>
                      <th style={{padding:"8px",textAlign:"left",fontWeight:700}}>Product</th>
                      <th style={{padding:"8px",textAlign:"center",fontWeight:700}}>Rate (t/ha)</th>
                      <th style={{padding:"8px",textAlign:"center",fontWeight:700}}>Unit Price</th>
                      <th style={{padding:"8px",textAlign:"center",fontWeight:700}}>Cost/ha</th>
                      <th style={{padding:"8px",textAlign:"center",fontWeight:700}}>Total Cost</th>
                      <th style={{padding:"8px",textAlign:"center"}}>Remove</th>
                    </tr>
                  </thead>
                  <tbody>
                    {ccProducts.map(prod=>{const costHa=prod.rate*prod.price; const totalCost=costHa*ccFieldHa; return(<tr key={prod.id} style={{borderBottom:"1px solid #e2e6de",background:"#fff"}}>
                      <td style={{padding:"8px"}}><span style={{fontWeight:600}}>{prod.productName}</span></td>
                      <td style={{padding:"8px",textAlign:"center"}}><strong>{prod.rate.toFixed(2)}</strong></td>
                      <td style={{padding:"8px",textAlign:"center"}}><input type="number" value={prod.price} onChange={e=>{const newProd=[...ccProducts]; const idx=newProd.findIndex(p=>p.id===prod.id); if(idx>=0) newProd[idx].price=parseFloat(e.target.value)||0; setCcProducts(newProd);}} style={{...TI,width:70,textAlign:"center",fontSize:10}} /> {prod.unitPrice}</td>
                      <td style={{padding:"8px",textAlign:"center",fontWeight:700,color:costHa>0?"#2c6e3f":"#d4dace"}}>£{costHa.toFixed(2)}</td>
                      <td style={{padding:"8px",textAlign:"center",fontWeight:700,color:totalCost>0?"#b8922a":"#d4dace"}}>£{totalCost.toFixed(0)}</td>
                      <td style={{padding:"8px",textAlign:"center"}}><button onClick={()=>setCcProducts(p=>p.filter(x=>x.id!==prod.id))} style={{background:"none",border:"none",color:"#c0392b77",cursor:"pointer",fontSize:14}}>×</button></td>
                    </tr>);})}
                  </tbody>
                </table>
              </div>
            )}

            {/* Summary */}
            {ccProducts.length > 0 && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))",gap:10}}>
                {(() => {
                  const totalCostPerHa = ccProducts.reduce((s,p)=>s+(p.rate*p.price),0);
                  const totalCost = totalCostPerHa * ccFieldHa;
                  const solidVolume = ccProducts.filter(p=>p.category.includes("solid")).reduce((s,p)=>s+p.rate,0) * ccFieldHa;
                  const liquidVolume = ccProducts.filter(p=>p.category==="liquid_fert").reduce((s,p)=>{const prod=FERT_CATALOGUE.find(x=>x.id===p.productId); return s+(p.rate*(prod?.sg||1.2))*1000;},0) / ccFieldHa;
                  return (
                    <>
                      <div style={{background:"#2c6e3f12",borderRadius:6,padding:10}}>
                        <div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Cost / ha</div>
                        <div style={{fontSize:14,fontWeight:800,color:"#2c6e3f"}}>£{totalCostPerHa.toFixed(2)}</div>
                      </div>
                      <div style={{background:"#b8922a0a",borderRadius:6,padding:10}}>
                        <div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Total ({ccFieldHa}ha)</div>
                        <div style={{fontSize:14,fontWeight:800,color:"#b8922a"}}>£{totalCost.toFixed(0)}</div>
                      </div>
                      {solidVolume > 0 && <div style={{background:"#f0f2ee",borderRadius:6,padding:10}}>
                        <div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Solid (tonnes)</div>
                        <div style={{fontSize:14,fontWeight:800,color:"#1a2e1a"}}>{solidVolume.toFixed(1)} t</div>
                      </div>}
                      {liquidVolume > 0 && <div style={{background:"#2980b910",borderRadius:6,padding:10}}>
                        <div style={{fontSize:9,color:"#6b7b6b",marginBottom:2}}>Liquid (m³/ha)</div>
                        <div style={{fontSize:14,fontWeight:800,color:"#4a7c59"}}>{liquidVolume.toFixed(1)} m³</div>
                      </div>}
                    </>
                  );
                })()}
              </div>
            )}
        </div>
        )}

        {!ccCrop && <div style={{background:"#f0f2ee",border:"1px solid #d4dace",borderRadius:8,padding:16,textAlign:"center",color:"#6b7b6b"}}>
          <div style={{fontSize:12,marginBottom:4}}>👇 Select a crop and nutrient amount to begin</div>
          <div style={{fontSize:10}}>Then choose products from the selection below to compare costs</div>
        </div>}

      </div>)}
  </div>);
};
// ─── OPERATIONS / VARIABLE COSTS ────────────────────────────────────────────
const OPS_CATS = [
  {id: "cult", label: "Cultivations", color: "#6b5b7b", defaults: [
    {name: "Ploughing", cost: 55, unit: "ha", note: "Inversion tillage"},
    {name: "Subsoiling", cost: 35, unit: "ha", note: "Compaction relief"},
    {name: "Disc / Stubble rake", cost: 28, unit: "ha", note: "Primary shallow cultivation"},
    {name: "Power harrow", cost: 30, unit: "ha", note: "Secondary cultivation"},
    {name: "Press / Roll", cost: 15, unit: "ha", note: "Post-drilling consolidation"},
    {name: "Min-till one pass", cost: 38, unit: "ha", note: "Tine-disc combination"},
    {name: "Strip-till", cost: 42, unit: "ha", note: "Zonal cultivation"},
  ]},
  {id: "est", label: "Establishment / Drilling", color: "#4a7c59", defaults: [
    {name: "Conventional drill", cost: 35, unit: "ha", note: "After cultivation"},
    {name: "Direct drill", cost: 45, unit: "ha", note: "Into stubble / cover"},
    {name: "Precision drill (OSR)", cost: 40, unit: "ha", note: "Hybrid OSR"},

  ]},
  {id: "spray", label: "Spraying", color: "#c17f24", defaults: [
