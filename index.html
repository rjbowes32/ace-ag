              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Profit by Field</div>
              <BudgetBar items={fieldData.filter(f=>f.ha>0).map(f => ({label:f.name, val:f.margin, color:f.margin>=0?"#2c6e3f":"#c0392b"}))} height={160} maxVal={Math.max(...fieldData.map(f=>Math.abs(f.margin)),1)} />
            </div>
          )}
        </div>
      )}

      {/* ══════ INVOICES ══════ */}
      {section === "invoices" && (
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase"}}>Invoice Management</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#6b7b6b"}}>{invoices.length} invoice{invoices.length!==1?"s":""} | {"£"}{invoices.reduce((s,i)=>s+(+i.amount||0),0).toLocaleString()} total</span>
                <button onClick={addInvoice} style={{padding:"5px 14px",fontSize:11,fontWeight:600,background:"#2c6e3f",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>+ New Invoice</button>
              </div>
            </div>
            {/* Search and filters */}
            <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
              <input value={invSearch} onChange={e=>setInvSearch(e.target.value)} placeholder="🔍 Search supplier, description, ref..." style={{...TI,fontSize:11,width:220,padding:"5px 10px"}} />
              <select value={invCatFilter} onChange={e=>setInvCatFilter(e.target.value)} style={{...SS,fontSize:10}}>
                <option value="all">All categories</option>
                {INV_CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
              </select>
              <select value={invStatusFilter} onChange={e=>setInvStatusFilter(e.target.value)} style={{...SS,fontSize:10}}>
                <option value="all">All status</option>
                <option value="unpaid">Unpaid</option>
                <option value="paid">Paid</option>
                <option value="queried">Queried</option>
              </select>
              <select value={invSort} onChange={e=>setInvSort(e.target.value)} style={{...SS,fontSize:10}}>
                <option value="date_desc">Newest first</option>
                <option value="date_asc">Oldest first</option>
                <option value="amount_desc">Highest amount</option>
                <option value="amount_asc">Lowest amount</option>
                <option value="supplier">Supplier A-Z</option>
              </select>
            </div>

            {filteredInv.length === 0 && <div style={{padding:20,textAlign:"center",color:"#d4dace",fontSize:12}}>{invoices.length===0?"Add your first invoice above.":"No invoices match your filters."}</div>}

            {/* Invoice list */}
            {filteredInv.map(inv => {
              const cat = INV_CATS.find(c=>c.id===inv.category) || INV_CATS[INV_CATS.length-1];
              const isOpen = invExpanded === inv.id;
              return (
                <div key={inv.id} style={{background:isOpen?"#fff":"#f7f8f6",border:"1px solid #e2e6de",borderRadius:8,padding:isOpen?"12px":"6px 10px",marginBottom:4,borderLeft:`3px solid ${cat.color}`,transition:"all 0.15s"}}>
                  <div onClick={()=>setInvExpanded(isOpen?null:inv.id)} style={{display:"flex",gap:6,alignItems:"center",cursor:"pointer",flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:"#6b7b6b",minWidth:75}}>{inv.date}</span>
                    <span style={{fontSize:10,padding:"1px 6px",background:cat.color+"12",color:cat.color,borderRadius:4,fontWeight:600}}>{cat.icon} {cat.label}</span>
                    <span style={{fontSize:12,fontWeight:600,color:"#1a2e1a",flex:"1 1 100px"}}>{inv.supplier || "No supplier"}</span>
                    <span style={{fontSize:11,color:"#6b7b6b",flex:"1 1 120px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.description}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#1a2e1a"}}>{"£"}{(+inv.amount||0).toLocaleString()}</span>
                    <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,fontWeight:600,background:inv.status==="paid"?"#2c6e3f15":inv.status==="queried"?"#c17f2415":"#c0392b10",color:inv.status==="paid"?"#2c6e3f":inv.status==="queried"?"#c17f24":"#c0392b"}}>{inv.status}</span>
                    {inv.pdfName && <span style={{fontSize:9,color:"#4a7c59"}}>📎</span>}
                    <span style={{fontSize:10,color:"#d4dace"}}>{isOpen?"▼":"▶"}</span>
                  </div>
                  {isOpen && (
                    <div style={{marginTop:8,borderTop:"1px solid #f0f2ee",paddingTop:8}}>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Date</div>
                          <input type="date" value={inv.date} onChange={e=>uif(inv.id,"date",e.target.value)} style={{...TI,fontSize:11,width:120,padding:"3px 6px"}} /></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Supplier</div>
                          <input value={inv.supplier} onChange={e=>uif(inv.id,"supplier",e.target.value)} style={{...TI,fontSize:11,width:160}} placeholder="Supplier name" /></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Ref / Invoice No.</div>
                          <input value={inv.ref} onChange={e=>uif(inv.id,"ref",e.target.value)} style={{...TI,fontSize:11,width:110}} placeholder="INV-001" /></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Category</div>
                          <select value={inv.category} onChange={e=>uif(inv.id,"category",e.target.value)} style={{...SS,fontSize:10}}>
                            {INV_CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
                          </select></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Status</div>
                          <select value={inv.status} onChange={e=>uif(inv.id,"status",e.target.value)} style={{...SS,fontSize:10}}>
                            <option value="unpaid">Unpaid</option><option value="paid">Paid</option><option value="queried">Queried</option>
                          </select></div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Net Amount ({"£"})</div>
                          <NumInput value={inv.netAmount||0} onChange={v=>{uif(inv.id,"netAmount",v); uif(inv.id,"amount",v+(inv.vat||0));}} w={80} /></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>VAT ({"£"})</div>
                          <NumInput value={inv.vat||0} onChange={v=>{uif(inv.id,"vat",v); uif(inv.id,"amount",(inv.netAmount||0)+v);}} w={70} /></div>
                        <div><div style={{fontSize:10,color:"#6b7b6b"}}>Total ({"£"})</div>
                          <NumInput value={inv.amount||0} onChange={v=>uif(inv.id,"amount",v)} w={80} /></div>
                        <div style={{marginLeft:6}}><div style={{fontSize:10,color:"#6b7b6b"}}>Allocate to field(s)</div>
                          <select onChange={e => { const fid=+e.target.value; if(!fid) return; if(!(inv.fieldIds||[]).includes(fid)) uif(inv.id,"fieldIds",[...(inv.fieldIds||[]),fid]); e.target.value=""; }} style={{...SS,fontSize:10,width:140}}>
                            <option value="">+ Field</option>
                            {fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                          </select></div>
                      </div>
                      {(inv.fieldIds||[]).length > 0 && (
                        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
                          {inv.fieldIds.map(fid => {
                            const f = fields.find(ff=>ff.id===fid);
                            return f ? <span key={fid} style={{fontSize:10,padding:"2px 6px",background:`${f.color}15`,borderRadius:4,color:f.color,fontWeight:600}}>
                              {f.name} <button onClick={()=>uif(inv.id,"fieldIds",inv.fieldIds.filter(x=>x!==fid))} style={{background:"none",border:"none",color:"#c0392b55",cursor:"pointer",fontSize:10}}>×</button>
                            </span> : null;
                          })}
                        </div>
                      )}
                      <div style={{marginBottom:6}}>
                        <div style={{fontSize:10,color:"#6b7b6b"}}>Job / Programme Reference</div>
                        <input value={inv.jobRef||""} onChange={e=>uif(inv.id,"jobRef",e.target.value)} style={{...TI,fontSize:11,width:"100%"}} placeholder="e.g. T2 fungicide, Spring N 1st split, Contractor ploughing..." />
                      </div>
                      <div style={{marginBottom:6}}>
                        <div style={{fontSize:10,color:"#6b7b6b"}}>Description / Notes</div>
                        <textarea value={inv.description||""} onChange={e=>uif(inv.id,"description",e.target.value)} rows={2} style={{...TI,fontSize:11,width:"100%",resize:"vertical"}} placeholder="Invoice details..." />
                      </div>
                      {/* PDF upload */}
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                        <label style={{fontSize:10,padding:"4px 12px",background:"#6b5b7b08",color:"#6b5b7b",border:"1px solid #6b5b7b22",borderRadius:6,cursor:"pointer"}}>
                          📎 {inv.pdfName ? "Replace" : "Upload"} Invoice PDF
                          <input type="file" accept=".pdf,.jpg,.jpeg,.png" onChange={e=>handleInvPdf(inv.id,e)} style={{display:"none"}} />
                        </label>
                        {inv.pdfName && (
                          <span style={{fontSize:10,color:"#2c6e3f"}}>📄 {inv.pdfName}
                            <button onClick={()=>{const w=window.open();w.document.write('<iframe src="'+inv.pdfFile+'" style="width:100%;height:100%;border:none"></iframe>');}} style={{background:"none",border:"none",color:"#2c6e3f",cursor:"pointer",fontSize:10,textDecoration:"underline",marginLeft:4}}>View</button>
                          </span>
                        )}
                      </div>
                      <div style={{display:"flex",gap:4,borderTop:"1px solid #f0f2ee",paddingTop:6}}>
                        <button onClick={()=>rmInv(inv.id)} style={{padding:"4px 12px",fontSize:10,background:"#c0392b0a",color:"#c0392b",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600}}>Delete Invoice</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ══════ SALES LEDGER ══════ */}
      {section === "sales" && (
        <div>
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Sales Ledger — All Farm Income</div>
            {/* Grain sales */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#2c6e3f",marginBottom:4,borderLeft:"3px solid #2c6e3f",paddingLeft:8}}>🌾 Grain Sales</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{borderBottom:"1px solid #e2e6de"}}><th style={{textAlign:"left",padding:"3px 6px",color:"#6b7b6b"}}>Field</th><th style={{textAlign:"right",padding:"3px 6px",color:"#6b7b6b"}}>Ha</th><th style={{textAlign:"left",padding:"3px 6px",color:"#6b7b6b"}}>Crop</th><th style={{textAlign:"right",padding:"3px 6px",color:"#6b7b6b"}}>Yield t/ha</th><th style={{textAlign:"right",padding:"3px 6px",color:"#6b7b6b"}}>Price £/t</th><th style={{textAlign:"right",padding:"3px 6px",color:"#6b7b6b"}}>Revenue</th></tr></thead>
                <tbody>
                  {fieldData.filter(f=>f.rev>0).map(f => {
                    const cr = CROPS.find(c=>c.id===f.crop);
                    return <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}><td style={{padding:"3px 6px",fontWeight:600}}>{f.name}</td><td style={{textAlign:"right",padding:"3px 6px"}}>{f.ha}</td><td style={{padding:"3px 6px",fontSize:10}}>{cr?.label||""}</td><td style={{textAlign:"right",padding:"3px 6px"}}>{f.yieldT}</td><td style={{textAlign:"right",padding:"3px 6px"}}>{"£"}{f.grainPrice}</td><td style={{textAlign:"right",padding:"3px 6px",fontWeight:700,color:"#2c6e3f"}}>{"£"}{f.rev.toLocaleString()}</td></tr>;
                  })}
                  {farmGross > 0 && <tr style={{borderTop:"2px solid #e2e6de"}}><td colSpan={5} style={{padding:"4px 6px",fontWeight:700}}>Total Grain</td><td style={{textAlign:"right",padding:"4px 6px",fontWeight:700,color:"#2c6e3f"}}>{"£"}{farmGross.toLocaleString()}</td></tr>}
                </tbody>
              </table>
              {farmGross === 0 && <div style={{fontSize:11,color:"#94a394",padding:8}}>No grain sales entered. Set yield and price per field in Farm & Fields tab.</div>}
            </div>
            {/* Straw */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#b8922a",marginBottom:4,borderLeft:"3px solid #b8922a",paddingLeft:8}}>🪵 Straw Sales</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <tbody>
                  {fieldData.filter(f=>f.strawRev>0).map(f => (
                    <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}><td style={{padding:"3px 6px",fontWeight:600}}>{f.name}</td><td style={{textAlign:"right",padding:"3px 6px"}}>{f.ha}ha</td><td style={{textAlign:"right",padding:"3px 6px"}}>{f.strawYield} t/ha × {"£"}{f.strawPrice}/t</td><td style={{textAlign:"right",padding:"3px 6px",fontWeight:700,color:"#b8922a"}}>{"£"}{f.strawRev.toFixed(0)}</td></tr>
                  ))}
                  {farmStraw > 0 && <tr style={{borderTop:"2px solid #e2e6de"}}><td colSpan={3} style={{padding:"4px 6px",fontWeight:700}}>Total Straw</td><td style={{textAlign:"right",padding:"4px 6px",fontWeight:700,color:"#b8922a"}}>{"£"}{farmStraw.toFixed(0)}</td></tr>}
                </tbody>
              </table>
              {farmStraw === 0 && <div style={{fontSize:11,color:"#94a394",padding:8}}>No straw sales. Add per field in the Income section.</div>}
            </div>
            {/* SFI */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#4a7c59",marginBottom:4,borderLeft:"3px solid #4a7c59",paddingLeft:8}}>🌿 SFI & Environmental Payments</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <tbody>
                  {fieldData.filter(f=>f.sfiRev>0).map(f => (
                    <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}><td style={{padding:"3px 6px",fontWeight:600}}>{f.name}</td><td style={{textAlign:"right",padding:"3px 6px"}}>{(f.sfiPayments||[]).length} scheme{(f.sfiPayments||[]).length>1?"s":""}</td><td style={{textAlign:"right",padding:"3px 6px",fontWeight:700,color:"#4a7c59"}}>{"£"}{f.sfiRev.toFixed(0)}</td></tr>
                  ))}
                  {farmSfi > 0 && <tr style={{borderTop:"2px solid #e2e6de"}}><td colSpan={2} style={{padding:"4px 6px",fontWeight:700}}>Total SFI</td><td style={{textAlign:"right",padding:"4px 6px",fontWeight:700,color:"#4a7c59"}}>{"£"}{farmSfi.toFixed(0)}</td></tr>}
                </tbody>
              </table>
              {farmSfi === 0 && <div style={{fontSize:11,color:"#94a394",padding:8}}>No SFI payments. Add per field in the Income section.</div>}
            </div>
            {/* Grand total */}
            <div style={{padding:10,background:"#2c6e3f08",borderRadius:8,border:"1px solid #2c6e3f18",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#1a2e1a"}}>Total Farm Income</span>
              <span style={{fontSize:22,fontWeight:800,color:"#2c6e3f"}}>{"£"}{farmTotalIncome.toLocaleString()}</span>
            </div>
          </div>
        </div>
      )}

      {/* ══════ FIELD INCOME ══════ */}
      {section === "income" && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Additional Income per Field</div>
          <div style={{fontSize:11,color:"#94a394",marginBottom:8}}>Add straw sales and SFI/environmental scheme payments to each field.</div>
          {fields.map(f => {
            const strawRev = (f.strawYield||0) * (f.strawPrice||0) * (f.ha||0);
            const payments = f.sfiPayments || [];
            const sfiTotal = payments.reduce((s,p) => s + (p.ha||0) * (p.rate||0), 0);
            return (
              <div key={f.id} style={{background:"#f7f8f6",borderRadius:8,padding:"8px 12px",marginBottom:6,borderLeft:`3px solid ${f.color}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#1a2e1a"}}>{f.name} <span style={{fontWeight:400,color:"#94a394"}}>{f.ha}ha</span></span>
                  {(strawRev > 0 || sfiTotal > 0) && <span style={{fontSize:12,fontWeight:700,color:"#2c6e3f"}}>+{"£"}{(strawRev+sfiTotal).toLocaleString()} additional</span>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:"#6b7b6b",width:70}}>Straw:</span>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <NumInput value={f.strawYield||0} onChange={v=>uf(f.id,"strawYield",v)} w={45} ph="t/ha" />
                    <span style={{fontSize:10,color:"#94a394"}}>t/ha × {"£"}</span>
                    <NumInput value={f.strawPrice||0} onChange={v=>uf(f.id,"strawPrice",v)} w={45} ph="/t" />
                    <span style={{fontSize:10,color:"#94a394"}}>/t</span>
                  </div>
                  {strawRev > 0 && <span style={{fontSize:11,fontWeight:700,color:"#b8922a",marginLeft:8}}>{"£"}{strawRev.toFixed(0)}</span>}
                </div>
                {payments.map((p,i) => (
                  <div key={i} style={{display:"flex",gap:4,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
                    <select value={p.scheme||""} onChange={e => {
                      const opt = SFI_OPTIONS.find(o=>o.id===e.target.value);
                      const nps = [...payments]; nps[i] = {...nps[i], scheme:e.target.value, rate: opt?.rate || nps[i].rate};
                      uf(f.id,"sfiPayments",nps);
                    }} style={{...SS,fontSize:10,width:200}}>
                      <option value="">Select scheme...</option>
                      {SFI_OPTIONS.map(o => <option key={o.id} value={o.id}>{o.label} ({"£"}{o.rate}/ha)</option>)}
                    </select>
                    <NumInput value={p.ha||0} onChange={v => { const nps=[...payments]; nps[i]={...nps[i],ha:v}; uf(f.id,"sfiPayments",nps); }} w={45} ph="ha" />
                    <span style={{fontSize:10,color:"#94a394"}}>ha @ {"£"}</span>
                    <NumInput value={p.rate||0} onChange={v => { const nps=[...payments]; nps[i]={...nps[i],rate:v}; uf(f.id,"sfiPayments",nps); }} w={50} ph="/ha" />
                    <span style={{fontSize:10,color:"#94a394"}}>/ha</span>
                    {(p.ha||0)*(p.rate||0) > 0 && <span style={{fontSize:11,fontWeight:600,color:"#4a7c59"}}>{"£"}{((p.ha||0)*(p.rate||0)).toFixed(0)}</span>}
                    <button onClick={() => { const nps=payments.filter((_,j)=>j!==i); uf(f.id,"sfiPayments",nps); }} style={{background:"none",border:"none",color:"#c0392b55",cursor:"pointer",fontSize:12}}>{"×"}</button>
                  </div>
                ))}
                <button onClick={() => uf(f.id,"sfiPayments",[...payments,{scheme:"",ha:f.ha||0,rate:0}])} style={{padding:"3px 10px",fontSize:10,background:"#4a7c590a",color:"#4a7c59",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,marginTop:2}}>+ SFI/Env Payment</button>
              </div>
            );
          })}
        </div>
      )}

      {/* ══════ FULL BUDGET ══════ */}
      {section === "budget" && fieldData.length > 0 && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Full Farm Budget</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                {["Field","Ha","Grain Rev","Straw","SFI","Total Income","Fung","Herb","Fert","Ops","Total Cost","NET MARGIN","£/ha"].map(h => (
                  <th key={h} style={{padding:"5px 6px",textAlign:h==="Field"?"left":"right",color:"#6b7b6b",fontWeight:600,fontSize:10,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {fieldData.map(f => (
                  <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                    <td style={{padding:"4px 6px",borderLeft:`3px solid ${f.color}`,fontWeight:600}}>{f.name}</td>
                    <td style={{padding:"4px 6px",textAlign:"right"}}>{f.ha}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:"#2c6e3f"}}>{f.rev>0?`£${f.rev.toLocaleString()}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:"#b8922a"}}>{f.strawRev>0?`£${f.strawRev.toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:"#4a7c59"}}>{f.sfiRev>0?`£${f.sfiRev.toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",fontWeight:600,color:"#1a6b3a"}}>{"£"}{f.totalIncome.toLocaleString()}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:f.fc.cp>0?"#c17f24":"#d4dace"}}>{f.fc.cp>0?`£${(f.fc.cp*f.ha).toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:f.fc.herb>0?"#3a8a6e":"#d4dace"}}>{f.fc.herb>0?`£${(f.fc.herb*f.ha).toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:f.fc.fert>0?"#4a7c59":"#d4dace"}}>{f.fc.fert>0?`£${(f.fc.fert*f.ha).toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:f.fc.ops>0?"#b8922a":"#d4dace"}}>{f.fc.ops>0?`£${(f.fc.ops*f.ha).toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:"#c0392b",fontWeight:600}}>{f.cost>0?`£${f.cost.toFixed(0)}`:"—"}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",fontWeight:700,color:f.margin>=0?"#2c6e3f":"#c0392b"}}>{"£"}{f.margin.toLocaleString()}</td>
                    <td style={{padding:"4px 6px",textAlign:"right",color:"#94a394"}}>{f.ha>0?`£${(f.margin/f.ha).toFixed(0)}`:"—"}</td>
                  </tr>
                ))}
              </tbody>
              <tfoot><tr style={{borderTop:"2px solid #e2e6de"}}>
                <td style={{padding:"5px 6px",fontWeight:700}}>TOTAL</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:600}}>{totalHa.toFixed(1)}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:"#2c6e3f"}}>{"£"}{farmGross.toLocaleString()}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:"#b8922a"}}>{"£"}{farmStraw.toFixed(0)}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:"#4a7c59"}}>{"£"}{farmSfi.toFixed(0)}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:"#1a6b3a"}}>{"£"}{farmTotalIncome.toLocaleString()}</td>
                <td colSpan={4} />
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:"#c0392b"}}>{"£"}{farmCosts.toFixed(0)}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:700,color:farmMargin>=0?"#2c6e3f":"#c0392b"}}>{"£"}{farmMargin.toLocaleString()}</td>
                <td style={{padding:"5px 6px",textAlign:"right",fontWeight:600,color:"#94a394"}}>{totalHa>0?`£${(farmMargin/totalHa).toFixed(0)}`:"—"}</td>
              </tr></tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ══════ BREAKEVEN ══════ */}
      {section === "breakeven" && fields.length > 0 && (() => {
        const avgYield = totalHa > 0 ? fieldData.reduce((s,f) => s + (f.yieldT||0)*(f.ha||0), 0) / totalHa : 8;
        const avgPrice = totalHa > 0 ? fieldData.reduce((s,f) => s + (f.grainPrice||0)*(f.ha||0), 0) / totalHa : 180;
        const avgCost = totalHa > 0 ? farmCosts / totalHa : 0;
        const avgStrawHa = totalHa > 0 ? farmStraw / totalHa : 0;
        const avgSfiHa = totalHa > 0 ? farmSfi / totalHa : 0;
        const otherInc = avgStrawHa + avgSfiHa;
        const yields = []; for (let m = 0.6; m <= 1.41; m += 0.1) yields.push(+(avgYield * m).toFixed(1));
        const prices = []; for (let d = -40; d <= 41; d += 20) prices.push(Math.round(avgPrice + d));
        const beYield = avgPrice > 0 ? ((avgCost - otherInc) / avgPrice) : 0;
        const bePrice = avgYield > 0 ? ((avgCost - otherInc) / avgYield) : 0;
        return (
          <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Breakeven & Sensitivity Analysis</div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}>
              <div style={{padding:"8px 14px",background:"#f7f8f6",borderRadius:8,borderLeft:"3px solid #c17f24"}}><div style={{fontSize:10,color:"#6b7b6b"}}>Avg cost of production</div><div style={{fontSize:18,fontWeight:700,color:"#c17f24"}}>{"£"}{avgCost.toFixed(0)}/ha</div></div>
              <div style={{padding:"8px 14px",background:"#f7f8f6",borderRadius:8,borderLeft:"3px solid #c0392b"}}><div style={{fontSize:10,color:"#6b7b6b"}}>Breakeven yield @ {"£"}{avgPrice.toFixed(0)}/t</div><div style={{fontSize:18,fontWeight:700,color:beYield<=avgYield?"#2c6e3f":"#c0392b"}}>{beYield.toFixed(1)} t/ha</div></div>
              <div style={{padding:"8px 14px",background:"#f7f8f6",borderRadius:8,borderLeft:"3px solid #c0392b"}}><div style={{fontSize:10,color:"#6b7b6b"}}>Breakeven price @ {avgYield.toFixed(1)} t/ha</div><div style={{fontSize:18,fontWeight:700,color:bePrice<=avgPrice?"#2c6e3f":"#c0392b"}}>{"£"}{bePrice.toFixed(0)}/t</div></div>
              {otherInc > 0 && <div style={{padding:"8px 14px",background:"#f7f8f6",borderRadius:8,borderLeft:"3px solid #4a7c59"}}><div style={{fontSize:10,color:"#6b7b6b"}}>Other income (straw + SFI)</div><div style={{fontSize:18,fontWeight:700,color:"#4a7c59"}}>{"£"}{otherInc.toFixed(0)}/ha</div></div>}
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{borderCollapse:"collapse",fontSize:10,width:"100%"}}>
                <thead><tr><th style={{padding:"4px 6px",background:"#f7f8f6",fontSize:9,color:"#6b7b6b",position:"sticky",left:0,zIndex:1}}>Yield \ Price</th>
                  {prices.map(p => <th key={p} style={{padding:"4px 6px",textAlign:"center",background:Math.abs(p-avgPrice)<10?"#c17f2415":"#f7f8f6",fontSize:10,whiteSpace:"nowrap"}}>{"£"}{p}/t</th>)}
                </tr></thead>
                <tbody>
                  {yields.map(y => (
                    <tr key={y}><td style={{padding:"4px 8px",fontWeight:600,background:Math.abs(y-avgYield)<0.3?"#c17f2415":"#f7f8f6",position:"sticky",left:0,zIndex:1,whiteSpace:"nowrap"}}>{y} t/ha</td>
                    {prices.map(p => {
                      const margin = (y * p + otherInc) - avgCost;
                      const isCurrent = Math.abs(y-avgYield)<0.3 && Math.abs(p-avgPrice)<10;
                      return <td key={p} style={{padding:"4px 6px",textAlign:"center",fontWeight:isCurrent?700:500,background:isCurrent?"#c17f2425":margin>=0?"#2c6e3f08":"#c0392b08",color:margin>=0?"#2c6e3f":"#c0392b",border:isCurrent?"2px solid #c17f24":"1px solid #f0f2ee"}}>{margin>=0?"+":""}{"£"}{margin.toFixed(0)}</td>;
                    })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:10,color:"#94a394",marginTop:6}}>Margin per hectare at each yield/price combination. Current position highlighted in amber.</div>
          </div>
        );
      })()}

      {section === "budget" && fields.length === 0 && (
        <div style={{padding:24,textAlign:"center",color:"#94a394",fontSize:13}}>Add fields in the Farm & Fields tab and build programmes to populate the budget.</div>
      )}
    </div>
  );
};

// ─── AGRONOMY TAB ─────────────────────────────────────────────────────────
const AgronomyTab = ({fields, saved, onSave, jobs, setJobs, onBudget, onHerbBudget, progState, onProgSave}) => {
  const DTYPE = {id:"agron",label:"Agronomy",icon:"🔬",color:"#2c6e3f"};
  const [agronomySubtab, setAgronomySubtab] = useState("inspections"); // inspections | cp | fert
  const [records, setRecords] = useState(saved?.records || []);
  const [editId, setEditId] = useState(null);
  const [filterField, setFilterField] = useState("all");
  const [filterDateFrom, setFilterDateFrom] = useState("");
  const [filterDateTo, setFilterDateTo] = useState("");
  const [sortMode, setSortMode] = useState("recent");
  const [viewMode, setViewMode] = useState("grid");

  const GS = ["GS10-19 Seedling","GS20-29 Tillering","GS30 Stem ext.","GS31-32 1st-2nd node","GS33-37 Mid stem","GS39 Flag leaf","GS49-59 Booting/heading","GS61-69 Flowering","GS71-89 Grain fill","GS90+ Senescence"];

  const DISEASES = [
    "Septoria tritici","Yellow rust","Brown rust","Eyespot","Fusarium","Net blotch","Rhynchosporium",
    "Ramularia","Powdery mildew","Light leaf spot","Phoma","Sclerotinia","Take-all","Sharp eyespot",
    "BYDV (symptoms)","Tan spot","Crown rust","Halo spot","Snow mould",
  ];
  const SEVERITIES = ["nil","trace","low","moderate","high","severe"];
  const PESTS = [
    "Slugs","Aphids (BYDV vector)","Aphids (direct)","CSFB","Pollen beetle","OWBM",
    "Leather jackets","Wireworm","Gout fly","Wheat bulb fly","Pigeons","Rabbits","Seed weevil",
  ];
  const PEST_LEVELS = ["nil","low","threshold","above threshold","high"];
  const WEEDS = [
    "Blackgrass","Ryegrass","Brome","Wild oats","Cleavers","Chickweed","Charlock",
    "Poppy","Mayweed","Cranesbill","Volunteer cereals","Fat hen","Groundsel",
    "Thistles","Couch","Volunteer OSR","Fumitory","Speedwell","Shepherd's purse",
  ];
  const WEED_DENS = ["nil","trace (<1/m²)","low (1-5/m²)","moderate (5-20/m²)","high (20-50/m²)","very high (50+/m²)"];

  useEffect(() => { if(onSave) onSave({records}); }, [records]);

  const mkRec = () => ({
    id: Date.now(), type: "agron",
    fieldIds: [], date: new Date().toISOString().split("T")[0],
    inspector: "", cropCondition: "", growthStageAgron: "",
    canopyDensity: "", plantHealth: "",
    diseases: [], pests: [], weeds: [],
    nRequired: "", pgrRequired: "", traceElement: "",
    recommendation: "", nextVisit: "", priority: "routine",
    attachments: [], pinned: false, operator: "", notes: "",
  });

  const addRec = () => { const r = mkRec(); setRecords(p => [r,...p]); setEditId(r.id); };
  const addFromJob = (job) => {
    const r = mkRec();
    r.jobId = job.id;
    r.fieldIds = [...(job.fieldIds || [])];
    setRecords(p => [r,...p]);
    setEditId(r.id);
    if (setJobs) setJobs(prev => (prev||[]).map(j => j.id === job.id ? {...j, status: "in-progress"} : j));
  };
  const completeJob = (jobId) => {
    if (setJobs) setJobs(prev => (prev||[]).map(j => j.id === jobId ? {...j, status: "completed"} : j));
  };

  const upRec = (id,f,v) => setRecords(p => p.map(r => r.id===id?{...r,[f]:v}:r));
  const rmRec = id => { if(!confirm("Delete this record?")) return; setRecords(p => p.filter(r => r.id!==id)); if(editId===id) setEditId(null); };
  const dupRec = id => { const src = records.find(r=>r.id===id); if(!src) return; const n = {...src,id:Date.now(),date:new Date().toISOString().split("T")[0],pinned:false}; setRecords(p=>[n,...p]); setEditId(n.id); };
  const pinRec = id => setRecords(p => p.map(r => r.id===id ? {...r, pinned: !r.pinned} : r));

  const filtered = records.filter(r => {
    if (filterField !== "all" && !r.fieldIds.includes(+filterField)) return false;
    if (filterDateFrom && r.date < filterDateFrom) return false;
    if (filterDateTo && r.date > filterDateTo) return false;
    return true;
  }).sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    if (sortMode === "recent") return b.date.localeCompare(a.date) || b.id - a.id;
    return a.date.localeCompare(b.date) || a.id - b.id;
  });

  const exportCSV = () => {
    const hdr = "Date,Field(s),Inspector,Growth Stage,Condition,Canopy,Plant Health,Priority,Diseases,Pests,Weeds,N Required,PGR,Trace,Recommendation,Next Visit,Notes";
    const rows = records.map(r => {
      const fn = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name||"").join("; ");
      const dis = (r.diseases||[]).filter(d=>d.sev&&d.sev!=="nil").map(d=>`${d.name}: ${d.sev}`).join("; ");
      const pst = (r.pests||[]).filter(p=>p.level&&p.level!=="nil").map(p=>`${p.name}: ${p.level}`).join("; ");
      const wds = (r.weeds||[]).filter(w=>w.density&&w.density!=="nil").map(w=>`${w.name}: ${w.density}`).join("; ");
      return [r.date,fn,r.inspector,r.growthStageAgron,r.cropCondition,r.canopyDensity,r.plantHealth,r.priority,dis,pst,wds,r.nRequired,r.pgrRequired,r.traceElement,r.recommendation,r.nextVisit,r.notes];
    }).map(r => r.map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(","));
    const blob = new Blob([hdr+"\n"+rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `agronomy-${new Date().toISOString().split("T")[0]}.csv`; a.click();
  };

  const addAttachment = (recId, file) => {
    if (!file) return;
    const maxMB = 5;
    if (file.size > maxMB * 1024 * 1024) { alert(`File too large (max ${maxMB}MB)`); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const att = {id: Date.now(), name: file.name, type: file.type, size: file.size, data: e.target.result, addedDate: new Date().toISOString().split("T")[0]};
      setRecords(p => p.map(r => r.id === recId ? {...r, attachments: [...(r.attachments||[]), att]} : r));
    };
    reader.readAsDataURL(file);
  };
  const rmAttachment = (recId, attId) => {
    setRecords(p => p.map(r => r.id === recId ? {...r, attachments: (r.attachments||[]).filter(a => a.id !== attId)} : r));
  };
  const viewAttachment = (att) => {
    if (att.type === "application/pdf") {
      const w = window.open("", "_blank");
      if (w) { w.document.write(`<html><head><title>${att.name}</title></head><body style="margin:0"><iframe src="${att.data}" style="width:100%;height:100vh;border:none"></iframe></body></html>`); w.document.close(); }
    } else {
      const w = window.open("", "_blank");
      if (w) { w.document.write(`<html><head><title>${att.name}</title></head><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0"><img src="${att.data}" style="max-width:100%;max-height:100vh;object-fit:contain" /></body></html>`); w.document.close(); }
    }
  };

  const FileAttach = ({rec, accept, label}) => (
    <div style={{marginTop:4}}>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <label style={{padding:"4px 12px",fontSize:10,fontWeight:600,background:"#f0f2ee",color:"#4a7c59",borderRadius:6,cursor:"pointer",border:"1px dashed #c4cec4",display:"inline-flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:13}}>📎</span> {label || "Attach file"}
          <input type="file" accept={accept || ".pdf,.png,.jpg,.jpeg,.gif,.webp"} onChange={e => {if(e.target.files[0]) addAttachment(rec.id, e.target.files[0]); e.target.value="";}} style={{display:"none"}} />
        </label>
        <span style={{fontSize:9,color:"#94a394"}}>PDF, images — max 5MB</span>
      </div>
      {(rec.attachments||[]).length > 0 && (
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
          {(rec.attachments||[]).map(att => {
            const isPdf = att.type === "application/pdf";
            const isImg = att.type?.startsWith("image/");
            return (
              <div key={att.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",background:isPdf?"#c0392b06":"#2c6e3f06",borderRadius:6,border:`1px solid ${isPdf?"#c0392b15":"#2c6e3f15"}`}}>
                {isImg && <img src={att.data} style={{width:28,height:28,objectFit:"cover",borderRadius:4,cursor:"pointer"}} onClick={()=>viewAttachment(att)} />}
                {isPdf && <span style={{fontSize:14,cursor:"pointer"}} onClick={()=>viewAttachment(att)}>📄</span>}
                <div style={{cursor:"pointer"}} onClick={()=>viewAttachment(att)}>
                  <div style={{fontSize:10,fontWeight:600,color:"#1a2e1a",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</div>
                  <div style={{fontSize:8,color:"#94a394"}}>{(att.size/1024).toFixed(0)}KB · {att.addedDate}</div>
                </div>
                <button onClick={()=>rmAttachment(rec.id,att.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:12,padding:"0 2px"}}>×</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  const FieldPicker = ({rec}) => (
    <div>
      <div style={{fontSize:9,color:"#6b7b6b",marginBottom:3}}>Fields:</div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        <button onClick={()=>upRec(rec.id,"fieldIds",rec.fieldIds.length===fields.length?[]:fields.map(f=>f.id))} style={{padding:"2px 8px",fontSize:9,borderRadius:5,border:"none",cursor:"pointer",background:rec.fieldIds.length===fields.length?"#2c6e3f15":"#f0f2ee",color:rec.fieldIds.length===fields.length?"#2c6e3f":"#94a394",fontWeight:600}}>All</button>
        {fields.map(f => {
          const sel = rec.fieldIds.includes(f.id);
          return <button key={f.id} onClick={() => upRec(rec.id,"fieldIds",sel?rec.fieldIds.filter(x=>x!==f.id):[...rec.fieldIds,f.id])} style={{padding:"2px 8px",fontSize:10,fontWeight:sel?600:400,borderRadius:5,border:"none",cursor:"pointer",background:sel?f.color+"18":"#f0f2ee",color:sel?f.color:"#b4bab4"}}>{f.name}</button>;
        })}
      </div>
    </div>
  );

  const renderForm = (r) => {
    const lbl = (t) => ({fontSize:9,color:"#6b7b6b",marginBottom:2});
    const inp = (val,fn,ph,w) => <input value={val||""} onChange={e=>upRec(r.id,fn,e.target.value)} placeholder={ph} style={{...TI,width:w||"100%",fontSize:11}} />;
    const sel = (val,fn,opts) => <select value={val||""} onChange={e=>upRec(r.id,fn,e.target.value)} style={{...SS,width:"100%",fontSize:11}}>{opts.map(o => typeof o==="string"?<option key={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}</select>;

    const toggleItem = (field, name, key, val) => {
      const arr = r[field] || [];
      const idx = arr.findIndex(x => x.name === name);
      if (idx >= 0) {
        const updated = [...arr]; updated[idx] = {...updated[idx], [key]: val};
        upRec(r.id, field, updated);
      } else {
        upRec(r.id, field, [...arr, {name, [key]: val}]);
      }
    };
    const getItem = (field, name) => (r[field] || []).find(x => x.name === name);

    const QuickGrid = ({items, field, levels, levelKey}) => (
      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
        {items.map(name => {
          const it = getItem(field, name);
          const val = it?.[levelKey] || "";
          const active = val && val !== "nil";
          return (
            <div key={name} style={{display:"flex",alignItems:"center",gap:2,background:active?"#2c6e3f08":"#f7f8f6",borderRadius:6,padding:"2px 4px",border:`1px solid ${active?"#2c6e3f33":"#e2e6de"}`}}>
              <span style={{fontSize:10,color:active?"#1a2e1a":"#94a394",fontWeight:active?600:400,minWidth:60}}>{name.length>18?name.slice(0,16)+"…":name}</span>
              <select value={val} onChange={e => toggleItem(field, name, levelKey, e.target.value)} style={{...SS,fontSize:9,padding:"1px 2px",width:active?80:50,background:"transparent",border:"none",color:active?"#2c6e3f":"#b4bab4"}}>
                <option value="">—</option>
                {levels.map(l => <option key={l} value={l}>{l}</option>)}
              </select>
            </div>
          );
        })}
      </div>
    );

    return (
      <div style={{marginTop:8}}>
        {/* Row 1: date, inspector, GS, condition */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6,marginBottom:8}}>
          <div><div style={lbl()}>Date</div><input type="date" value={r.date} onChange={e=>upRec(r.id,"date",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
          <div><div style={lbl()}>Inspector</div>{inp(r.inspector,"inspector","")}</div>
          <div><div style={lbl()}>Growth stage</div>{sel(r.growthStageAgron||r.growthStage||"","growthStageAgron",["",... GS])}</div>
          <div><div style={lbl()}>Crop condition</div>{sel(r.cropCondition,"cropCondition",["","Excellent","Good","Average","Poor","Very poor","Failed"])}</div>
          <div><div style={lbl()}>Canopy</div>{sel(r.canopyDensity||"","canopyDensity",["","Thin","Patchy","Average","Dense","Very dense"])}</div>
          <div><div style={lbl()}>Plant health</div>{sel(r.plantHealth||"","plantHealth",["","Healthy","Slight stress","Moderate stress","Severe stress"])}</div>
          <div><div style={lbl()}>Priority</div>{sel(r.priority||"routine","priority",["routine","watch","action needed","urgent"])}</div>
          <div><div style={lbl()}>Next visit</div><input type="date" value={r.nextVisit||""} onChange={e=>upRec(r.id,"nextVisit",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
        </div>

        {/* Diseases */}
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:8,padding:"8px 10px",marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:700,color:"#c17f24",textTransform:"uppercase",marginBottom:4}}>Diseases</div>
          <QuickGrid items={DISEASES} field="diseases" levels={SEVERITIES} levelKey="sev" />
        </div>

        {/* Pests */}
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:8,padding:"8px 10px",marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:700,color:"#c0392b",textTransform:"uppercase",marginBottom:4}}>Pests</div>
          <QuickGrid items={PESTS} field="pests" levels={PEST_LEVELS} levelKey="level" />
        </div>

        {/* Weeds */}
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:8,padding:"8px 10px",marginBottom:6}}>
          <div style={{fontSize:10,fontWeight:700,color:"#3a8a6e",textTransform:"uppercase",marginBottom:4}}>Weeds</div>
          <QuickGrid items={WEEDS} field="weeds" levels={WEED_DENS} levelKey="density" />
        </div>

        {/* Quick action row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6,marginBottom:6}}>
          <div><div style={lbl()}>N required?</div>{sel(r.nRequired||"","nRequired",["","Not yet","Yes — next split","Applied","Complete","N/A"])}</div>
          <div><div style={lbl()}>PGR needed?</div>{sel(r.pgrRequired||"","pgrRequired",["","Not yet","Yes — soon","Applied","Not needed"])}</div>
          <div><div style={lbl()}>Trace element</div>{sel(r.traceElement||"","traceElement",["","None needed","Mn deficient","Mg deficient","S deficient","Multi-trace needed","Applied"])}</div>
        </div>

        {/* Recommendation */}
        <div style={{marginBottom:6}}>
          <div style={lbl()}>Recommendation</div>
          <textarea value={r.recommendation||""} onChange={e=>upRec(r.id,"recommendation",e.target.value)} placeholder="Products, rates, timing, conditions to wait for..." rows={3} style={{...TI,width:"100%",fontSize:11,resize:"vertical",background:"#fffdf5",borderLeft:"3px solid #2c6e3f",padding:"8px 10px"}} />
        </div>

        {/* Notes + fields */}
        <div style={{marginBottom:6}}><div style={lbl()}>Notes</div>{inp(r.notes,"notes","Photos, tissue test results, lodging risk...")}</div>
        <FileAttach rec={r} accept=".pdf,.png,.jpg,.jpeg" label="Attach photos/notes" />
        <FieldPicker rec={r} />
      </div>
    );
  };

  const summaryLine = (r) => {
    const dCount = (r.diseases||[]).filter(d=>d.sev&&d.sev!=="nil").length;
    const pCount = (r.pests||[]).filter(p=>p.level&&p.level!=="nil").length;
    const wCount = (r.weeds||[]).filter(w=>w.density&&w.density!=="nil").length;
    const badges = [];
    if (dCount) badges.push(`${dCount} disease${dCount>1?"s":""}`);
    if (pCount) badges.push(`${pCount} pest${pCount>1?"s":""}`);
    if (wCount) badges.push(`${wCount} weed${wCount>1?"s":""}`);
    return <><span style={{fontWeight:700,color:"#2c6e3f"}}>{r.growthStageAgron||r.cropCondition||"Inspection"}</span> <span style={{color:"#6b7b6b"}}>{r.inspector}{badges.length?` · ${badges.join(", ")}`:""}</span>{r.priority==="urgent"&&<span style={{fontSize:9,color:"#c0392b",fontWeight:700,marginLeft:4}}>URGENT</span>}{r.priority==="action needed"&&<span style={{fontSize:9,color:"#c17f24",fontWeight:700,marginLeft:4}}>ACTION</span>}</>;
  };

  return (
    <div>
      {/* Agronomy Subtabs */}
      <div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={() => {setAgronomySubtab("inspections");setEditId(null);}} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",transition:"all 0.2s",
          background:agronomySubtab==="inspections"?"#2c6e3f":"#2c6e3f08",color:agronomySubtab==="inspections"?"#fff":"#2c6e3f"}}>🔬 Inspections</button>
        <button onClick={() => setAgronomySubtab("cp")} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",transition:"all 0.2s",
          background:agronomySubtab==="cp"?"#c17f24":"#c17f240a",color:agronomySubtab==="cp"?"#fff":"#c17f24"}}>🍄 Crop Protection</button>
        <button onClick={() => setAgronomySubtab("fert")} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",transition:"all 0.2s",
          background:agronomySubtab==="fert"?"#4a7c59":"#4a7c590a",color:agronomySubtab==="fert"?"#fff":"#4a7c59"}}>🌱 Fertiliser</button>
      </div>

      {/* Inspections Subtab */}
      {agronomySubtab === "inspections" && (
        <div>
          {/* Pending Jobs */}
          {(() => {
            const pendingJobs = (jobs||[]).filter(j => j.status !== "completed" && j.type === "agron");
            if (pendingJobs.length === 0) return null;
            return (
              <div style={{background:"#fffdf5",border:"1px solid #c17f2422",borderRadius:10,padding:"8px 12px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#c17f24",textTransform:"uppercase"}}>Pending Jobs ({pendingJobs.length})</div>
                  <div style={{fontSize:9,color:"#94a394"}}>Created from programmes. Click to start recording.</div>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {pendingJobs.map(j => {
                    const fCount = (j.fieldIds||[]).length;
                    const fNames = (j.fieldIds||[]).slice(0,3).map(fid => fields.find(f=>f.id===fid)?.name||"").filter(Boolean).join(", ");
                    const statusCol = j.status==="in-progress"?"#2c6e3f":"#c17f24";
                    return (
                      <div key={j.id} style={{position:"relative",display:"inline-block"}}>
                        <button onClick={() => addFromJob(j)}
                          style={{padding:"6px 12px",fontSize:10,borderRadius:8,border:`1px solid ${statusCol}22`,cursor:"pointer",textAlign:"left",
                            background:j.status==="in-progress"?"#2c6e3f08":"#fff",color:"#1a2e1a",maxWidth:280}}>
                          <div style={{fontWeight:700,fontSize:11,color:statusCol,marginBottom:2}}>{j.label}</div>
                          <div style={{fontSize:9,color:"#6b7b6b"}}>{j.description?.slice(0,60)}{j.description?.length>60?"…":""}</div>
                          <div style={{fontSize:9,color:"#94a394",marginTop:1}}>{fCount} field{fCount!==1?"s":""}{fNames?` · ${fNames}`:""}{fCount>3?"…":""}</div>
                          {j.status==="in-progress" && <div style={{fontSize:8,color:"#2c6e3f",fontWeight:700,marginTop:2}}>IN PROGRESS</div>}
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); if(confirm("Delete this pending job?")) setJobs(prev => (prev||[]).filter(job => job.id !== j.id)); }}
                          style={{position:"absolute",top:-2,right:-2,width:24,height:24,padding:0,borderRadius:"50%",background:"#c0392b",color:"#fff",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Toolbar */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
            <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
              <select value={filterField} onChange={e=>setFilterField(e.target.value)} style={{...SS,fontSize:10,width:140}}>
                <option value="all">All fields</option>
                {fields.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
              </select>
              <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{...TI,fontSize:10,width:110,padding:"3px 6px"}} />
              <span style={{fontSize:10,color:"#94a394"}}>to</span>
              <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{...TI,fontSize:10,width:110,padding:"3px 6px"}} />
              {(filterField!=="all"||filterDateFrom||filterDateTo) && <button onClick={()=>{setFilterField("all");setFilterDateFrom("");setFilterDateTo("");}} style={{fontSize:10,color:"#c0392b55",background:"none",border:"none",cursor:"pointer"}}>Clear filters</button>}
            </div>
            <div style={{display:"flex",gap:4}}>
              <select value={sortMode} onChange={e=>setSortMode(e.target.value)} style={{...SS,fontSize:10,width:90}}>
                <option value="recent">Newest</option><option value="oldest">Oldest</option>
              </select>
              <button onClick={()=>setViewMode(v=>v==="grid"?"list":"grid")} style={{padding:"4px 10px",fontSize:10,background:viewMode==="grid"?"#2c6e3f10":"#f0f2ee",color:"#6b7b6b",border:"1px solid #e2e6de",borderRadius:6,cursor:"pointer"}}>{viewMode==="grid"?"▦ Grid":"☰ List"}</button>
              <button onClick={addRec} style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:DTYPE.color,color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}}>+ New {DTYPE.label}</button>
              {filtered.length > 0 && <button onClick={exportCSV} style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:DTYPE.color+"0a",color:DTYPE.color,border:"none",borderRadius:8,cursor:"pointer"}}>Export CSV</button>}
            </div>
          </div>

          {/* Records */}
          <div style={viewMode==="grid" ? {display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8} : {}}>
          {filtered.map(r => {
            const isOpen = editId === r.id;
            const fNames = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name || "").filter(Boolean).join(", ");
            if (viewMode==="grid" && !isOpen) {
              return (
                <div key={r.id} onClick={()=>setEditId(r.id)} style={{background:r.pinned?"#fffdf5":"#fff",border:`1px solid ${r.pinned?"#c17f2433":"#e2e6de"}`,borderRadius:12,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderTop:`3px solid ${DTYPE.color}`,position:"relative",minHeight:80}}>
                  {r.pinned && <span style={{position:"absolute",top:4,right:6,fontSize:12}}>📌</span>}
                  <div style={{fontSize:11,fontWeight:600,color:"#1a2e1a",marginBottom:3}}>{r.date}</div>
                  <div style={{fontSize:12,marginBottom:4}}>{summaryLine(r)}</div>
                  {fNames && <div style={{fontSize:9,color:"#94a394",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fNames}</div>}
                  {r.notes && <div style={{fontSize:9,color:"#6b7b6b",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{r.notes}</div>}
                  {(r.attachments||[]).length>0 && <span style={{fontSize:9,color:"#4a7c59"}}>📎 {r.attachments.length}</span>}
                </div>
              );
            }
            return (
              <div key={r.id} style={{background:r.pinned?"#fffdf5":"#fff",border:`1px solid ${r.pinned?"#c17f2433":"#e2e6de"}`,borderRadius:10,padding:isOpen?"14px":"8px 14px",marginBottom:viewMode==="grid"?0:4,boxShadow:"0 1px 2px rgba(0,0,0,0.03)",borderLeft:`3px solid ${DTYPE.color}`,transition:"padding 0.15s",gridColumn:isOpen&&viewMode==="grid"?"1 / -1":"auto"}}>
                <div onClick={()=>setEditId(isOpen?null:r.id)} style={{display:"flex",gap:8,alignItems:"center",cursor:"pointer",flexWrap:"wrap"}}>
                  {r.pinned && <span style={{fontSize:11}}>📌</span>}
                  <span style={{fontSize:12,fontWeight:600,color:"#1a2e1a",minWidth:80}}>{r.date}</span>
                  <span style={{flex:"1 1 auto",fontSize:12}}>{summaryLine(r)}</span>
                  <span style={{fontSize:10,color:"#94a394",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fNames}</span>
                  <span style={{fontSize:10,color:"#d4dace"}}>{isOpen?"▼":"▶"}</span>
                </div>
                {isOpen && (
                  <div>
                    {renderForm(r)}
                    <div style={{display:"flex",gap:4,marginTop:8,borderTop:"1px solid #f0f2ee",paddingTop:6,flexWrap:"wrap",alignItems:"center"}}>
                      <button onClick={(e)=>{e.stopPropagation();pinRec(r.id);}} style={{padding:"4px 10px",fontSize:10,background:r.pinned?"#c17f2410":"#f0f2ee",color:r.pinned?"#c17f24":"#6b7b6b",border:"none",borderRadius:6,cursor:"pointer"}}>{r.pinned?"📌 Unpin":"📌 Pin"}</button>
                      {r.jobId && (() => {
                        const job = (jobs||[]).find(j => j.id === r.jobId);
                        const done = job?.status === "completed";
                        return (
                          <button onClick={() => { if(!done) completeJob(r.jobId); }} style={{padding:"4px 12px",fontSize:10,fontWeight:700,background:done?"#2c6e3f10":"#2c6e3f",color:done?"#2c6e3f":"#fff",border:"none",borderRadius:6,cursor:done?"default":"pointer"}}>
                            {done ? "✓ Job Complete" : "Mark Job Complete"}
                          </button>
                        );
                      })()}
                      {r.jobId && <span style={{fontSize:9,color:"#94a394"}}>From: {(jobs||[]).find(j=>j.id===r.jobId)?.label || "Job"}</span>}
                      <button onClick={()=>dupRec(r.id)} style={{padding:"4px 10px",fontSize:10,background:"#f0f2ee",color:"#6b7b6b",border:"none",borderRadius:6,cursor:"pointer",marginLeft:r.jobId?"auto":0}}>Duplicate</button>
                      <button onClick={()=>rmRec(r.id)} style={{padding:"4px 10px",fontSize:10,background:"none",color:"#c0392b55",border:"none",borderRadius:6,cursor:"pointer"}}>Delete</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
          </div>
          {filtered.length === 0 && <div style={{padding:24,textAlign:"center",color:"#94a394",fontSize:12}}>No agronomy records{filterField!=="all"||filterDateFrom?" matching filters":""}. Click "+ New Agronomy" to start.</div>}
        </div>
      )}

      {/* Crop Protection Subtab */}
      {agronomySubtab === "cp" && (
        <CropProtProgramme key={"cp-"+progState.cp?.splits?.length||0} fields={fields} onBudget={(c,f,pd) => onBudget("cp",c,f,pd)} onHerbBudget={(c,f,pd) => onBudget("herb",c,f,pd)} saved={progState.cp} savedHerb={progState.herb} onSave={s => onProgSave("cp",s)} onHerbSave={s => onProgSave("herb",s)} jobs={jobs} setJobs={setJobs} />
      )}

      {/* Fertiliser Subtab */}
      {agronomySubtab === "fert" && (
        <FertProgramme key={"fe-"+progState.fert?.splits?.length||0} fields={fields} onBudget={(c,f,pd) => onBudget("fert",c,f,pd)} saved={progState.fert} onSave={s => onProgSave("fert",s)} jobs={jobs} setJobs={setJobs} progState={progState} />
      )}
    </div>
  );
};

// ─── FARM DIARY ───────────────────────────────────────────────────────────
const FarmDiary = ({fields, saved, onSave, jobs, setJobs}) => {
  const DTYPES = [
    {id:"spray",label:"Spraying",icon:"🧪",color:"#c17f24"},
    {id:"fert",label:"Fertiliser",icon:"🌱",color:"#4a7c59"},
    {id:"ops",label:"Operations",icon:"🚜",color:"#b8922a"},
    {id:"notes",label:"Field Notes",icon:"📝",color:"#6b7b6b"},
    {id:"tsum",label:"T-Sum",icon:"🌡️",color:"#a63d2b"},
  ];
  const [diaryTab, setDiaryTab] = useState("spray");
  const [records, setRecords] = useState(saved?.records || []);
  const [editId, setEditId] = useState(null);
  const [filterField, setFilterField] = useState("all");
  const [filterDateFrom, setFilterDateFrom] = useState("");
  const [filterDateTo, setFilterDateTo] = useState("");
  const [sortMode, setSortMode] = useState("recent"); // "recent" | "oldest"
  const [viewMode, setViewMode] = useState("grid"); // "grid" | "list"

  const WIND = ["calm","light","moderate","gusty"];
  const COND = ["dry","damp","wet","dew","frost"];
  const GS = ["GS10-19 Seedling","GS20-29 Tillering","GS30 Stem ext.","GS31-32 1st-2nd node","GS33-37 Mid stem","GS39 Flag leaf","GS49-59 Booting/heading","GS61-69 Flowering","GS71-89 Grain fill","GS90+ Senescence"];

  const mkRec = (type) => ({
    id: Date.now(), type,
    fieldIds: [], date: new Date().toISOString().split("T")[0],
    // Spray fields
    product: "", rate: "", unit: "L/ha", waterVol: "", nozzle: "",
    wind: "light", temp: "", conditions: "dry", hi: "", batchNo: "",
    justification: "", growthStage: "",
    // Fert fields
    fertProduct: "", fertGrade: "", fertRate: "", fertUnit: "kg/ha", fertMethod: "spreader",
    // Ops fields
    opsType: "", opsDetail: "", opsCost: "", opsConditions: "good", opsDepth: "", opsSpeed: "",
    // Notes
    noteTitle: "", noteText: "",
    // Attachments (base64 data URLs)
    attachments: [],
    // Pin
    pinned: false,
    // Common
    operator: "", notes: "",
  });

  const addRec = () => { const r = mkRec(diaryTab); setRecords(p => [r,...p]); setEditId(r.id); };
  const addFromJob = (job) => {
    const r = mkRec(job.type || diaryTab);
    r.jobId = job.id;
    r.fieldIds = [...(job.fieldIds || [])];
    r.customNotes = job.customNotes || "";
    if (job.type === "spray" && job.products) {
      // Fill all products into structured format
      r.product = job.products.map(p => p.name).join(" + ");
      r.rate = job.products[0]?.rate || "";
      r.unit = job.products[0]?.unit || "L/ha";
      // Store full product details in notes for reference
      r.notes = job.products.map(p => `${p.name}: ${p.rate} ${p.unit} (Total: ${p.total})`).join(" | ");
    }
    if (job.type === "fert" && job.products) {
      r.fertProduct = job.products.map(p => p.name).join(" + ");
      r.fertRate = job.products[0]?.rate || "";
      r.fertUnit = job.products[0]?.unit || "kg/ha";
      r.fertGrade = job.products[0]?.grade || "";
      r.notes = job.products.map(p => `${p.name}: ${p.rate} ${p.unit} (Total: ${p.total})`).join(" | ");
    }
    setRecords(p => [r,...p]);
    setEditId(r.id);
    // Mark job as in-progress
    if (setJobs) setJobs(prev => (prev||[]).map(j => j.id === job.id ? {...j, status: "in-progress"} : j));
  };
  const completeJob = (jobId) => {
    if (setJobs) setJobs(prev => (prev||[]).map(j => j.id === jobId ? {...j, status: "completed"} : j));
  };
  const upRec = (id,f,v) => setRecords(p => p.map(r => r.id===id?{...r,[f]:v}:r));
  const rmRec = id => { if(!confirm("Delete this record?")) return; setRecords(p => p.filter(r => r.id!==id)); if(editId===id) setEditId(null); };
  const dupRec = id => { const src = records.find(r=>r.id===id); if(!src) return; const n = {...src,id:Date.now(),date:new Date().toISOString().split("T")[0],pinned:false}; setRecords(p=>[n,...p]); setEditId(n.id); };
  const pinRec = id => setRecords(p => p.map(r => r.id===id ? {...r, pinned: !r.pinned} : r));

  useEffect(() => { if(onSave) onSave({records}); }, [records]);

  // Filtered and sorted records
  const filtered = records.filter(r => {
    if (r.type !== diaryTab) return false;
    if (filterField !== "all" && !r.fieldIds.includes(+filterField)) return false;
    if (filterDateFrom && r.date < filterDateFrom) return false;
    if (filterDateTo && r.date > filterDateTo) return false;
    return true;
  }).sort((a, b) => {
    // Pinned always first
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    // Then by date
    if (sortMode === "recent") return b.date.localeCompare(a.date) || b.id - a.id;
    return a.date.localeCompare(b.date) || a.id - b.id;
  });

  const exportCSV = () => {
    const typeRecs = records.filter(r => r.type === diaryTab);
    let hdr, rowFn;
    if (diaryTab === "spray") {
      hdr = "Date,Field(s),Product,Rate,Unit,Water Vol,Nozzle,Growth Stage,Wind,Temp,Conditions,HI,Batch,Operator,Justification,Notes";
      rowFn = r => {
        const fn = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name||"").join("; ");
        return [r.date,fn,r.product,r.rate,r.unit,r.waterVol,r.nozzle,r.growthStage,r.wind,r.temp,r.conditions,r.hi,r.batchNo,r.operator,r.justification,r.notes];
      };
    } else if (diaryTab === "fert") {
      hdr = "Date,Field(s),Product,Grade,Rate,Unit,Method,Operator,Notes";
      rowFn = r => {
        const fn = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name||"").join("; ");
        return [r.date,fn,r.fertProduct,r.fertGrade,r.fertRate,r.fertUnit,r.fertMethod,r.operator,r.notes];
      };
    } else if (diaryTab === "ops") {
      hdr = "Date,Field(s),Operation,Details,Cost £/ha,Operator,Notes";
      rowFn = r => {
        const fn = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name||"").join("; ");
        return [r.date,fn,r.opsType,r.opsDetail,r.opsCost,r.operator,r.notes];
      };
    } else {
      hdr = "Date,Field(s),Title,Note";
      rowFn = r => {
        const fn = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name||"").join("; ");
        return [r.date,fn,r.noteTitle,r.noteText];
      };
    }
    const rows = typeRecs.map(r => rowFn(r).map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(","));
    const blob = new Blob([hdr+"\n"+rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `diary-${diaryTab}-${new Date().toISOString().split("T")[0]}.csv`; a.click();
  };

  // File attachment handler — stores as base64 data URL
  const addAttachment = (recId, file) => {
    if (!file) return;
    const maxMB = 5;
    if (file.size > maxMB * 1024 * 1024) { alert(`File too large (max ${maxMB}MB)`); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const att = {id: Date.now(), name: file.name, type: file.type, size: file.size, data: e.target.result, addedDate: new Date().toISOString().split("T")[0]};
      setRecords(p => p.map(r => r.id === recId ? {...r, attachments: [...(r.attachments||[]), att]} : r));
    };
    reader.readAsDataURL(file);
  };
  const rmAttachment = (recId, attId) => {
    setRecords(p => p.map(r => r.id === recId ? {...r, attachments: (r.attachments||[]).filter(a => a.id !== attId)} : r));
  };
  const viewAttachment = (att) => {
    if (att.type === "application/pdf") {
      const w = window.open("", "_blank");
      if (w) { w.document.write(`<html><head><title>${att.name}</title></head><body style="margin:0"><iframe src="${att.data}" style="width:100%;height:100vh;border:none"></iframe></body></html>`); w.document.close(); }
    } else {
      const w = window.open("", "_blank");
      if (w) { w.document.write(`<html><head><title>${att.name}</title></head><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0"><img src="${att.data}" style="max-width:100%;max-height:100vh;object-fit:contain" /></body></html>`); w.document.close(); }
    }
  };

  // Attachment display sub-component
  const FileAttach = ({rec, accept, label}) => (
    <div style={{marginTop:4}}>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <label style={{padding:"4px 12px",fontSize:10,fontWeight:600,background:"#f0f2ee",color:"#4a7c59",borderRadius:6,cursor:"pointer",border:"1px dashed #c4cec4",display:"inline-flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:13}}>📎</span> {label || "Attach file"}
          <input type="file" accept={accept || ".pdf,.png,.jpg,.jpeg,.gif,.webp"} onChange={e => {if(e.target.files[0]) addAttachment(rec.id, e.target.files[0]); e.target.value="";}} style={{display:"none"}} />
        </label>
        <span style={{fontSize:9,color:"#94a394"}}>PDF, images — max 5MB</span>
      </div>
      {(rec.attachments||[]).length > 0 && (
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
          {(rec.attachments||[]).map(att => {
            const isPdf = att.type === "application/pdf";
            const isImg = att.type?.startsWith("image/");
            return (
              <div key={att.id} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",background:isPdf?"#c0392b06":"#2c6e3f06",borderRadius:6,border:`1px solid ${isPdf?"#c0392b15":"#2c6e3f15"}`}}>
                {isImg && <img src={att.data} style={{width:28,height:28,objectFit:"cover",borderRadius:4,cursor:"pointer"}} onClick={()=>viewAttachment(att)} />}
                {isPdf && <span style={{fontSize:14,cursor:"pointer"}} onClick={()=>viewAttachment(att)}>📄</span>}
                <div style={{cursor:"pointer"}} onClick={()=>viewAttachment(att)}>
                  <div style={{fontSize:10,fontWeight:600,color:"#1a2e1a",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.name}</div>
                  <div style={{fontSize:8,color:"#94a394"}}>{(att.size/1024).toFixed(0)}KB · {att.addedDate}</div>
                </div>
                <button onClick={()=>rmAttachment(rec.id,att.id)} style={{background:"none",border:"none",color:"#c0392b44",cursor:"pointer",fontSize:12,padding:"0 2px"}}>×</button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );

  // Field selector sub-component
  const FieldPicker = ({rec}) => (
    <div>
      <div style={{fontSize:9,color:"#6b7b6b",marginBottom:3}}>Fields:</div>
      <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        <button onClick={()=>upRec(rec.id,"fieldIds",rec.fieldIds.length===fields.length?[]:fields.map(f=>f.id))} style={{padding:"2px 8px",fontSize:9,borderRadius:5,border:"none",cursor:"pointer",background:rec.fieldIds.length===fields.length?"#2c6e3f15":"#f0f2ee",color:rec.fieldIds.length===fields.length?"#2c6e3f":"#94a394",fontWeight:600}}>All</button>
        {fields.map(f => {
          const sel = rec.fieldIds.includes(f.id);
          return <button key={f.id} onClick={() => upRec(rec.id,"fieldIds",sel?rec.fieldIds.filter(x=>x!==f.id):[...rec.fieldIds,f.id])} style={{padding:"2px 8px",fontSize:10,fontWeight:sel?600:400,borderRadius:5,border:"none",cursor:"pointer",background:sel?f.color+"18":"#f0f2ee",color:sel?f.color:"#b4bab4"}}>{f.name}</button>;
        })}
      </div>
    </div>
  );

  // Render form fields based on diary type
  const renderForm = (r) => {
    const grid = {display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:6,marginTop:8};
    const lbl = (t) => ({fontSize:9,color:"#6b7b6b",marginBottom:2});
    const inp = (val,fn,ph,w) => <input value={val||""} onChange={e=>upRec(r.id,fn,e.target.value)} placeholder={ph} style={{...TI,width:w||"100%",fontSize:11}} />;
    const sel = (val,fn,opts) => <select value={val||""} onChange={e=>upRec(r.id,fn,e.target.value)} style={{...SS,width:"100%",fontSize:11}}>{opts.map(o => typeof o==="string"?<option key={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}</select>;

    if (diaryTab === "spray") return (
      <div style={grid}>
        <div><div style={lbl()}>Date</div><input type="date" value={r.date} onChange={e=>upRec(r.id,"date",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
        <div><div style={lbl()}>Product</div>{inp(r.product,"product","e.g. Proline 275")}</div>
        <div><div style={lbl()}>Rate</div><div style={{display:"flex",gap:3}}>{inp(r.rate,"rate","0.72",60)}{sel(r.unit,"unit",["L/ha","kg/ha","g/ha","ml/ha"])}</div></div>
        <div><div style={lbl()}>Water vol (L/ha)</div>{inp(r.waterVol,"waterVol","200")}</div>
        <div><div style={lbl()}>Nozzle</div>{inp(r.nozzle,"nozzle","03-F110")}</div>
        <div><div style={lbl()}>Growth stage</div>{sel(r.growthStage,"growthStage",["",... GS])}</div>
        <div><div style={lbl()}>Wind</div>{sel(r.wind,"wind",WIND)}</div>
        <div><div style={lbl()}>Temp °C</div>{inp(r.temp,"temp","12")}</div>
        <div><div style={lbl()}>Conditions</div>{sel(r.conditions,"conditions",COND)}</div>
        <div><div style={lbl()}>Harvest interval (d)</div>{inp(r.hi,"hi","35")}</div>
        <div><div style={lbl()}>Batch no.</div>{inp(r.batchNo,"batchNo","")}</div>
        <div><div style={lbl()}>Operator</div>{inp(r.operator,"operator","Name")}</div>
        {r.notes && r.jobId && (
          <div style={{gridColumn:"1 / -1",background:"#c17f240a",borderRadius:8,padding:"8px 10px",border:"1px solid #c17f2422"}}>
            <div style={{fontSize:9,fontWeight:700,color:"#c17f24",marginBottom:4,textTransform:"uppercase"}}>📦 Product Requirements</div>
            <div style={{fontSize:10,color:"#1a2e1a",whiteSpace:"pre-wrap",fontFamily:"monospace",lineHeight:1.4}}>{r.notes}</div>
          </div>
        )}
        <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Justification</div>{inp(r.justification,"justification","Disease pressure, forecast rain, growth stage...")}</div>
        <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Custom Notes</div><textarea value={r.customNotes||""} onChange={e=>upRec(r.id,"customNotes",e.target.value)} placeholder="Additional notes, observations, follow-up actions..." rows={2} style={{...TI,width:"100%",fontSize:11,resize:"vertical",background:"#f7f8f6",borderLeft:"3px solid #c17f24"}} /></div>
        <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Record Notes</div>{inp(r.notes,"notes","Tank mix partner, adjuvant, buffer zones...")}</div>
        <div style={{gridColumn:"1 / -1"}}><FileAttach rec={r} accept=".pdf,.png,.jpg,.jpeg" label="Attach recommendation sheet" /></div>
        <div style={{gridColumn:"1 / -1"}}><FieldPicker rec={r} /></div>
      </div>
    );
    if (diaryTab === "fert") return (
      <div style={grid}>
        <div><div style={lbl()}>Date</div><input type="date" value={r.date} onChange={e=>upRec(r.id,"date",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
        <div><div style={lbl()}>Product</div>{inp(r.fertProduct,"fertProduct","e.g. AN 34.5%")}</div>
        <div><div style={lbl()}>Grade</div>{inp(r.fertGrade,"fertGrade","34.5-0-0")}</div>
        <div><div style={lbl()}>Rate</div><div style={{display:"flex",gap:3}}>{inp(r.fertRate,"fertRate","300",60)}{sel(r.fertUnit,"fertUnit",["kg/ha","L/ha","t/ha"])}</div></div>
        <div><div style={lbl()}>Method</div>{sel(r.fertMethod,"fertMethod",["spreader","sprayer (liquid)","drill placement","foliar","slurry","FYM"])}</div>
        <div><div style={lbl()}>Operator</div>{inp(r.operator,"operator","")}</div>
        <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Notes</div>{inp(r.notes,"notes","Spreading conditions, tramline timing, NVZ compliance...")}</div>
        <div style={{gridColumn:"1 / -1"}}><FileAttach rec={r} accept=".pdf,.png,.jpg,.jpeg" label="Attach recommendation sheet" /></div>
        <div style={{gridColumn:"1 / -1"}}><FieldPicker rec={r} /></div>
      </div>
    );
    if (diaryTab === "ops") {
      const OPS_DETAILS = {
        "Ploughing":["Reversible","Conventional","One-pass"],
        "Subsoiling":["Winged","Straight leg","Mole plough"],
        "Discing":["Light disc","Heavy disc","Carrier"],
        "Pressing":["Cambridge roll","Flat roll","Ring roll"],
        "Drilling":["Disc drill","Tine drill","Precision drill","Strip-till","Direct drill","Broadcasting"],
        "Rolling":["Pre-emergence","Post-emergence","Spring"],
        "Combining":["Wheat","Barley","OSR","Oats","Beans","Peas","Other"],
        "Baling":["Round bale","Square bale","Chopping"],
        "Carting":["Grain","Straw","Beet","Other"],
        "Hedging":["Flail","Circular saw","Laying"],
        "Ditching":["Machine clean","Hand clean","New ditch"],
        "Fencing":["Post & rail","Stock","Electric","Repair"],
        "Mowing":["Topper","Flail mower","Disc mower"],
        "Desiccation":["Glyphosate","Diquat","Other"],
        "Lime spreading":["Ground limestone","Calcium lime","Magnesium lime"],
        "Other":[""],
      };
      const OPS_TYPES = Object.keys(OPS_DETAILS);
      const details = OPS_DETAILS[r.opsType] || [""];
      return (
        <div style={grid}>
          <div><div style={lbl()}>Date</div><input type="date" value={r.date} onChange={e=>upRec(r.id,"date",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
          <div><div style={lbl()}>Operation</div>{sel(r.opsType,"opsType",["", ...OPS_TYPES])}</div>
          {details.length > 0 && details[0] !== "" && <div><div style={lbl()}>Method</div>{sel(r.opsDetail,"opsDetail",["", ...details])}</div>}
          <div><div style={lbl()}>Conditions</div>{sel(r.opsConditions||"good","opsConditions",["good","fair","poor","wet","frozen"])}</div>
          {(r.opsType==="Ploughing"||r.opsType==="Subsoiling"||r.opsType==="Drilling") && <div><div style={lbl()}>Depth</div>{sel(r.opsDepth||"","opsDepth",["","2in / 50mm","4in / 100mm","6in / 150mm","8in / 200mm","10in / 250mm","12in / 300mm","14in / 350mm"])}</div>}
          <div><div style={lbl()}>Cost £/ha</div>{inp(r.opsCost,"opsCost","45")}</div>
          <div><div style={lbl()}>Operator</div>{inp(r.operator,"operator","")}</div>
          <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Notes</div>{inp(r.notes,"notes","")}</div>
          <div style={{gridColumn:"1 / -1"}}><FieldPicker rec={r} /></div>
        </div>
      );
    }
    // Notes
    return (
      <div style={grid}>
        <div><div style={lbl()}>Date</div><input type="date" value={r.date} onChange={e=>upRec(r.id,"date",e.target.value)} style={{...TI,width:"100%",fontSize:11}} /></div>
        <div style={{gridColumn:"span 2"}}><div style={lbl()}>Title</div>{inp(r.noteTitle,"noteTitle","e.g. Drainage issue NE corner")}</div>
        <div style={{gridColumn:"1 / -1"}}><div style={lbl()}>Note</div><textarea value={r.noteText||""} onChange={e=>upRec(r.id,"noteText",e.target.value)} placeholder="Free text notes — soil conditions, observations, reminders, issues to follow up..." rows={4} style={{...TI,width:"100%",fontSize:11,resize:"vertical"}} /></div>
        <div style={{gridColumn:"1 / -1"}}><FieldPicker rec={r} /></div>
      </div>
    );
  };

  // Summary line for collapsed records
  const summaryLine = (r) => {
    const fNames = r.fieldIds.map(fid => fields.find(f=>f.id===fid)?.name || "").filter(Boolean).join(", ");
    if (r.type === "spray") return <><span style={{fontWeight:700,color:"#c17f24"}}>{r.product || "—"}</span> <span style={{color:"#6b7b6b"}}>{r.rate} {r.unit}</span>{(r.attachments||[]).length>0&&<span style={{fontSize:9,color:"#4a7c59",marginLeft:4}}>📎{r.attachments.length}</span>}</>;
    if (r.type === "fert") return <><span style={{fontWeight:700,color:"#4a7c59"}}>{r.fertProduct || "—"}</span> <span style={{color:"#6b7b6b"}}>{r.fertRate} {r.fertUnit} {r.fertGrade}</span>{(r.attachments||[]).length>0&&<span style={{fontSize:9,color:"#4a7c59",marginLeft:4}}>📎{r.attachments.length}</span>}</>;
    if (r.type === "ops") return <><span style={{fontWeight:700,color:"#b8922a"}}>{r.opsType || "—"}</span> <span style={{color:"#6b7b6b"}}>{r.opsDetail}{r.opsCost?` · £${r.opsCost}/ha`:""}</span></>;
    return <><span style={{fontWeight:700,color:"#6b7b6b"}}>{r.noteTitle || "Note"}</span></>;
  };

  const activeType = DTYPES.find(d => d.id === diaryTab);
  const typeCounts = {};
  DTYPES.forEach(d => { typeCounts[d.id] = records.filter(r => r.type === d.id).length; });

  return (
    <div>
      {/* Diary sub-tabs */}
      <div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        {DTYPES.map(d => (
          <button key={d.id} onClick={() => {setDiaryTab(d.id);setEditId(null);}} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",transition:"all 0.2s",
            background:diaryTab===d.id?d.color:d.color+"08",color:diaryTab===d.id?"#fff":d.color}}>
            {d.icon} {d.label} {typeCounts[d.id]>0?`(${typeCounts[d.id]})`:""}</button>
        ))}
      </div>

      {/* T-Sum sub-tab renders inline */}
      {diaryTab === "tsum" ? (
        <TSumTracker fields={fields} />
      ) : (
      <>
      {/* Pending Jobs from Programmes */}
      {(() => {
