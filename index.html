      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">SBI</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + esc(af.sbi||"—") + '</td></tr>';
      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">NVZ designation</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + (isNVZ?"Yes — NVZ designated":"No") + '</td></tr>';
      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Plan date</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + new Date().toLocaleDateString() + '</td></tr>';
      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Crop year</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">Harvest ' + new Date().getFullYear() + '</td></tr>';
      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Total farm area</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + totalHaPdf.toFixed(1) + ' ha (' + fields.length + ' fields)</td></tr>';
      body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Prepared by</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">Crop Dynamics — Independent Agronomic Advice</td></tr>';
      body += '</table>';

      // Section 2: Organic N loading
      body += H("2. Livestock Organic Nitrogen Loading", "#4a7c59");
      const herds = lsState.herds || [];
      const totalLivestockN = herds.reduce((s,h) => s + (h.count||0) * h.nKgYr, 0);
      const nPerHaFarm = totalHaPdf > 0 ? totalLivestockN / totalHaPdf : 0;
      if (herds.some(h=>h.count>0)) {
        body += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px"><thead><tr style="background:#4a7c590a"><th style="padding:4px 6px;text-align:left">Category</th><th style="text-align:right">Head</th><th style="text-align:right">kg N/hd/yr</th><th style="text-align:right">Total N (kg)</th></tr></thead><tbody>';
        herds.filter(h=>h.count>0).forEach(h => {
          body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:3px 6px">' + esc(h.label) + '</td><td style="text-align:right;padding:3px 6px">' + h.count + '</td><td style="text-align:right;padding:3px 6px">' + h.nKgYr + '</td><td style="text-align:right;padding:3px 6px;font-weight:700">' + (h.count*h.nKgYr).toFixed(0) + '</td></tr>';
        });
        body += '<tr style="border-top:2px solid #e2e6de"><td style="padding:4px 6px;font-weight:700" colspan="3">Total livestock organic N</td><td style="text-align:right;padding:4px 6px;font-weight:700;color:#4a7c59">' + totalLivestockN.toFixed(0) + ' kg</td></tr>';
        body += '</tbody></table>';
        body += '<div style="padding:8px;background:' + (nPerHaFarm>170?'#c0392b':'#2c6e3f') + '0a;border-radius:6px;margin-bottom:12px"><strong>Whole farm loading: ' + nPerHaFarm.toFixed(1) + ' kg organic N/ha ' + (nPerHaFarm>170?'⚠️ EXCEEDS 170 kg/ha':'✓ Within 170 kg/ha limit') + '</strong></div>';
      } else {
        body += '<p style="font-size:11px;color:#6b7b6b;margin-bottom:12px">No livestock entered. Organic N from manure = 0 kg.</p>';
      }

      // Organic manures applied (from splits)
      const fSplits = fs.splits || [];
      const mItems = fSplits.flatMap(sp => (sp.items||[]).filter(it => it.isManure && (it.rateT||0) > 0));
      const manureNAvail = mItems.reduce((s,m) => s + (m.rateT||0) * (m.nTotal||0) * (m.nAvail||0), 0);
      const manureNTotal = mItems.reduce((s,m) => s + (m.rateT||0) * (m.nTotal||0), 0);
      const manureP = mItems.reduce((s,m) => s + (m.rateT||0) * (m.p2o5||0), 0);
      const manureK = mItems.reduce((s,m) => s + (m.rateT||0) * (m.k2o||0), 0);
      if (mItems.length > 0) {
        body += '<h3 style="font-size:13px;color:#6b5b7b;margin:12px 0 6px">Organic Manure Applications</h3>';
        body += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px"><thead><tr style="background:#6b5b7b0a"><th style="padding:4px 6px;text-align:left">Manure</th><th style="text-align:right">Rate (t/ha)</th><th style="text-align:right">N total</th><th style="text-align:right">N avail</th><th style="text-align:right">P2O5</th><th style="text-align:right">K2O</th></tr></thead><tbody>';
        mItems.forEach(m => {
          body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:3px 6px">' + esc(m.name) + '</td><td style="text-align:right;padding:3px 6px">' + m.rateT + '</td><td style="text-align:right;padding:3px 6px">' + ((m.rateT||0)*(m.nTotal||0)).toFixed(1) + '</td><td style="text-align:right;padding:3px 6px;font-weight:700;color:#6b5b7b">' + ((m.rateT||0)*(m.nTotal||0)*(m.nAvail||0)).toFixed(1) + '</td><td style="text-align:right;padding:3px 6px">' + ((m.rateT||0)*(m.p2o5||0)).toFixed(1) + '</td><td style="text-align:right;padding:3px 6px">' + ((m.rateT||0)*(m.k2o||0)).toFixed(1) + '</td></tr>';
        });
        body += '<tr style="border-top:2px solid #e2e6de"><td style="padding:4px 6px;font-weight:700" colspan="2">Total (kg/ha)</td><td style="text-align:right;padding:4px 6px;font-weight:700">' + manureNTotal.toFixed(1) + '</td><td style="text-align:right;padding:4px 6px;font-weight:700;color:#6b5b7b">' + manureNAvail.toFixed(1) + '</td><td style="text-align:right;padding:4px 6px;font-weight:700">' + manureP.toFixed(1) + '</td><td style="text-align:right;padding:4px 6px;font-weight:700">' + manureK.toFixed(1) + '</td></tr>';
        body += '</tbody></table>';
      }

      // Section 3: Crop N recommendations
      body += H("3. Crop Nitrogen Recommendation", "#c17f24");
      const rb209Crop = fs.crop || "";
      const rb = rb209Crop ? RB209[rb209Crop] : null;
      const snsLabel = {sns_low:"Low (0-1)",sns_med:"Medium (2-3)",sns_high:"High (4-5)"}[fs.sns||"sns_med"]||"Medium";
      const pIdxLabel = {i0:"0 (very low)",i1:"1 (low)",i2:"2 (target)",i3:"3+ (high)"}[fs.pIdx||"i2"]||"2";
      const kIdxLabel = {i0:"0 (very low)",i1:"1 (low)",i2:"2- (target)",i3:"2+/3 (high)"}[fs.kIdx||"i2"]||"2-";
      const sStatLabel = {def:"Deficient",marg:"Marginal"}[fs.sStat||"marg"]||"Marginal";

      if (rb) {
        const nRec = rb.N[fs.sns||"sns_med"]||0;
        const pRec = rb.P[fs.pIdx||"i2"]||0;
        const kRec = rb.K[fs.kIdx||"i2"]||0;
        const sRec = rb.S[fs.sStat||"marg"]||0;
        const pRecOx = pRec ? Math.round(pRec/0.4364) : 0;
        const kRecOx = kRec ? Math.round(kRec/0.8302) : 0;

        body += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px">';
        body += '<tr><td style="padding:4px 8px;width:180px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Crop</td><td style="padding:4px 8px;font-weight:700;border-bottom:1px solid #f0f2ee">' + esc(rb209Crop) + '</td></tr>';
        body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">Soil N Supply (SNS)</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + snsLabel + '</td></tr>';
        body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">P Index</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + pIdxLabel + '</td></tr>';
        body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">K Index</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + kIdxLabel + '</td></tr>';
        body += '<tr><td style="padding:4px 8px;color:#6b7b6b;border-bottom:1px solid #f0f2ee">S Status</td><td style="padding:4px 8px;border-bottom:1px solid #f0f2ee">' + sStatLabel + '</td></tr>';
        body += '</table>';

        body += '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px"><thead><tr style="background:#c17f240a"><th style="padding:6px;text-align:left">Nutrient</th><th style="text-align:right;padding:6px">RB209 Recommendation</th><th style="text-align:right;padding:6px">Organic Supply</th><th style="text-align:right;padding:6px;color:#c0392b;font-weight:800">Manufactured Fertiliser Required</th></tr></thead><tbody>';
        const fertN = Math.max(0, nRec - manureNAvail);
        const fertP = Math.max(0, pRecOx - manureP);
        const fertK = Math.max(0, kRecOx - manureK);
        body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:4px 8px;font-weight:600">Nitrogen (N)</td><td style="text-align:right;padding:4px 8px">' + nRec + ' kg/ha</td><td style="text-align:right;padding:4px 8px">' + manureNAvail.toFixed(0) + ' kg/ha</td><td style="text-align:right;padding:4px 8px;font-weight:800;color:#c0392b">' + fertN.toFixed(0) + ' kg/ha</td></tr>';
        body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:4px 8px;font-weight:600">Phosphate (P2O5)</td><td style="text-align:right;padding:4px 8px">' + pRecOx + ' kg/ha</td><td style="text-align:right;padding:4px 8px">' + manureP.toFixed(0) + ' kg/ha</td><td style="text-align:right;padding:4px 8px;font-weight:800;color:#c0392b">' + fertP.toFixed(0) + ' kg/ha</td></tr>';
        body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:4px 8px;font-weight:600">Potash (K2O)</td><td style="text-align:right;padding:4px 8px">' + kRecOx + ' kg/ha</td><td style="text-align:right;padding:4px 8px">' + manureK.toFixed(0) + ' kg/ha</td><td style="text-align:right;padding:4px 8px;font-weight:800;color:#c0392b">' + fertK.toFixed(0) + ' kg/ha</td></tr>';
        body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:4px 8px;font-weight:600">Sulphur (SO3)</td><td style="text-align:right;padding:4px 8px">' + sRec + ' kg/ha</td><td style="text-align:right;padding:4px 8px">—</td><td style="text-align:right;padding:4px 8px;font-weight:800;color:#c0392b">' + sRec + ' kg/ha</td></tr>';
        body += '</tbody></table>';

        body += '<div style="padding:8px;background:#c17f240a;border-radius:6px;font-size:11px;color:#6b7b6b">' + rb.N.note + '</div>';

        // NVZ N limit check
        if (isNVZ) {
          const nvzCropLimits = {"Winter wheat":220,"Winter barley":180,"Spring barley":150,"Winter OSR":250,"Winter oats":160,"Spring oats":130,"Grass silage (2 cut)":280,"Grass silage (3 cut)":320,"Grass grazing (intensive)":300};
          const nvzMax = nvzCropLimits[rb209Crop] || 0;
          const totalN = nRec;
          if (nvzMax > 0) {
            body += '<div style="margin:8px 0;padding:8px;background:' + (totalN>nvzMax?'#c0392b':'#2c6e3f') + '0a;border-radius:6px;font-size:11px"><strong>NVZ N max for ' + esc(rb209Crop) + ': ' + nvzMax + ' kg/ha.</strong> Planned: ' + totalN + ' kg/ha. ' + (totalN>nvzMax?'⚠️ EXCEEDS LIMIT':'✓ Within limit') + '</div>';
          }
        }
      } else {
        body += '<p style="color:#c0392b">No crop selected in Fertiliser tab. Select a crop and SNS/indices to generate the N recommendation.</p>';
      }

      // Section 4: Planned fertiliser applications
      body += H("4. Planned Fertiliser Applications", "#4a7c59");
      const splits = fs.splits || [];
      if (splits.some(sp => sp.items.length > 0)) {
        splits.forEach(sp => {
          if (!sp.items.filter(it=>it.name).length) return;
          body += '<h3 style="font-size:12px;color:#4a7c59;margin:10px 0 4px">' + esc(sp.label) + '</h3>';
          body += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:6px"><thead><tr style="background:#4a7c590a"><th style="padding:3px 6px;text-align:left">Product</th><th>Grade</th><th style="text-align:right">Rate (kg/ha)</th><th style="text-align:right">N</th><th style="text-align:right">P2O5</th><th style="text-align:right">K2O</th><th style="text-align:right">SO3</th></tr></thead><tbody>';
          sp.items.filter(it=>it.name).forEach(it => {
            const driveKg = it.driveKg || 0;
            const pct = it[it.driveNut] || 0;
            const prodKg = pct > 0 ? driveKg / (pct / 100) : 0;
            body += '<tr style="border-bottom:1px solid #f0f2ee"><td style="padding:3px 6px;font-weight:600">' + esc(it.name) + '</td><td style="padding:3px 6px;text-align:center">' + esc(it.grade||"") + '</td><td style="text-align:right;padding:3px 6px">' + prodKg.toFixed(0) + '</td>';
            body += '<td style="text-align:right;padding:3px 6px">' + (prodKg*((it.N||0)/100)).toFixed(1) + '</td>';
            body += '<td style="text-align:right;padding:3px 6px">' + (prodKg*((it.P||0)/100)*2.291).toFixed(1) + '</td>';
            body += '<td style="text-align:right;padding:3px 6px">' + (prodKg*((it.K||0)/100)*1.205).toFixed(1) + '</td>';
            body += '<td style="text-align:right;padding:3px 6px">' + (prodKg*((it.SO3||0)/100)).toFixed(1) + '</td>';
            body += '</tr>';
          });
          body += '</tbody></table>';
        });
      } else {
        body += '<p style="color:#94a394">No fertiliser products entered. Add products in the Fertiliser tab split timings.</p>';
      }

      // Section 5: Field-level summary
      body += H("5. Field-by-Field Nitrogen Summary", "#1a2e1a");
      body += '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#f0f2ee"><th style="padding:4px 6px;text-align:left">Field</th><th style="text-align:right">Ha</th><th style="text-align:left">Crop</th><th style="text-align:right">RB209 N</th><th style="text-align:right">Organic N</th><th style="text-align:right">Manuf. N</th><th style="text-align:right">Total N</th><th style="text-align:left">Soil Type</th><th style="text-align:left">P Idx</th></tr></thead><tbody>';
      const nRec = rb ? (rb.N[fs.sns||"sns_med"]||0) : 0;
      let farmTotalN = 0;
      fields.forEach(f => {
        const cr = CROPS.find(c=>c.id===f.crop);
        const s = f.soil || {};
        const pI = getSoilIdx("P",+s.pMg);
        const fieldN = nRec;
        const orgN = manureNAvail;
        const mfgN = Math.max(0, fieldN - orgN);
        const totalFieldN = orgN + mfgN;
        farmTotalN += totalFieldN * (f.ha||0);
        body += '<tr style="border-bottom:1px solid #f0f2ee">';
        body += '<td style="padding:3px 6px;font-weight:600;border-left:3px solid ' + f.color + '">' + esc(f.name) + '</td>';
        body += '<td style="text-align:right;padding:3px 6px">' + (f.ha||"") + '</td>';
        body += '<td style="padding:3px 6px;font-size:10px">' + esc(cr?.label||"") + '</td>';
        body += '<td style="text-align:right;padding:3px 6px">' + fieldN + '</td>';
        body += '<td style="text-align:right;padding:3px 6px;color:#6b5b7b">' + orgN.toFixed(0) + '</td>';
        body += '<td style="text-align:right;padding:3px 6px;color:#c17f24;font-weight:700">' + mfgN.toFixed(0) + '</td>';
        body += '<td style="text-align:right;padding:3px 6px;font-weight:700">' + totalFieldN.toFixed(0) + '</td>';
        body += '<td style="padding:3px 6px;font-size:10px">' + esc(s.soilType||"") + '</td>';
        body += '<td style="padding:3px 6px;font-size:10px;color:' + (pI?.color||"#1a2e1a") + '">' + (pI?.label||"—") + '</td>';
        body += '</tr>';
      });
      body += '</tbody></table>';
      body += '<p style="font-size:11px;color:#6b7b6b;margin-top:8px">Total manufactured N for farm: <strong>' + farmTotalN.toFixed(0) + ' kg</strong> across ' + totalHaPdf.toFixed(1) + ' ha</p>';

      // Section 6: NVZ compliance summary
      if (isNVZ) {
        body += H("6. NVZ Compliance Summary", "#a63d2b");
        body += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        body += '<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;width:300px">Whole farm organic N loading</td><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;font-weight:700;color:' + (nPerHaFarm>170?'#c0392b':'#2c6e3f') + '">' + nPerHaFarm.toFixed(1) + ' kg/ha ' + (nPerHaFarm>170?'⚠️ FAIL':'✓ PASS') + ' (limit 170)</td></tr>';
        body += '<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee">N Plan completed before 1st application</td><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;font-weight:700;color:#2c6e3f">✓ YES — ' + new Date().toLocaleDateString() + '</td></tr>';
        body += '<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee">Closed periods observed</td><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;font-size:10px;color:#6b7b6b">Manufactured N: Grassland 15 Sep – 15 Jan, Arable 1 Sep – 15 Jan. Organic: Grassland 15 Oct – 31 Jan, Arable 1 Oct – 31 Jan</td></tr>';
        body += '<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee">Individual field max (organic N)</td><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;font-size:10px;color:#6b7b6b">250 kg total N/ha from organic manures in any 12-month period on any field</td></tr>';
        body += '<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee">Crop N max (Nmax)</td><td style="padding:5px 8px;border-bottom:1px solid #f0f2ee;font-size:10px;color:#6b7b6b">Must not exceed Nmax for the crop (see Section 3)</td></tr>';
        body += '</table>';
      }

      // Signature block
      body += '<div style="margin-top:24px;padding:16px;border:2px solid #e2e6de;border-radius:8px">';
      body += '<div style="display:flex;gap:40px"><div style="flex:1"><p style="font-size:10px;color:#6b7b6b;margin-bottom:30px">Prepared by (Agronomist):</p><div style="border-bottom:1px solid #1a2e1a;margin-bottom:4px;height:1px"></div><p style="font-size:9px;color:#94a394">Signature / Date</p></div>';
      body += '<div style="flex:1"><p style="font-size:10px;color:#6b7b6b;margin-bottom:30px">Approved by (Farmer):</p><div style="border-bottom:1px solid #1a2e1a;margin-bottom:4px;height:1px"></div><p style="font-size:9px;color:#94a394">Signature / Date</p></div></div>';
      body += '</div>';
    }
    body += '<p style="font-size:9px;color:#94a394;margin-top:24px;border-top:1px solid #e2e6de;padding-top:8px">Crop Dynamics 2026 — Independent Agronomic Advice. This document is for guidance only.</p>';
    const titleMap = {summary:"Programme Summary",soil:"Soil Results",spray_diary:"Spray Records",fert_diary:"Fertiliser Records",livestock:"Livestock & N Compliance",field_register:"Field Register",ea_checklist:"EA Inspection Checklist",n_plan:"Nutrient Management Plan"};
    const fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>' + (esc(af.name)||"Farm") + ' - ' + (titleMap[type]||"Report") + '</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:DM Sans,sans-serif;max-width:800px;margin:0 auto;padding:30px;color:#1a2e1a;-webkit-print-color-adjust:exact;print-color-adjust:exact}@media print{body{padding:15px}table{page-break-inside:auto}tr{page-break-inside:avoid}}</style></head><body>' + body + '</body></html>';
    const w = window.open("","_blank");
    if (w) { w.document.write(fullHtml); w.document.close(); }
    else {
      // Popup blocked — download as HTML file instead
      const blob = new Blob([fullHtml], {type: "text/html"});
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = (af.name || "farm") + "-" + (titleMap[type]||"report").replace(/\s+/g,"-").toLowerCase() + ".html";
      a.click(); URL.revokeObjectURL(a.href);
    }
  };

  const totalHa = fields.reduce((s, f) => s + (f.ha || 0), 0);
  const tabs = [
    {id: "farm", l: "Farm & Fields"},
    {id: "budget", l: "Finances"},
    {id: "map", l: "Map & Analysis"},
    {id: "ops", l: "Operations"},
    {id: "diary", l: "Activities"},
    {id: "agron", l: "Agronomy"},
    {id: "livestock", l: "Livestock"},
    {id: "seed", l: "Seed"},
    {id: "know", l: "Knowledge Hub"},
  ];

  return (
    <div style={{minHeight: "100vh", background: "#f7f8f6", color: "#3a4a3a", fontFamily: "'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", fontWeight: 400, letterSpacing: "-0.01em"}}>
      {/* Header */}
      <div style={{background: "rgba(255,255,255,0.82)", backdropFilter: "blur(20px) saturate(180%)", WebkitBackdropFilter: "blur(20px) saturate(180%)", borderBottom: "1px solid #e2e6de", padding: "0 24px", position: "sticky", top: 0, zIndex: 100}}>
        <div style={{maxWidth: 1400, margin: "0 auto"}}>
          {/* Farm selector + save bar */}
          <div style={{display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", padding: "10px 0 6px"}}>
            <div style={{display: "flex", alignItems: "center", gap: 8}}>
              <div style={{width: 30, height: 30, borderRadius: 8, background: "linear-gradient(145deg, #2c6e3f, #3a8a50)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, boxShadow: "0 2px 8px #2c6e3f30"}}>{"\u{1F33E}"}</div>
              <span style={{fontSize: 16, fontWeight: 700, color: "#1a2e1a", letterSpacing: "-0.03em"}}>Crop Dynamics</span>
            </div>
            {/* Farm tabs */}
            <div style={{display: "flex", gap: 3, marginLeft: 12}}>
              {farms.map(f => (
                <button key={f.id} onClick={() => setActiveFarmId(f.id)} style={{padding: "5px 14px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
                  background: f.id === activeFarmId ? "#2c6e3f0f" : "transparent", color: f.id === activeFarmId ? "#2c6e3f" : "#6b7b6b"}}>{f.name || `Farm ${farms.indexOf(f) + 1}`}</button>
              ))}
              <button onClick={addFarm} style={{padding: "5px 12px", fontSize: 11, background: "transparent", color: "#4a7c59", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, transition: "all 0.2s"}}>+</button>
              {farms.length > 1 && <button onClick={() => { if (confirm("Delete this farm and all its data?")) rmFarm(activeFarmId); }} style={{padding: "5px 8px", fontSize: 11, background: "none", color: "#c0392b55", border: "none", borderRadius: 8, cursor: "pointer", transition: "all 0.2s"}}>{"×"}</button>}
            </div>
            {/* Save/load controls */}
            <div style={{display: "flex", gap: 4, marginLeft: "auto", alignItems: "center"}}>
              {saveMsg && <span style={{fontSize: 11, color: "#2c6e3f", fontWeight: 500}}>{saveMsg}</span>}
              <button onClick={saveData} style={{padding: "5px 12px", fontSize: 11, background: "#2c6e3f", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, transition: "all 0.2s", boxShadow: "0 1px 4px #2c6e3f30"}}>Save</button>
              <button onClick={loadData} style={{padding: "5px 12px", fontSize: 11, background: "#f0f2ee", color: "#6b7b6b", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, transition: "all 0.2s"}}>Load</button>
              <button onClick={exportData} style={{padding: "5px 12px", fontSize: 11, background: "#f0f2ee", color: "#4a7c59", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, transition: "all 0.2s"}}>Export</button>
              <label style={{padding: "5px 12px", fontSize: 11, background: "#f0f2ee", color: "#6b7b6b", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 500, transition: "all 0.2s"}}>Import<input type="file" accept=".json" onChange={importData} style={{display: "none"}} /></label>
              <button onClick={() => generatePDF("summary")} style={{padding: "5px 12px", fontSize: 11, background: "#c17f240a", color: "#c17f24", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, transition: "all 0.2s"}}>PDF Summary</button>
              <select onChange={e => { if(e.target.value) { generatePDF(e.target.value); e.target.value=""; } }} style={{padding: "5px 8px", fontSize: 11, background: "#4a7c590a", color: "#4a7c59", border: "1px solid #4a7c5922", borderRadius: 8, cursor: "pointer", fontWeight: 600}}>
                <option value="">More PDFs ▾</option>
                <option value="cost_comparison">💰 Fertiliser Cost Comparison</option>
                <option value="soil">Soil Analysis + Management Plan</option>
                <option value="spray_diary">Spray Records (Red Tractor)</option>
                <option value="fert_diary">Fertiliser & Manure Records</option>
                <option value="livestock">Livestock & N Compliance</option>
                <option value="field_register">Field Register</option>
                <option value="ea_checklist">EA Inspection Checklist</option>
              </select>
              <label style={{padding: "5px 12px", fontSize: 11, background: "#3a8a6e0a", color: "#3a8a6e", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600, transition: "all 0.2s"}}>CSV Soils<input type="file" accept=".csv" onChange={handleSoilCSV} style={{display: "none"}} /></label>
              <button onClick={()=>setFarmerView(v=>!v)} style={{padding: "5px 12px", fontSize: 11, background: farmerView ? "#2c6e3f" : "#6b5b7b0a", color: farmerView ? "#fff" : "#6b5b7b", border: farmerView ? "none" : "1px solid #6b5b7b22", borderRadius: 8, cursor: "pointer", fontWeight: 600, transition: "all 0.2s", boxShadow: farmerView ? "0 1px 4px #2c6e3f30" : "none"}}>{farmerView ? "🌾 Farmer View" : "👨‍🌾 Farmer View"}</button>
            </div>
          </div>
          {/* Module tabs */}
          {!farmerView && (
          <div style={{display: "flex", alignItems: "center", gap: 2, padding: "0 0 10px"}}>
            <div style={{fontSize: 12, color: "#94a394", fontWeight: 500, marginRight: 10}}>
              {af.name || "Farm"}{totalHa > 0 ? ` · ${fields.length} fields · ${totalHa.toFixed(0)} ha` : ""}
            </div>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{padding: "6px 18px", fontSize: 12, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.25s ease",
                background: tab === t.id ? "#2c6e3f" : "transparent", color: tab === t.id ? "#ffffff" : "#6b7b6b", boxShadow: tab === t.id ? "0 2px 8px #2c6e3f25" : "none"}}>{t.l}</button>
            ))}
          </div>
          )}
        </div>
      </div>
      {/* Content */}
      <div style={{maxWidth: 1400, margin: "0 auto", padding: "20px 24px"}}>
        {farmerView ? (
          <RecommendationsDashboard fields={fields} jobs={jobs} setJobs={setJobs} budgets={budgets} progState={progState} advisorProfile={advisorProfile} farm={af} generatePDF={generatePDF} />
        ) : (<>
        <div style={{display: tab === "farm" ? "block" : "none"}}><FarmFields fields={fields} setFields={setFields} farm={af} setFarmName={setFarmName} setSbi={setSbi} setFarmProp={setFarmProp} budgets={budgets} advisorProfile={advisorProfile} updateAdvisor={updateAdvisor} /></div>
        <div style={{display: tab === "budget" ? "block" : "none"}}><BudgetTracker fields={fields} setFields={setFields} budgets={budgets} progState={progState} onSave={s => onProgSave("finance",s)} /></div>
        <div style={{display: tab === "map" ? "block" : "none"}}><FarmMap fields={fields} setFields={setFields} budgets={budgets} farmName={af.name} /></div>
        <div style={{display: tab === "ops" ? "block" : "none"}}><Operations key={"op-"+loadKey+"-"+activeFarmId} fields={fields} onBudget={(c,f,pd) => onBudget("ops",c,f,pd)} saved={progState.ops} onSave={s => onProgSave("ops",s)} /></div>
        <div style={{display: tab === "diary" ? "block" : "none"}}><FarmDiary key={"di-"+loadKey+"-"+activeFarmId} fields={fields} saved={progState.spray} onSave={s => onProgSave("spray",s)} jobs={jobs} setJobs={setJobs} /></div>
        <div style={{display: tab === "agron" ? "block" : "none"}}><AgronomyTab key={"ag-"+loadKey+"-"+activeFarmId} fields={fields} saved={progState.agron} onSave={s => onProgSave("agron",s)} jobs={jobs} setJobs={setJobs} onBudget={onBudget} onHerbBudget={(c,f,pd) => onBudget("herb",c,f,pd)} progState={progState} onProgSave={onProgSave} /></div>
        <div style={{display: tab === "livestock" ? "block" : "none"}}><LivestockTab key={"ls-"+loadKey+"-"+activeFarmId} fields={fields} saved={progState.livestock} onSave={s => onProgSave("livestock",s)} /></div>
        <div style={{display: tab === "seed" ? "block" : "none"}}><SeedCalc key={"sd-"+loadKey+"-"+activeFarmId} fields={fields} saved={progState.seed} onSave={s => onProgSave("seed",s)} /></div>
        <div style={{display: tab === "know" ? "block" : "none"}}><KnowledgeHub /></div>
        </>)}
      </div>
      <div style={{borderTop: "1px solid #e2e6de", padding: "16px 24px", marginTop: 30, textAlign: "center"}}>
        <div style={{fontSize: 11, color: "#94a394", maxWidth: 900, margin: "0 auto", fontWeight: 400}}>Crop Dynamics — Independent Agronomic Advice. Fungicide optima from AHDB trials. Fertiliser: RB209 9th edition. Costs indicative. © 2026</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script></body></html>
