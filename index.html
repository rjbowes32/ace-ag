    {name: "Trailed sprayer pass", cost: 6, unit: "ha", note: "Per pass cost"},
    {name: "Contractor spray pass", cost: 12, unit: "ha", note: "Contract rate per pass"},
  ]},
  {id: "fert_ops", label: "Fertiliser application", color: "#2c6e3f", defaults: [
    {name: "Spinner spread", cost: 6, unit: "ha", note: "Per pass"},
    {name: "Liquid N application", cost: 8, unit: "ha", note: "Dribble bar / nozzle"},
    {name: "Precision spread (GPS)", cost: 10, unit: "ha", note: "Variable rate"},
    {name: "Lime application", cost: 8, unit: "ha", note: "Per pass"},
  ]},
  {id: "harvest", label: "Harvesting", color: "#a63d2b", defaults: [
    {name: "Combine harvesting", cost: 90, unit: "ha", note: "Own combine / contract"},
    {name: "Carting grain", cost: 15, unit: "ha", note: "Field to store"},
    {name: "Grain drying", cost: 0, unit: "t", note: "£/t — varies with moisture"},
    {name: "Grain storage", cost: 0, unit: "t", note: "£/t per month or season"},
  ]},
  {id: "bale", label: "Baling / Straw", color: "#b8922a", defaults: [
    {name: "Baling (round)", cost: 8, unit: "bale", note: "Per bale"},
    {name: "Baling (Hesston)", cost: 12, unit: "bale", note: "Per bale large square"},
    {name: "Straw carting", cost: 5, unit: "bale", note: "Field to stack"},
    {name: "Straw chopping", cost: 12, unit: "ha", note: "If incorporating"},
    {name: "Straw income", cost: 0, unit: "ha", note: "Enter as negative cost if selling"},
  ]},
  {id: "other", label: "Other costs", color: "#7a8a7a", defaults: [
    {name: "Land rent / tenancy", cost: 0, unit: "ha", note: "Annual cost"},
    {name: "Insurance (crop)", cost: 0, unit: "ha", note: "Annual"},
    {name: "Environmental scheme income", cost: 0, unit: "ha", note: "Enter as negative"},
  ]},
];

const Operations = ({fields, onBudget, saved, onSave}) => {
  const [progs, setProgs] = useState(saved?.progs || [{id: 1, name: "Programme 1", ops: [], fieldIds: []}]);
  const [activeProg, setActiveProg] = useState(saved?.activeProg || 1);
  useEffect(() => { if(onSave) onSave({progs, activeProg}); }, [progs, activeProg]);

  const addProg = () => {
    const id = Date.now();
    setProgs(p => [...p, {id, name: `Programme ${p.length + 1}`, ops: [], fieldIds: []}]);
    setActiveProg(id);
  };
  const rmProg = id => {
    if (progs.length <= 1) return;
    setProgs(p => p.filter(x => x.id !== id));
    if (activeProg === id) setActiveProg(progs.find(x => x.id !== id)?.id);
  };
  const uProg = (id, f, v) => setProgs(p => p.map(x => x.id === id ? {...x, [f]: v} : x));
  const dupProg = (id) => {
    const src = progs.find(p => p.id === id); if (!src) return;
    const nid = Date.now();
    setProgs(p => [...p, {id: nid, name: src.name + " (copy)", ops: src.ops.map(o => ({...o, id: Date.now() + Math.random()})), fieldIds: []}]);
    setActiveProg(nid);
  };

  const ap = progs.find(p => p.id === activeProg) || progs[0];

  const addOp = (catId, def) => {
    setProgs(p => p.map(x => x.id === ap.id ? {...x, ops: [...x.ops, {id: Date.now(), cat: catId, name: def.name, cost: def.cost, unit: def.unit, qty: 1, note: def.note}]} : x));
  };
  const addCustomOp = (catId) => {
    setProgs(p => p.map(x => x.id === ap.id ? {...x, ops: [...x.ops, {id: Date.now(), cat: catId, name: "", cost: 0, unit: "ha", qty: 1, note: ""}]} : x));
  };
  const rmOp = opId => setProgs(p => p.map(x => x.id === ap.id ? {...x, ops: x.ops.filter(o => o.id !== opId)} : x));
  const uOp = (opId, f, v) => setProgs(p => p.map(x => x.id === ap.id ? {...x, ops: x.ops.map(o => o.id === opId ? {...o, [f]: v} : o)} : x));

  const costPerHa = (op) => {
    if (op.unit === "ha") return op.cost * op.qty;
    return op.cost * op.qty;
  };

  // Build budgets: for each field, find its assigned programme and sum cost
  // A field can only be in one ops programme
  const getFieldProgCost = (fId) => {
    for (const pr of progs) {
      if (pr.fieldIds.includes(fId)) return pr.ops.reduce((s, op) => s + costPerHa(op), 0);
    }
    return 0;
  };
  // For onBudget — report weighted average (or per-field map)
  useEffect(() => {
    // We report field-level: collect all fields that have any ops programme
    const allFieldIds = [];
    let totalCostHa = 0;
    let totalHa = 0;
    progs.forEach(pr => {
      const pCost = pr.ops.reduce((s, op) => s + costPerHa(op), 0);
      pr.fieldIds.forEach(fId => {
        if (!allFieldIds.includes(fId)) {
          allFieldIds.push(fId);
          const fHa = fields.find(f => f.id === fId)?.ha || 0;
          totalCostHa += pCost * fHa;
          totalHa += fHa;
        }
      });
    });
    const avgCost = totalHa > 0 ? totalCostHa / totalHa : 0;
    const pd = {programmes: progs.map(pr => ({name: pr.name, costHa: pr.ops.reduce((s, op) => s + costPerHa(op), 0), fieldCount: pr.fieldIds.length, totalHa: pr.fieldIds.reduce((s, id) => s + (fields.find(f => f.id === id)?.ha || 0), 0), ops: pr.ops.map(op => ({name: op.name, cat: op.cat, cost: op.cost, unit: op.unit, qty: op.qty, costHa: costPerHa(op)}))}))};
    onBudget(avgCost, allFieldIds, pd);
  }, [progs, fields]);

  const apTotalHa = ap.ops.reduce((s, op) => s + costPerHa(op), 0);
  const apFieldHa = ap.fieldIds.reduce((s, id) => s + (fields.find(f => f.id === id)?.ha || 0), 0);

  return (
    <div>
      {/* Programme tabs */}
      <div style={{display: "flex", gap: 4, marginBottom: 8, flexWrap: "wrap", alignItems: "center"}}>
        {progs.map(pr => {
          const pTotal = pr.ops.reduce((s, op) => s + costPerHa(op), 0);
          const sel = pr.id === activeProg;
          return (
            <button key={pr.id} onClick={() => setActiveProg(pr.id)} style={{padding: "4px 12px", fontSize: 12, fontWeight: 700, borderRadius: 8, border: "1px solid", cursor: "pointer",
              background: sel ? "#b8922a15" : "transparent", color: sel ? "#b8922a" : "#6b7b6b", borderColor: sel ? "#b8922a44" : "#d4dace"}}>
              {pr.name}{pTotal > 0 ? ` £${pTotal.toFixed(0)}/ha` : ""}<span style={{fontSize: 11, color: "#6b7b6b", marginLeft: 4}}>{pr.fieldIds.length}f</span>
            </button>
          );
        })}
        <button onClick={addProg} style={{padding: "4px 10px", fontSize: 12, fontWeight: 700, background: "#2c6e3f10", color: "#2c6e3f", border: "1px solid #2c6e3f33", borderRadius: 8, cursor: "pointer"}}>+ Programme</button>
      </div>

      {/* Active programme header */}
      <div style={{background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, padding: 10, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", marginBottom: 8}}>
        <div style={{display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap"}}>
          <div style={{flex: "1 1 180px"}}>
            <div style={{fontSize: 12, color: "#6b7b6b", marginBottom: 1}}>Programme name</div>
            <input value={ap.name} onChange={e => uProg(ap.id, "name", e.target.value)} style={{...TI, fontWeight: 700}} />
          </div>
          <button onClick={() => dupProg(ap.id)} style={{padding: "3px 10px", fontSize: 11, background: "#e2e6de", color: "#4a7c59", border: "1px solid #4a7c5933", borderRadius: 6, cursor: "pointer"}}>Duplicate</button>
          {progs.length > 1 && <button onClick={() => rmProg(ap.id)} style={{padding: "3px 10px", fontSize: 11, background: "#e2e6de", color: "#a63d2b", border: "1px solid #c0392b33", borderRadius: 6, cursor: "pointer"}}>Delete</button>}
          {apTotalHa > 0 && <div style={{padding: "4px 10px", background: "#b8922a10", borderRadius: 8}}><span style={{fontSize: 12, fontWeight: 800, color: "#b8922a"}}>{"£"}{apTotalHa.toFixed(0)}/ha</span></div>}
        </div>
      </div>

      {/* Field assignment for this programme */}
      {fields.length > 0 && (
        <div style={{marginBottom: 8}}>
          <div style={{fontSize: 11, fontWeight: 700, color: "#6b7b6b", marginBottom: 3}}>Assign fields to {ap.name}</div>
          <div style={{display: "flex", gap: 3, flexWrap: "wrap"}}>
            {fields.map(f => {
              const inThis = ap.fieldIds.includes(f.id);
              const inOther = !inThis && progs.some(pr => pr.id !== ap.id && pr.fieldIds.includes(f.id));
              const otherProg = inOther ? progs.find(pr => pr.id !== ap.id && pr.fieldIds.includes(f.id)) : null;
              return (
                <button key={f.id} onClick={() => {
                  if (inThis) { uProg(ap.id, "fieldIds", ap.fieldIds.filter(x => x !== f.id)); }
                  else {
                    // Remove from any other programme first
                    setProgs(p => p.map(pr => pr.id === ap.id ? {...pr, fieldIds: [...pr.fieldIds, f.id]} : {...pr, fieldIds: pr.fieldIds.filter(x => x !== f.id)}));
                  }
                }} style={{padding: "3px 8px", fontSize: 11, borderRadius: 6, border: `1px solid ${inThis ? f.color + "66" : "#d4dace"}`, background: inThis ? f.color + "15" : "transparent", color: inThis ? "#1a2e1a" : inOther ? "#6b7b6b" : "#7f8c9b", cursor: "pointer"}}>
                  <span style={{display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: f.color, marginRight: 3}} />
                  {f.name} {f.ha}ha
                  {inOther && <span style={{fontSize: 12, color: "#c17f24", marginLeft: 3}}>({otherProg?.name})</span>}
                </button>
              );
            })}
          </div>
          {apFieldHa > 0 && apTotalHa > 0 && (
            <div style={{fontSize: 12, color: "#b8922a", fontWeight: 700, marginTop: 3}}>{"£"}{apTotalHa.toFixed(0)}/ha × {apFieldHa.toFixed(1)} ha = {"£"}{(apTotalHa * apFieldHa).toFixed(0)} total</div>
          )}
        </div>
      )}

      {/* Operations by category */}
      {OPS_CATS.map(cat => {
        const catOps = ap.ops.filter(op => op.cat === cat.id);
        const catTotal = catOps.reduce((s, op) => s + costPerHa(op), 0);
        return (
          <div key={cat.id} style={{marginBottom: 8}}>
            <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3}}>
              <div style={{display: "flex", alignItems: "center", gap: 4}}>
                <div style={{fontSize: 12, fontWeight: 700, color: cat.color, textTransform: "uppercase", paddingLeft: 4, borderLeft: `3px solid ${cat.color}`}}>{cat.label}</div>
                {catTotal > 0 && <span style={{fontSize: 12, fontWeight: 700, color: "#b8922a"}}>{"£"}{catTotal.toFixed(0)}/ha</span>}
              </div>
            </div>
            {catOps.map(op => (
              <div key={op.id} style={{display: "flex", gap: 4, alignItems: "center", marginBottom: 2, padding: "4px 6px", background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 8, borderLeft: `2px solid ${cat.color}`}}>
                <input value={op.name} onChange={e => uOp(op.id, "name", e.target.value)} style={{flex: "1 1 140px", padding: "3px 6px", fontSize: 12, background: "#f0f2ee", border: "1px solid #d4dace", borderRadius: 6, color: "#1a2e1a", outline: "none"}} />
                <span style={{fontSize: 11, color: "#6b7b6b"}}>{"£"}</span>
                <NumInput value={op.cost} onChange={v => uOp(op.id, "cost", v)} w={50} />

const parseKMLMulti = (text) => {
  // Extract all placemarks with their names and coordinate rings
  const placemarks = [];
  // Split by Placemark
  const pmRe = /<Placemark>([\s\S]*?)<\/Placemark>/g;
  let pm;
  while ((pm = pmRe.exec(text)) !== null) {
    const block = pm[1];
    // Get name
    const nameRe = new RegExp("<" + "name" + ">([\\s\\S]*?)</" + "name" + ">");
    const nameM = block.match(nameRe);
    let name = nameM ? nameM[1].trim().replace(/<!\[CDATA\[|\]\]>/g, "") : `Polygon ${placemarks.length + 1}`;
    // Get all coordinate sets (could be multiple rings in MultiGeometry)
    const coordRe = /<coordinates>([\s\S]*?)<\/coordinates>/g;
    let cm;
    const rings = [];
    while ((cm = coordRe.exec(block)) !== null) {
      const pts = [];
      cm[1].trim().split(/\s+/).forEach(pt => {
        const parts = pt.split(",").map(Number);
        if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          pts.push([parts[1], parts[0]]); // [lat, lng]
        }
      });
      if (pts.length >= 3) rings.push(pts);
    }
    if (rings.length > 0) {
      // Use largest ring as the main boundary
      const main = rings.reduce((a, b) => a.length > b.length ? a : b);
      const lats = main.map(c => c[0]), lngs = main.map(c => c[1]);
      placemarks.push({
        name,
        coords: main,
        center: [(Math.min(...lats) + Math.max(...lats)) / 2, (Math.min(...lngs) + Math.max(...lngs)) / 2],
        bounds: {minLat: Math.min(...lats), maxLat: Math.max(...lats), minLng: Math.min(...lngs), maxLng: Math.max(...lngs)},
      });
    }
  }
  // If no Placemarks found, try raw coordinate blocks
  if (placemarks.length === 0) {
    const coordRe = /<coordinates>([\s\S]*?)<\/coordinates>/g;
    let cm; let idx = 0;
    while ((cm = coordRe.exec(text)) !== null) {
      const pts = [];
      cm[1].trim().split(/\s+/).forEach(pt => {
        const parts = pt.split(",").map(Number);
        if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) pts.push([parts[1], parts[0]]);
      });
      if (pts.length >= 3) {
        const lats = pts.map(c => c[0]), lngs = pts.map(c => c[1]);
        placemarks.push({
          name: `Polygon ${++idx}`,
          coords: pts,
          center: [(Math.min(...lats) + Math.max(...lats)) / 2, (Math.min(...lngs) + Math.max(...lngs)) / 2],
          bounds: {minLat: Math.min(...lats), maxLat: Math.max(...lats), minLng: Math.min(...lngs), maxLng: Math.max(...lngs)},
        });
      }
    }
  }
  return placemarks;
};

const SOIL_INDEX_GUIDE = {
  P: [{max:9,idx:"0",label:"0 (Very Low)",color:"#a63d2b"},{max:15,idx:"1",label:"1 (Low)",color:"#c17f24"},{max:25,idx:"2",label:"2 (Moderate)",color:"#b8922a"},{max:45,idx:"3",label:"3 (High)",color:"#2c6e3f"},{max:9999,idx:"4",label:"4+ (V.High)",color:"#3a8a50"}],
  K: [{max:60,idx:"0",label:"0 (Very Low)",color:"#a63d2b"},{max:120,idx:"1",label:"1 (Low)",color:"#c17f24"},{max:180,idx:"2-",label:"2- (Mod Low)",color:"#b8922a"},{max:240,idx:"2+",label:"2+ (Mod High)",color:"#b8922a"},{max:400,idx:"3",label:"3 (High)",color:"#2c6e3f"},{max:9999,idx:"4",label:"4+ (V.High)",color:"#3a8a50"}],
  Mg: [{max:25,idx:"0",label:"0 (Very Low)",color:"#a63d2b"},{max:50,idx:"1",label:"1 (Low)",color:"#c17f24"},{max:100,idx:"2",label:"2 (Moderate)",color:"#b8922a"},{max:175,idx:"3",label:"3 (High)",color:"#2c6e3f"},{max:9999,idx:"4",label:"4+ (V.High)",color:"#3a8a50"}],
};
const getSoilIdx = (nutrient, mg) => {
  if (!mg || mg <= 0) return null;
  const scale = SOIL_INDEX_GUIDE[nutrient];
  if (!scale) return null;
  return scale.find(s => mg <= s.max) || scale[scale.length - 1];
};

const phLabel = (ph) => { if (!ph) return ""; if (ph < 5.5) return "Very Acid"; if (ph < 6.0) return "Acid"; if (ph < 6.5) return "Slightly Acid"; if (ph <= 7.0) return "Neutral"; if (ph <= 7.5) return "Slightly Alkaline"; return "Alkaline"; };

      });

          });
          if (fi >= 0) {
            matched++;
            const f = updated[fi];
            if (type==="soil") updated[fi] = {...f,soil:{...(f.soil||{}),pMg:r.pMg||f.soil?.pMg,kMg:r.kMg||f.soil?.kMg,mgMg:r.mgMg||f.soil?.mgMg,pH:r.pH||f.soil?.pH,om:r.om||f.soil?.om,sampleDate:r.sampleDate||f.soil?.sampleDate}};
            else if (type==="tissue") updated[fi] = {...f,tissue:{...(f.tissue||{}),nPc:r.nPc||"",pPc:r.pPc||"",kPc:r.kPc||"",sPc:r.sPc||"",mgPc:r.mgPc||"",mnPpm:r.mnPpm||"",znPpm:r.znPpm||"",cuPpm:r.cuPpm||"",sampleDate:r.sampleDate||""}};

  };
  // Drawing state
  const [drawMode, setDrawMode] = useState(false); // "split" | "zone" | false
  const [drawPoints, setDrawPoints] = useState([]); // [{x,y}] in SVG coords
  const [drawTarget, setDrawTarget] = useState(null); // polygon index being drawn on
  const [zones, setZones] = useState([]); // [{id, parentField, name, type, coords: [[lat,lng]], ha, color}]
  const [editZone, setEditZone] = useState(null);
  const svgRef = React.useRef(null);

  const uSoil = (id, f, v) => setFields(p => p.map(x => x.id === id ? {...x, soil: {...(x.soil || {}), [f]: v}} : x));

  const fieldCosts = (fId) => {
    const cp = budgets.cp?.fieldIds?.includes(fId) ? (budgets.cp.costHa||0) : 0;
    const hb = budgets.herb?.fieldIds?.includes(fId) ? (budgets.herb.costHa||0) : 0;
    const fe = budgets.fert?.fieldIds?.includes(fId) ? (budgets.fert.costHa||0) : 0;
    const op = budgets.ops?.fieldIds?.includes(fId) ? (budgets.ops.costHa||0) : 0;
    return {cp, herb: hb, fert: fe, ops: op, total: cp + hb + fe + op};
  };

  const handleKmlUpload = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const polys = parseKMLMulti(ev.target.result);
      if (polys.length === 0) { alert("No polygons found in KML file."); return; }
      setKmlPolygons(polys);
      setKmlFileName(file.name);
      const autoAssign = {};
      polys.forEach((poly, idx) => {
        const match = fields.find(f => f.name.toLowerCase().trim() === poly.name.toLowerCase().trim());
        if (match) autoAssign[idx] = match.id;
      });
      setAssignments(autoAssign);
    };
    reader.readAsText(file);
  };

  const assignPoly = (polyIdx, fieldId) => {
    setAssignments(prev => {
      const n = {...prev};
      if (fieldId === "") { delete n[polyIdx]; } else { n[polyIdx] = +fieldId; }
      return n;
    });
  };

  const applyAssignments = () => {
    setFields(prev => {
      const updated = prev.map(f => ({...f, bounds: null, kml: null}));
      Object.entries(assignments).forEach(([pidx, fid]) => {
        const poly = kmlPolygons[+pidx];
        if (!poly) return;
        const fi = updated.findIndex(f => f.id === fid);
        if (fi >= 0) updated[fi] = {...updated[fi], bounds: poly, kml: kmlFileName};
      });
      return updated;
    });
  };
  useEffect(() => { if (kmlPolygons.length > 0) applyAssignments(); }, [assignments, kmlPolygons]);

  // SVG coordinate system
  const allPolys = kmlPolygons.length > 0 ? kmlPolygons : [];
  const assignedPolys = fields.filter(f => f.bounds && f.bounds.coords).map(f => ({...f.bounds, fieldId: f.id, color: f.color, name: f.name}));
  const displayPolys = allPolys.length > 0 ? allPolys : assignedPolys.length > 0 ? assignedPolys : [];

  // Compute SVG transform once, shared by map + drawing
  let mapCtx = null;
  if (displayPolys.length > 0 || mapCenter) {
    let minLat = 999, maxLat = -999, minLng = 999, maxLng = -999;
    if (mapCenter && displayPolys.length === 0) {
      minLat = mapCenter.lat - 0.02;
      maxLat = mapCenter.lat + 0.02;
      minLng = mapCenter.lng - 0.02;
      maxLng = mapCenter.lng + 0.02;
    } else {
      displayPolys.forEach(p => {
        (p.coords || []).forEach(([lat, lng]) => {
          if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
          if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
        });
      });
    }
    const pad = Math.max((maxLat - minLat), (maxLng - minLng)) * 0.08 || 0.001;
    minLat -= pad; maxLat += pad; minLng -= pad; maxLng += pad;
    const cosLat = Math.cos(((minLat + maxLat) / 2) * Math.PI / 180);
    const latRange = maxLat - minLat || 0.001;
    const lngRange = maxLng - minLng || 0.001;
    const adjLngRange = lngRange * cosLat;
    const W = 800, H2 = 500;
    const scaleX = W / adjLngRange, scaleY = H2 / latRange;
    const scale = Math.min(scaleX, scaleY) * mapZoom;
    const finalW = adjLngRange * scale, finalH = latRange * scale;
    const toSvg = ([lat, lng]) => [(lng - minLng) * cosLat * scale, (maxLat - lat) * scale];
    const fromSvg = (sx, sy) => [maxLat - sy / scale, minLng + sx / (cosLat * scale)];
    mapCtx = {minLat, maxLat, minLng, maxLng, cosLat, scale, finalW, finalH, toSvg, fromSvg, center: [(minLat+maxLat)/2, (minLng+maxLng)/2]};
  }

  // ── SNAP-TO-BOUNDARY engine ──
  const snapToEdge = (sx, sy, polyIdx) => {
    // Find the nearest point on the boundary edges of polyIdx
    const poly = displayPolys[polyIdx];
    if (!poly || !poly.coords || !mapCtx) return {x: sx, y: sy};
    const coords = poly.coords;
    let bestDist = Infinity, bestX = sx, bestY = sy;
    const SNAP_DIST = 12; // pixels

    for (let i = 0; i < coords.length; i++) {
      const a = mapCtx.toSvg(coords[i]);
      const b = mapCtx.toSvg(coords[(i + 1) % coords.length]);
      // Project point onto line segment
      const dx = b[0] - a[0], dy = b[1] - a[1];
      const len2 = dx * dx + dy * dy;
      if (len2 === 0) continue;
      let t = ((sx - a[0]) * dx + (sy - a[1]) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const px = a[0] + t * dx, py = a[1] + t * dy;
      const d = Math.sqrt((sx - px) ** 2 + (sy - py) ** 2);
      if (d < bestDist) { bestDist = d; bestX = px; bestY = py; }
    }
    if (bestDist < SNAP_DIST) return {x: bestX, y: bestY, snapped: true};
    return {x: sx, y: sy, snapped: false};
  };

  // ── POINT-IN-POLYGON test (SVG coords) ──
  const pointInPoly = (sx, sy, polyIdx) => {
    const poly = displayPolys[polyIdx];
    if (!poly || !poly.coords || !mapCtx) return false;
    const pts = poly.coords.map(c => mapCtx.toSvg(c));
    let inside = false;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
      const xi = pts[i][0], yi = pts[i][1], xj = pts[j][0], yj = pts[j][1];
      if (((yi > sy) !== (yj > sy)) && (sx < (xj - xi) * (sy - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  };

  // ── CLIP drawn polygon to parent boundary ──
  // Simple: ensure all drawn points are inside the parent. Points on boundary stay.
  const clipToParent = (svgPoints, polyIdx) => {
    // For each point, if outside, snap to nearest boundary edge
    return svgPoints.map(pt => {
      if (pointInPoly(pt.x, pt.y, polyIdx)) return pt;
      return snapToEdge(pt.x, pt.y, polyIdx);
    });
  };

  // ── AREA calculation (Shoelace formula in lat/lng) ──
  const calcAreaHa = (latLngCoords) => {
    if (latLngCoords.length < 3) return 0;
    const toRad = d => d * Math.PI / 180;
    let area = 0;
    const n = latLngCoords.length;
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      const lat1 = toRad(latLngCoords[i][0]), lng1 = toRad(latLngCoords[i][1]);
      const lat2 = toRad(latLngCoords[j][0]), lng2 = toRad(latLngCoords[j][1]);
      area += (lng2 - lng1) * (2 + Math.sin(lat1) + Math.sin(lat2));
    }
    area = Math.abs(area) * 6378137 * 6378137 / 2;
    return area / 10000; // m² to ha
  };

  // ── DRAWING handlers ──
  const handleSvgClick = (e) => {
    if (!drawMode || !mapCtx) return;
    const svg = svgRef.current;
    if (!svg) return;
    // Use SVG's built-in coordinate transform for accurate click mapping
    let pt;
    if (svg.createSVGPoint) {
      pt = svg.createSVGPoint();
      pt.x = e.clientX;
      pt.y = e.clientY;
      const ctm = svg.getScreenCTM();
      if (ctm) {
        const svgPt = pt.matrixTransform(ctm.inverse());
        var sx = svgPt.x;
        var sy = svgPt.y;
      } else { return; }
    } else {
      const rect = svg.getBoundingClientRect();
      const vb = svg.viewBox.baseVal;
      var sx = (e.clientX - rect.left) / rect.width * vb.width;
      var sy = (e.clientY - rect.top) / rect.height * vb.height;
    }

    // Find which polygon we're in
    let targetPoly = drawTarget;
    if (targetPoly === null) {
      for (let i = 0; i < displayPolys.length; i++) {
        if (pointInPoly(sx, sy, i)) { targetPoly = i; setDrawTarget(i); break; }
      }
      if (targetPoly === null) return; // click outside all polygons
    }

    // Snap to boundary if close
    const snapped = snapToEdge(sx, sy, targetPoly);
    // If inside polygon or snapped to edge, accept point
    if (pointInPoly(sx, sy, targetPoly) || snapped.snapped) {
      setDrawPoints(prev => [...prev, snapped.snapped ? snapped : {x: sx, y: sy}]);
    }
  };

  const finishDraw = () => {
    if (drawPoints.length < 3 || drawTarget === null || !mapCtx) { cancelDraw(); return; }
    // Clip all points to parent boundary
    const clipped = clipToParent(drawPoints, drawTarget);
    // Convert SVG coords back to lat/lng
    const latLng = clipped.map(p => mapCtx.fromSvg(p.x, p.y));
    const ha = calcAreaHa(latLng);
    // Determine parent field
    const assignedFieldId = assignments[drawTarget];
    const parentField = assignedFieldId ? fields.find(f => f.id === assignedFieldId) : null;
    const ZONE_COLORS = ["#8b5cf6","#06b6d4","#f59e0b","#ef4444","#10b981","#ec4899","#6366f1","#14b8a6"];
    const newZone = {
      id: Date.now(),
      parentField: parentField?.id || null,
      parentPolyIdx: drawTarget,
      name: drawMode === "split" ? `${parentField?.name || "Area"} split ${zones.filter(z=>z.parentPolyIdx===drawTarget).length+1}` : `Zone ${zones.length+1}`,
      type: drawMode, // "split" or "zone"
      coords: latLng,
      svgCoords: clipped,
      ha: +ha.toFixed(2),
      color: ZONE_COLORS[zones.length % ZONE_COLORS.length],
    };
    setZones(prev => [...prev, newZone]);
    setDrawPoints([]);
    setDrawTarget(null);
  };

  const cancelDraw = () => { setDrawPoints([]); setDrawTarget(null); };

  const removeZone = (id) => setZones(prev => prev.filter(z => z.id !== id));
  const updateZone = (id, field, val) => setZones(prev => prev.map(z => z.id === id ? {...z, [field]: val} : z));

  // Weather center — prefer postcode, then KML center, then default NE England
  const weatherCenter = weatherLL ? [weatherLL.lat, weatherLL.lng] : mapCtx ? mapCtx.center : [54.5, -1.5];

  const lookupPostcode = () => {
    const pc = weatherPostcode.trim().replace(/\s/g, "");
    if (pc.length < 5) return;
    fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(pc)}`)
      .then(r => r.json())
      .then(d => {
        if (d.status === 200 && d.result) {
          setWeatherLL({lat: d.result.latitude, lng: d.result.longitude});
        } else { alert("Postcode not found. Try again."); }
      })
      .catch(() => alert("Could not look up postcode. Check connection."));
  };
  const lookupMapLocation = () => {
    const search = mapSearch.trim();
    if (search.length < 2) return;
    // Try postcode API first
    const pc = search.replace(/\s/g, "");
    const isPostcode = /^[a-z]{1,2}\d[a-z\d]?\s{0,1}\d[a-z]{2}$/i.test(pc);
    const url = isPostcode ? `https://api.postcodes.io/postcodes/${encodeURIComponent(pc)}` : `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(search)}&format=json&limit=1`;
    fetch(url)
      .then(r => r.json())
      .then(d => {
        let lat, lng;
        if (isPostcode && d.status === 200 && d.result) {
          lat = d.result.latitude; lng = d.result.longitude;
        } else if (!isPostcode && d.length > 0) {
          lat = parseFloat(d[0].lat); lng = parseFloat(d[0].lon);
        } else {
          alert("Location not found. Try a postcode or place name."); return;
        }
        setMapCenter({lat, lng});
        setMapSearch("");
      })
      .catch(() => alert("Could not look up location. Check connection."));
  };

  // ── SVG MAP RENDERING ──
  let svgContent = null;
  if (displayPolys.length > 0 && mapCtx) {
    const {finalW, finalH, toSvg} = mapCtx;
    svgContent = (
      <svg ref={svgRef} viewBox={`0 0 ${finalW.toFixed(1)} ${finalH.toFixed(1)}`}
        style={{width: "100%", height: "100%", background: (showWeather || showSatellite || showContours) ? "transparent" : "#f0f4ed", cursor: drawMode ? "crosshair" : "default", userSelect: "none"}}
        onClick={handleSvgClick}>
        {/* Field polygons */}
        {displayPolys.map((p, idx) => {
          const cs = p.coords || [];
          if (cs.length < 3) return null;
          const pts = cs.map(c => toSvg(c).join(",")).join(" ");
          let color = "#6b7b6b", label = p.name || `Polygon ${idx + 1}`;
          const assignedFieldId = assignments[idx];
          if (assignedFieldId) {
            const af = fields.find(f => f.id === assignedFieldId);
            if (af) { color = af.color; label = af.name; }
          } else if (p.fieldId) {
            const af = fields.find(f => f.id === p.fieldId);
            if (af) { color = af.color; label = af.name; }
          }
          // Crop overlay colouring
          const CROP_COLORS = {w_wheat:"#d4a017",w_barley:"#c17f24",s_barley:"#e6b347",w_osr:"#f0d000",s_oats:"#9ab86e",w_oats:"#7a9e4f",w_beans:"#6b8e6b",s_beans:"#5a8a5a",peas:"#80c080",w_rye:"#a08040",maize:"#e0c040",grass:"#3a8a50",fallow:"#b8c4b0",other:"#94a394"};
          const linkedField = fields.find(f => f.id === (assignedFieldId || p.fieldId));
          if (showCropOverlay && linkedField) { color = CROP_COLORS[linkedField.crop] || "#94a394"; label = `${linkedField.name}\n${CROPS.find(c=>c.id===linkedField.crop)?.label||""}`; }
          // NVZ Risk map colouring
          if (showRiskMap && linkedField) {
            const s = linkedField.soil || {};
            const risk = s.soilRisk || ""; const slope = s.drainage || "";
            const nearWater = (linkedField.fieldNote||"").toLowerCase().match(/water|stream|ditch|drain|river|flood/);
            const riskScore = (risk === "High" ? 3 : risk === "Medium" ? 2 : risk === "Low" ? 1 : 0) + (slope === "Impeded" ? 2 : slope === "Good" ? 0 : 1) + (nearWater ? 2 : 0) + (+s.om < 3 ? 1 : 0);
            color = riskScore >= 5 ? "#c0392b" : riskScore >= 3 ? "#e67e22" : riskScore >= 1 ? "#f1c40f" : "#2c6e3f";
            label = `${linkedField.name}\nRisk: ${riskScore >= 5 ? "HIGH" : riskScore >= 3 ? "MEDIUM" : riskScore >= 1 ? "LOW" : "MIN"}`;
          }
          const isHover = hoverPoly === idx;
          const isDrawTarget = drawTarget === idx;
          const center = toSvg(p.center || [cs.reduce((s,c)=>s+c[0],0)/cs.length, cs.reduce((s,c)=>s+c[1],0)/cs.length]);
          return (
            <g key={idx} onMouseEnter={() => setHoverPoly(idx)} onMouseLeave={() => setHoverPoly(null)} style={{cursor: drawMode ? "crosshair" : "pointer"}}>
              <polygon points={pts} fill={color} fillOpacity={(showSatellite||showContours) ? (isDrawTarget ? 0.05 : isHover ? 0.2 : 0.1) : (isDrawTarget ? 0.08 : isHover ? 0.3 : 0.18)} stroke={(showSatellite||showContours) ? "#fff" : color} strokeWidth={isDrawTarget ? 2.5 : isHover ? 2 : (showSatellite||showContours) ? 2 : 1.2} strokeOpacity={(showSatellite||showContours) ? 1 : 0.8} strokeDasharray={isDrawTarget ? "6,3" : "none"} />
              {!drawMode && <text x={center[0]} y={center[1]} textAnchor="middle" dominantBaseline="central" fill={(showSatellite||showContours) ? "#fff" : color} fontSize={Math.min(14, finalW / displayPolys.length / 5)} fontWeight="700" style={{pointerEvents: "none", textShadow: (showSatellite||showContours) ? "0 1px 3px rgba(0,0,0,0.8)" : "none"}} stroke={(showSatellite||showContours)?"rgba(0,0,0,0.5)":"none"} strokeWidth={(showSatellite||showContours)?0.3:0}>{label}</text>}
            </g>
          );
        })}
        {/* Drawn zones */}
        {zones.map(z => {
          if (!z.svgCoords || z.svgCoords.length < 3) return null;
          const pts = z.svgCoords.map(p => `${p.x},${p.y}`).join(" ");
          const cx = z.svgCoords.reduce((s,p)=>s+p.x,0)/z.svgCoords.length;
          const cy = z.svgCoords.reduce((s,p)=>s+p.y,0)/z.svgCoords.length;
          return (
            <g key={z.id}>
              <polygon points={pts} fill={z.color} fillOpacity={0.25} stroke={z.color} strokeWidth={2} strokeDasharray={z.type==="zone"?"4,2":"none"} />
              <text x={cx} y={cy} textAnchor="middle" dominantBaseline="central" fill={z.color} fontSize={10} fontWeight="700" style={{pointerEvents:"none"}}>{z.name}</text>
              <text x={cx} y={cy+12} textAnchor="middle" fill={z.color} fontSize={8} fontWeight="500" style={{pointerEvents:"none"}}>{z.ha}ha</text>
            </g>
          );
        })}
        {/* Drawing in progress */}
        {drawPoints.length > 0 && (
          <g>
            <polyline points={drawPoints.map(p=>`${p.x},${p.y}`).join(" ")} fill="none" stroke="#8b5cf6" strokeWidth={2} strokeDasharray="4,2" />
            {drawPoints.map((p,i) => (
              <circle key={i} cx={p.x} cy={p.y} r={p.snapped ? 5 : 3.5} fill={p.snapped ? "#06b6d4" : "#8b5cf6"} stroke="#fff" strokeWidth={1.5} />
            ))}
            {drawPoints.length >= 3 && (
              <line x1={drawPoints[drawPoints.length-1].x} y1={drawPoints[drawPoints.length-1].y} x2={drawPoints[0].x} y2={drawPoints[0].y} stroke="#8b5cf6" strokeWidth={1} strokeDasharray="3,3" opacity={0.5} />
            )}
          </g>
        )}
      </svg>
    );
  }

  const ZONE_TYPES = [{id:"split",label:"Field Split",desc:"Split a field that has multiple crops"},{id:"zone",label:"Environmental Zone",desc:"Buffer strip, flower margin, nectar area, AB8 etc."}];

  return (
    <div>
      {/* KML upload */}
      <div style={{background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, padding: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", marginBottom: 10}}>
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6, marginBottom: 6}}>
          <div style={{fontSize: 12, fontWeight: 700, color: "#6b7b6b", textTransform: "uppercase"}}>Farm Boundaries {farmName && `— ${farmName}`}</div>
          <div style={{display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap"}}>
            <label style={{fontSize: 11, color: "#4a7c59", cursor: "pointer", padding: "5px 14px", background: "#4a7c590a", border: "none", borderRadius: 8, fontWeight: 600}}>
              {kmlPolygons.length > 0 ? "Replace KML" : "Upload Farm KML"}
              <input type="file" accept=".kml" onChange={handleKmlUpload} style={{display: "none"}} />
            </label>
            {kmlFileName && <span style={{fontSize: 11, color: "#2c6e3f"}}>{kmlFileName} — {kmlPolygons.length} boundaries</span>}
            {kmlPolygons.length > 0 && <button onClick={() => { setKmlPolygons([]); setKmlFileName(""); setAssignments({}); setFields(p => p.map(f => ({...f, bounds: null, kml: null}))); setZones([]); }} style={{fontSize: 11, color: "#c0392b77", background: "none", border: "none", padding: "4px 8px", cursor: "pointer"}}>Clear</button>}
          </div>
        </div>
        {kmlPolygons.length === 0 && <div style={{fontSize: 12, color: "#94a394"}}>Upload a whole-farm KML file exported from RPA mapping, Gatekeeper, Muddy Boots, John Deere Ops Center, or similar.</div>}

        {/* Assignment table */}
        {kmlPolygons.length > 0 && (
          <div style={{marginTop: 6}}>
            <div style={{fontSize: 11, fontWeight: 600, color: "#6b7b6b", textTransform: "uppercase", marginBottom: 4}}>Assign boundaries to fields</div>
            <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(280px,1fr))", gap: 4}}>
              {kmlPolygons.map((poly, idx) => {
                const assignedId = assignments[idx];
                const af = assignedId ? fields.find(f => f.id === assignedId) : null;
                return (
                  <div key={idx} onMouseEnter={() => setHoverPoly(idx)} onMouseLeave={() => setHoverPoly(null)} style={{display: "flex", gap: 6, alignItems: "center", padding: "5px 10px", background: hoverPoly === idx ? "#f0f2ee" : "#f7f8f6", border: "none", borderRadius: 8, borderLeft: `3px solid ${af ? af.color : "#d4dace"}`}}>
                    <div style={{flex: "1 1 auto", minWidth: 0}}>
                      <div style={{fontSize: 12, fontWeight: 600, color: "#1a2e1a", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"}}>{poly.name}</div>
                      <div style={{fontSize: 10, color: "#94a394"}}>{poly.coords.length} pts</div>
                    </div>
                    <select value={assignedId || ""} onChange={e => assignPoly(idx, e.target.value)} style={{...SS, fontSize: 11, width: 130}}>
                      <option value="">— unassigned —</option>
                      {fields.map(f => <option key={f.id} value={f.id}>{f.name} ({f.ha}ha)</option>)}
                    </select>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Map + Weather + Drawing toolbar */}
      <div style={{background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, padding: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", marginBottom: 10}}>
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 6, marginBottom: 8}}>
          <div style={{fontSize: 12, fontWeight: 700, color: "#6b7b6b", textTransform: "uppercase"}}>Farm Map</div>
          <div style={{display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap"}}>
            {/* Map location search */}
            {!mapCenter && displayPolys.length === 0 && (
              <>
                <input value={mapSearch} onChange={e => setMapSearch(e.target.value)} onKeyDown={e => { if(e.key==="Enter") lookupMapLocation(); }} placeholder="Search postcode or place..." style={{...TI, width: 180, fontSize: 11}} />
                <button onClick={lookupMapLocation} style={{padding: "4px 12px", fontSize: 11, fontWeight: 600, background: "#4a7c59", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer"}}>Find Location</button>
              </>
            )}
            {mapCenter && <button onClick={() => setMapCenter(null)} style={{padding: "4px 12px", fontSize: 11, fontWeight: 600, background: "#f0f2ee", color: "#6b7b6b", border: "none", borderRadius: 6, cursor: "pointer"}}>Clear Location ×</button>}
            <button onClick={() => setShowWeather(w => !w)} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
              background: showWeather ? "#4a7c590a" : "#f0f2ee", color: showWeather ? "#4a7c59" : "#6b7b6b"}}>
              {showWeather ? "☁️ Weather On" : "☁️ Weather"}
            </button>
            <button onClick={() => setShowSatellite(s => !s)} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
              background: showSatellite ? "#1a2e1a" : "#f0f2ee", color: showSatellite ? "#fff" : "#6b7b6b"}}>
              {showSatellite ? "🛰 Satellite On" : "🛰 Satellite"}
            </button>
            <button onClick={() => setShowContours(c => !c)} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
              background: showContours ? "#8b5cf60a" : "#f0f2ee", color: showContours ? "#8b5cf6" : "#6b7b6b"}}>
              {showContours ? "◎ Contours On" : "◎ Contours"}
            </button>
            <button onClick={() => setShowCropOverlay(c => !c)} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
              background: showCropOverlay ? "#c17f240a" : "#f0f2ee", color: showCropOverlay ? "#c17f24" : "#6b7b6b"}}>
              {showCropOverlay ? "🌾 Crops On" : "🌾 Crops"}
            </button>
            <button onClick={() => setShowRiskMap(c => !c)} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", transition: "all 0.2s",
              background: showRiskMap ? "#c0392b12" : "#f0f2ee", color: showRiskMap ? "#c0392b" : "#6b7b6b"}}>
              {showRiskMap ? "⚠️ NVZ Risk On" : "⚠️ NVZ Risk"}
            </button>
            {/* Zoom controls */}
            <div style={{display: "flex", gap: 2, marginLeft: 4, padding: "4px 8px", background: "#f0f2ee", borderRadius: 8}}>
              <button onClick={() => setMapZoom(z => Math.max(0.3, z - 0.2))} style={{padding: "4px 8px", fontSize: 12, fontWeight: 700, borderRadius: 6, border: "none", cursor: "pointer", background: "#fff", color: "#6b7b6b", width: 28, height: 28}}>−</button>
              <button onClick={() => setMapZoom(1)} style={{padding: "2px 8px", fontSize: 10, fontWeight: 600, borderRadius: 6, border: "none", cursor: "pointer", background: "transparent", color: "#6b7b6b"}}>Reset</button>
              <button onClick={() => setMapZoom(z => Math.min(3, z + 0.2))} style={{padding: "4px 8px", fontSize: 12, fontWeight: 700, borderRadius: 6, border: "none", cursor: "pointer", background: "#fff", color: "#6b7b6b", width: 28, height: 28}}>+</button>
            </div>
            {/* Drawing tools */}
            {displayPolys.length > 0 && !drawMode && (
              <>
                <button onClick={() => setDrawMode("split")} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", background: "#8b5cf60a", color: "#8b5cf6", transition: "all 0.2s"}}>
                  ✂️ Split Field
                </button>
                <button onClick={() => setDrawMode("zone")} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", background: "#06b6d40a", color: "#06b6d4", transition: "all 0.2s"}}>
                  🌿 Env Zone
                </button>
              </>
            )}
            {drawMode && (
              <>
                <span style={{fontSize: 11, color: drawMode === "split" ? "#8b5cf6" : "#06b6d4", fontWeight: 600}}>
                  {drawMode === "split" ? "✂️ Drawing split" : "🌿 Drawing zone"} — click to place points inside a field boundary
                </span>
                {drawPoints.length >= 3 && <button onClick={finishDraw} style={{padding: "5px 12px", fontSize: 11, fontWeight: 600, borderRadius: 8, border: "none", cursor: "pointer", background: "#2c6e3f", color: "#fff"}}>Finish ({drawPoints.length} pts)</button>}
                <button onClick={() => { cancelDraw(); setDrawMode(false); }} style={{padding: "5px 12px", fontSize: 11, fontWeight: 500, borderRadius: 8, border: "none", cursor: "pointer", background: "#f0f2ee", color: "#c0392b"}}>Cancel</button>
                {drawPoints.length > 0 && <button onClick={() => setDrawPoints(p => p.slice(0,-1))} style={{padding: "5px 12px", fontSize: 11, fontWeight: 500, borderRadius: 8, border: "none", cursor: "pointer", background: "#f0f2ee", color: "#6b7b6b"}}>Undo</button>}
              </>
            )}
          </div>
        </div>

        {/* Map container */}
        <div style={{position: "relative", height: 480, borderRadius: 10, border: "1px solid #e2e6de", overflow: "hidden", background: showSatellite ? "#1a2e1a" : "#f0f4ed"}}>
          {/* Satellite/Contour tile layer */}
          {(showSatellite || showContours) && mapCtx && (() => {
            const {minLat, maxLat, minLng, maxLng} = mapCtx;
            const pad = 0.005;
            const bbox = `${(minLng-pad).toFixed(6)},${(minLat-pad).toFixed(6)},${(maxLng+pad).toFixed(6)},${(maxLat+pad).toFixed(6)}`;
            // Use WMS for satellite — ESRI World Imagery
            const satUrl = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/export?bbox=${bbox}&bboxSR=4326&imageSR=4326&size=1024,1024&format=png&f=image`;
            // Use OpenTopoMap tiles for contours — render a WMS-style request
            const topoUrl = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/export?bbox=${bbox}&bboxSR=4326&imageSR=4326&size=1024,1024&format=png&f=image&transparent=true`;
            return (
              <>
                {showSatellite && (
                  <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:0,background:"#2a4e2a",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <div style={{textAlign:"center",color:"#7a9e7a",fontSize:11,padding:"20px"}}>
                      <div style={{fontWeight:700,marginBottom:4}}>🛰 Terrain Map Active</div>
                      <div style={{fontSize:9,marginTop:4}}>Use zoom −/Reset/+ or external map services</div>
                    </div>
                  </div>
                )}
                {showContours && (
                  <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:showSatellite?1:0,opacity:0.5}} viewBox="0 0 100 100" preserveAspectRatio="none">
                    <defs>
                      <pattern id="contoursPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                        <path d="M 0 10 Q 10 6 20 10" stroke="#8b5cf6" fill="none" strokeWidth="0.5" opacity="0.4"/>
                      </pattern>
                    </defs>
                    <rect width="100" height="100" fill="url(#contoursPattern)"/>
                  </svg>
                )}
              </>
            );
          })()}
          {/* Weather radar layer */}
          {showWeather && (
            <iframe
              src={`https://www.meteoblue.com/en/weather/maps/widget?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&rain=1&rainRate=1&wind=0&windGust=0&pressure=0&thunderstorm=0&snowfall=0&temperatureMin=0&temperatureMax=0&snowHeight=0&visibility=0&fogProbability=0&feelsLikeTemperature=0&relativeHumidity=0&freezingLevel=0&dewPointTemperature=0&soilTemperature=0&soilMoisture=0&type=radar&lat=${weatherCenter[0].toFixed(4)}&lon=${weatherCenter[1].toFixed(4)}&zoom=10&autoplay=1`}
              style={{position: "absolute", top: 0, left: 0, width: "100%", height: "100%", border: "none", zIndex: 1, opacity: 0.55, pointerEvents: "none"}}
              loading="lazy" title="Weather Radar"
            />
          )}
          {/* SVG map on top */}
          <div style={{position: "relative", width: "100%", height: "100%", zIndex: 2}}>
            {displayPolys.length > 0 || mapCenter ? svgContent : (
              <div style={{display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "#d4dace", fontSize: 12, flexDirection: "column", gap: 8}}>
                <div>Upload a KML file or search for a location to draw field boundaries</div>
                {!mapCenter && <div style={{fontSize: 11, color: "#94a394"}}>Use the "Find Location" search above to center the map on a postcode or place name</div>}
              </div>
            )}
          </div>
        </div>

        {/* Drawing instructions */}
        {drawMode && (
          <div style={{marginTop: 8, padding: "8px 12px", background: drawMode === "split" ? "#8b5cf608" : "#06b6d408", borderRadius: 8, fontSize: 11, color: drawMode === "split" ? "#8b5cf6" : "#06b6d4"}}>
            <strong>Click to place points</strong> and draw a {drawMode === "split" ? "field split" : "zone"}. {displayPolys.length > 0 ? "Points near field edges will snap automatically (cyan dots)." : "Draw freely using the satellite background as reference. Toggle satellite imagery with the 🛰 button."} Place at least 3 points, then click <strong>Finish</strong> to complete.
          </div>
        )}

        {/* Legend */}
        {fields.some(f => f.bounds) && !drawMode && (
          <div style={{display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8}}>
            {fields.filter(f => f.bounds).map(f => {
              const fc = fieldCosts(f.id);
              const rev = (f.ha || 0) * (f.yieldT || 0) * (f.grainPrice || 0);
              const margin = rev - fc.total * (f.ha || 0);
              return (
                <div key={f.id} style={{display: "flex", alignItems: "center", gap: 4, padding: "3px 10px", background: "#f7f8f6", borderRadius: 8, borderLeft: `3px solid ${f.color}`}}>
                  <span style={{fontSize: 12, fontWeight: 600, color: "#1a2e1a"}}>{f.name}</span>
                  <span style={{fontSize: 11, color: "#6b7b6b"}}>{f.ha}ha</span>
                  {rev > 0 && <span style={{fontSize: 11, fontWeight: 600, color: margin >= 0 ? "#2c6e3f" : "#a63d2b"}}>{"£"}{margin.toLocaleString()}</span>}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Zones / Splits panel */}
      {zones.length > 0 && (
        <div style={{background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, padding: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", marginBottom: 10}}>
          <div style={{fontSize: 12, fontWeight: 700, color: "#6b7b6b", textTransform: "uppercase", marginBottom: 6}}>Drawn Areas ({zones.length})</div>
          <div style={{display: "grid", gap: 4}}>
            {zones.map(z => {
              const parent = z.parentField ? fields.find(f => f.id === z.parentField) : null;
              return (
                <div key={z.id} style={{display: "flex", gap: 8, alignItems: "center", padding: "6px 10px", background: "#f7f8f6", borderRadius: 8, borderLeft: `3px solid ${z.color}`}}>
                  <div style={{flex: "1 1 auto"}}>
                    <div style={{display: "flex", gap: 6, alignItems: "center"}}>
                      <input value={z.name} onChange={e => updateZone(z.id, "name", e.target.value)} style={{...TI, width: 180, fontSize: 12, fontWeight: 600}} />
                      <span style={{fontSize: 11, padding: "2px 8px", borderRadius: 6, background: z.type === "split" ? "#8b5cf60a" : "#06b6d40a", color: z.type === "split" ? "#8b5cf6" : "#06b6d4", fontWeight: 600}}>
                        {z.type === "split" ? "Split" : "Env Zone"}
                      </span>
                      <span style={{fontSize: 12, fontWeight: 700, color: z.color}}>{z.ha} ha</span>
                      {parent && <span style={{fontSize: 10, color: "#94a394"}}>in {parent.name}</span>}
                    </div>
                    {z.type === "zone" && (
                      <select value={z.envType || ""} onChange={e => updateZone(z.id, "envType", e.target.value)} style={{...SS, fontSize: 11, marginTop: 4, width: 200}}>
                        <option value="">Select scheme...</option>
                        <option value="buffer">Buffer strip (BN5/SW1)</option>
                        <option value="flower">Flower-rich margin (AB8)</option>
                        <option value="nectar">Nectar flower mix (AB1)</option>
                        <option value="pollen">Pollen & nectar (AB16)</option>
                        <option value="wild_bird">Wild bird seed (AB9)</option>
                        <option value="beetle_bank">Beetle bank</option>
                        <option value="grass_margin">Grass margin (SW7)</option>
                        <option value="cover_crop">Cover crop</option>
                        <option value="other">Other</option>
                      </select>
                    )}
                  </div>
                  <button onClick={() => removeZone(z.id)} style={{padding: "4px 10px", fontSize: 11, background: "none", color: "#c0392b55", border: "none", cursor: "pointer"}}>{"×"}</button>
                </div>
              );
            })}
          </div>
          <div style={{fontSize: 10, color: "#94a394", marginTop: 6}}>Total drawn area: {zones.reduce((s,z) => s + z.ha, 0).toFixed(2)} ha. Environmental zones will be excluded from cropped area calculations.</div>
        </div>
      )}

      {/* Weather panel */}
      {showWeather && (
        <div style={{background: "#ffffff", border: "1px solid #e2e6de", borderRadius: 10, padding: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", marginBottom: 10}}>
          <div style={{fontSize: 12, fontWeight: 700, color: "#6b7b6b", textTransform: "uppercase", marginBottom: 6}}>Weather Radar</div>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"#6b7b6b"}}>Postcode:</span>
            <input value={weatherPostcode} onChange={e => setWeatherPostcode(e.target.value.toUpperCase())}
              onKeyDown={e => { if(e.key==="Enter") lookupPostcode(); }}
              placeholder="e.g. DL2 1NB" style={{...TI,width:110,fontSize:12}} />
            <button onClick={lookupPostcode} style={{padding:"4px 12px",fontSize:11,fontWeight:600,background:"#2c6e3f",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>Set location</button>
            {weatherLL && <span style={{fontSize:10,color:"#2c6e3f"}}>Centred on {weatherLL.lat.toFixed(3)}, {weatherLL.lng.toFixed(3)}</span>}
            {!weatherLL && mapCtx && <span style={{fontSize:10,color:"#94a394"}}>Using KML centre</span>}
            {!weatherLL && !mapCtx && <span style={{fontSize:10,color:"#c17f24"}}>Enter postcode to locate radar</span>}
          </div>
          <div style={{borderRadius: 10, overflow: "hidden", border: "1px solid #e2e6de", height: 450}}>
            <iframe
              src={`https://www.meteoblue.com/en/weather/maps/widget?windAnimation=0&gust=0&satellite=0&cloudsAndPrecipitation=1&temperature=0&sunshine=0&rain=1&rainRate=1&wind=0&windGust=0&pressure=0&thunderstorm=0&snowfall=0&temperatureMin=0&temperatureMax=0&snowHeight=0&visibility=0&fogProbability=0&feelsLikeTemperature=0&relativeHumidity=0&freezingLevel=0&dewPointTemperature=0&soilTemperature=0&soilMoisture=0&type=radar&lat=${weatherCenter[0].toFixed(4)}&lon=${weatherCenter[1].toFixed(4)}&zoom=9&autoplay=1`}
              style={{width: "100%", height: "100%", border: "none"}}
              loading="lazy" title="Weather Radar Full"
            />
          </div>
          <div style={{fontSize: 10, color: "#94a394", marginTop: 4}}>Rain radar centred on farm location. Powered by Meteoblue. Click and drag within the radar to explore.</div>
        </div>
      )}

      {/* Analysis sections with sub-nav */}
      {fields.length > 0 && (
        <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
          <div style={{display:"flex",gap:3,marginBottom:8,flexWrap:"wrap"}}>
            {[{id:"soil",label:"🧪 Soil Analysis"},{id:"tissue",label:"🌿 Tissue Tests"},{id:"grain",label:"🌾 Grain Analysis"},{id:"nue",label:"📊 NUE Calculator"},{id:"csv",label:"📁 Upload Lab CSV"},{id:"plan",label:"📋 Soil Management"},{id:"riskmap",label:"⚠️ NVZ Risk Map"}].map(s => (
              <button key={s.id} onClick={()=>setAnalysisSection(s.id)} style={{padding:"5px 12px",fontSize:10,fontWeight:600,borderRadius:6,border:"none",cursor:"pointer",background:analysisSection===s.id?"#2c6e3f":"#f0f2ee",color:analysisSection===s.id?"#fff":"#6b7b6b"}}>{s.label}</button>
            ))}
          </div>

          {/* ── SOIL ANALYSIS ── */}
          {analysisSection === "soil" && (
            <div>
              <div style={{fontSize:11,color:"#94a394",marginBottom:6}}>Enter lab results (mg/L for P, K, Mg). Indices calculated automatically per RB209.</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                    {["Field","P mg/L","P Idx","K mg/L","K Idx","Mg mg/L","Mg Idx","pH","OM%","Sampled"].map(h => (
                      <th key={h} style={{padding:"5px 6px",textAlign:h==="Field"?"left":"center",color:"#6b7b6b",fontWeight:600,fontSize:10}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {fields.map(f => {
                      const s = f.soil||{};
                      const pI=getSoilIdx("P",+s.pMg), kI=getSoilIdx("K",+s.kMg), mgI=getSoilIdx("Mg",+s.mgMg);
                      return (
                        <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                          <td style={{padding:"4px 6px",borderLeft:`3px solid ${f.color}`,fontWeight:600,whiteSpace:"nowrap"}}>{f.name}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><NumInput value={s.pMg} onChange={v=>uSoil(f.id,"pMg",v)} w={45} /></td>
                          <td style={{textAlign:"center"}}>{pI?<span style={{color:pI.color,fontWeight:700,fontSize:11}}>{pI.label}</span>:<span style={{color:"#d4dace"}}>—</span>}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><NumInput value={s.kMg} onChange={v=>uSoil(f.id,"kMg",v)} w={45} /></td>
                          <td style={{textAlign:"center"}}>{kI?<span style={{color:kI.color,fontWeight:700,fontSize:11}}>{kI.label}</span>:<span style={{color:"#d4dace"}}>—</span>}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><NumInput value={s.mgMg} onChange={v=>uSoil(f.id,"mgMg",v)} w={45} /></td>
                          <td style={{textAlign:"center"}}>{mgI?<span style={{color:mgI.color,fontWeight:700,fontSize:11}}>{mgI.label}</span>:<span style={{color:"#d4dace"}}>—</span>}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><NumInput value={s.pH} onChange={v=>uSoil(f.id,"pH",v)} w={40} />{s.pH?<div style={{fontSize:10,color:phColor(+s.pH)}}>{phLabel(+s.pH)}</div>:null}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><NumInput value={s.om} onChange={v=>uSoil(f.id,"om",v)} w={40} />{+s.om>0&&<div style={{fontSize:10,color:+s.om<3?"#c0392b":+s.om<5?"#c17f24":"#2c6e3f"}}>{+s.om<3?"Low":+s.om<5?"Med":"High"}</div>}</td>
                          <td style={{textAlign:"center",padding:"3px 4px"}}><input type="date" value={s.sampleDate||""} onChange={e=>uSoil(f.id,"sampleDate",e.target.value)} style={{...TI,fontSize:10,width:100,padding:"2px 3px"}} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:9,color:"#94a394",marginTop:6}}>RB209 9th ed. P: 0={"<"}9, 1=10-15, 2=16-25, 3=26-45 | K: 0={"<"}60, 1=61-120, 2−=121-180, 2+=181-240 | Mg: 0={"<"}25, 1=26-50, 2=51-100 mg/L</div>
            </div>
          )}

          {/* ── TISSUE TEST RESULTS ── */}
          {analysisSection === "tissue" && (
            <div>
              <div style={{fontSize:11,color:"#94a394",marginBottom:6}}>Tissue / leaf test results. Values as % dry matter (N, P, K, S, Mg) or ppm (Mn, Zn, Cu). Critical thresholds shown.</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                    {["Field","GS","N %","P %","K %","S %","Mg %","Mn ppm","Zn ppm","Cu ppm","Sampled"].map(h => (
                      <th key={h} style={{padding:"4px 5px",textAlign:h==="Field"?"left":"center",color:"#6b7b6b",fontWeight:600,fontSize:10}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {fields.map(f => {
                      const t = f.tissue||{};
                      const nOk = +t.nPc >= 3.5, pOk = +t.pPc >= 0.3, kOk = +t.kPc >= 2.5, sOk = +t.sPc >= 0.3, mgOk = +t.mgPc >= 0.15;
                      const mnOk = +t.mnPpm >= 25, znOk = +t.znPpm >= 15, cuOk = +t.cuPpm >= 5;
                      const cellC = (v,ok) => v ? {color:ok?"#2c6e3f":"#c0392b",fontWeight:700} : {};
                      return (
                        <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                          <td style={{padding:"3px 5px",borderLeft:`3px solid ${f.color}`,fontWeight:600,whiteSpace:"nowrap"}}>{f.name}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><input value={t.gs||""} onChange={e=>uTissue(f.id,"gs",e.target.value)} placeholder="GS" style={{...TI,fontSize:10,width:40,padding:"2px 3px",textAlign:"center"}} /></td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.nPc} onChange={v=>uTissue(f.id,"nPc",v)} w={40} />{t.nPc&&<div style={{fontSize:8,...cellC(t.nPc,nOk)}}>{nOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.pPc} onChange={v=>uTissue(f.id,"pPc",v)} w={40} />{t.pPc&&<div style={{fontSize:8,...cellC(t.pPc,pOk)}}>{pOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.kPc} onChange={v=>uTissue(f.id,"kPc",v)} w={40} />{t.kPc&&<div style={{fontSize:8,...cellC(t.kPc,kOk)}}>{kOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.sPc} onChange={v=>uTissue(f.id,"sPc",v)} w={40} />{t.sPc&&<div style={{fontSize:8,...cellC(t.sPc,sOk)}}>{sOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.mgPc} onChange={v=>uTissue(f.id,"mgPc",v)} w={40} />{t.mgPc&&<div style={{fontSize:8,...cellC(t.mgPc,mgOk)}}>{mgOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.mnPpm} onChange={v=>uTissue(f.id,"mnPpm",v)} w={40} />{t.mnPpm&&<div style={{fontSize:8,...cellC(t.mnPpm,mnOk)}}>{mnOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.znPpm} onChange={v=>uTissue(f.id,"znPpm",v)} w={40} />{t.znPpm&&<div style={{fontSize:8,...cellC(t.znPpm,znOk)}}>{znOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={t.cuPpm} onChange={v=>uTissue(f.id,"cuPpm",v)} w={40} />{t.cuPpm&&<div style={{fontSize:8,...cellC(t.cuPpm,cuOk)}}>{cuOk?"✓":"↓"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><input type="date" value={t.sampleDate||""} onChange={e=>uTissue(f.id,"sampleDate",e.target.value)} style={{...TI,fontSize:10,width:100,padding:"2px 3px"}} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:9,color:"#94a394",marginTop:6}}>Critical thresholds (wheat GS30-39): N≥3.5%, P≥0.3%, K≥2.5%, S≥0.3%, Mg≥0.15%, Mn≥25ppm, Zn≥15ppm, Cu≥5ppm. ✓=adequate, ↓=deficient.</div>
            </div>
          )}

          {/* ── GRAIN ANALYSIS ── */}
          {analysisSection === "grain" && (
            <div>
              <div style={{fontSize:11,color:"#94a394",marginBottom:6}}>Grain quality analysis results from lab or merchant. Used for NUE calculation and market compliance.</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                  <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                    {["Field","N %","Protein %","Moisture %","Sp Wt kg/hl","Hagberg","Screen %","Sampled"].map(h => (
                      <th key={h} style={{padding:"4px 5px",textAlign:h==="Field"?"left":"center",color:"#6b7b6b",fontWeight:600,fontSize:10}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {fields.map(f => {
                      const g = f.grain||{};
                      return (
                        <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                          <td style={{padding:"3px 5px",borderLeft:`3px solid ${f.color}`,fontWeight:600,whiteSpace:"nowrap"}}>{f.name}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.nPc} onChange={v=>uGrain(f.id,"nPc",v)} w={40} /></td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.protein} onChange={v=>uGrain(f.id,"protein",v)} w={45} />{g.protein&&<div style={{fontSize:8,color:+g.protein>=13?"#2c6e3f":+g.protein>=11.5?"#c17f24":"#c0392b"}}>{+g.protein>=13?"Group 1":"Feed"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.moisture} onChange={v=>uGrain(f.id,"moisture",v)} w={40} />{g.moisture&&<div style={{fontSize:8,color:+g.moisture<=15?"#2c6e3f":"#c0392b"}}>{+g.moisture<=15?"✓":"Dry!"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.sp} onChange={v=>uGrain(f.id,"sp",v)} w={45} /></td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.hagberg} onChange={v=>uGrain(f.id,"hagberg",v)} w={45} />{g.hagberg&&<div style={{fontSize:8,color:+g.hagberg>=250?"#2c6e3f":"#c0392b"}}>{+g.hagberg>=250?"✓":"Low"}</div>}</td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><NumInput value={g.screenings} onChange={v=>uGrain(f.id,"screenings",v)} w={40} /></td>
                          <td style={{textAlign:"center",padding:"2px 3px"}}><input type="date" value={g.sampleDate||""} onChange={e=>uGrain(f.id,"sampleDate",e.target.value)} style={{...TI,fontSize:10,width:100,padding:"2px 3px"}} /></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:9,color:"#94a394",marginTop:6}}>Protein: Group 1 milling ≥13%, Group 2 ≥11.5%, feed {"<"}11.5%. Moisture: dry ≤15%. Hagberg: bread ≥250s.</div>
            </div>
          )}

          {/* ── NUE CALCULATOR ── */}
          {analysisSection === "nue" && (
            <div>
              <div style={{fontSize:11,color:"#94a394",marginBottom:8}}>Nitrogen Use Efficiency — N offtake in grain ÷ total N applied. Target 60-80% for efficient systems. {"<"}50% indicates losses; {">"}80% may indicate under-fertilisation.</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead><tr style={{borderBottom:"2px solid #e2e6de"}}>
                    {["Field","Crop","Yield t/ha","Grain N %","N Offtake kg/ha","N Applied kg/ha","NUE %","Rating"].map(h => (
                      <th key={h} style={{padding:"5px 6px",textAlign:h==="Field"||h==="Crop"||h==="Rating"?"left":"center",color:"#6b7b6b",fontWeight:600,fontSize:10}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {fields.map(f => {
                      const g = f.grain||{};
                      const cr = CROPS.find(c=>c.id===f.crop);
                      // Grain N%: from grain analysis or estimate from protein (protein/5.7)
                      const grainN = +g.nPc || (+g.protein ? +g.protein/5.7 : 0);
                      // N offtake = yield * grain N% * 10 (convert % to kg/t then * yield)
                      const nOfftake = (f.yieldT||0) * grainN * 10;
                      // N applied: sum from fertiliser programme + organic manures
                      const nApplied = f._nApplied || 0; // will be populated from fert data
                      // For manual override
                      const nApp = +f._nManual || nApplied;
                      const nue = nApp > 0 ? (nOfftake / nApp * 100) : 0;
                      const rating = nue >= 80 ? "Excellent" : nue >= 60 ? "Good" : nue >= 50 ? "Moderate" : nue > 0 ? "Poor" : "—";
                      const rColor = nue >= 80 ? "#2c6e3f" : nue >= 60 ? "#4a7c59" : nue >= 50 ? "#c17f24" : nue > 0 ? "#c0392b" : "#d4dace";
                      return (
                        <tr key={f.id} style={{borderBottom:"1px solid #f0f2ee"}}>
                          <td style={{padding:"4px 6px",borderLeft:`3px solid ${f.color}`,fontWeight:600}}>{f.name}</td>
                          <td style={{padding:"4px 6px",fontSize:10}}>{cr?.label||""}</td>
                          <td style={{textAlign:"center",padding:"4px 6px"}}>{f.yieldT||"—"}</td>
                          <td style={{textAlign:"center",padding:"4px 6px"}}>{grainN?grainN.toFixed(2):"—"}{!g.nPc&&g.protein&&<div style={{fontSize:8,color:"#94a394"}}>from protein</div>}</td>
                          <td style={{textAlign:"center",padding:"4px 6px",fontWeight:700,color:nOfftake>0?"#2c6e3f":"#d4dace"}}>{nOfftake>0?nOfftake.toFixed(0):"—"}</td>
                          <td style={{textAlign:"center",padding:"4px 6px"}}><NumInput value={f._nManual||0} onChange={v=>setFields(p=>p.map(x=>x.id===f.id?{...x,_nManual:v}:x))} w={55} ph="kg N/ha" /></td>
                          <td style={{textAlign:"center",padding:"4px 6px",fontWeight:800,fontSize:14,color:rColor}}>{nue>0?nue.toFixed(0)+"%":"—"}</td>
                          <td style={{padding:"4px 6px",color:rColor,fontWeight:600,fontSize:10}}>{rating}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              <div style={{fontSize:9,color:"#94a394",marginTop:6}}>NUE = (Yield × Grain N% × 10) ÷ Total N applied × 100. Enter total N applied per field (manufactured + organic). Grain N% taken from grain analysis or estimated from protein ÷ 5.7.</div>
            </div>
          )}

          {/* ── UPLOAD LAB CSV ── */}
          {analysisSection === "csv" && (
            <div>
              <div style={{fontSize:11,color:"#94a394",marginBottom:8}}>Upload CSV files directly from Lancrop, NRM, or other labs. The parser auto-detects column headers and matches to your fields by name. Unmatched samples can be manually assigned.</div>
              <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                <label style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:"#4a7c590a",color:"#4a7c59",border:"1px solid #4a7c5922",borderRadius:8,cursor:"pointer"}}>
                  📁 Upload Soil Analysis CSV
                  <input type="file" accept=".csv,.tsv,.txt" onChange={e => handleLabCSV(e,"soil")} style={{display:"none"}} />
                </label>
                <label style={{padding:"6px 14px",fontSize:11,fontWeight:600,background:"#3a8a6e0a",color:"#3a8a6e",border:"1px solid #3a8a6e22",borderRadius:8,cursor:"pointer"}}>
                  📁 Upload Tissue Test CSV
                  <input type="file" accept=".csv,.tsv,.txt" onChange={e => handleLabCSV(e,"tissue")} style={{display:"none"}} />
                </label>

const BudgetBar = ({items, height, maxVal}) => {
  if (!items.length || maxVal <= 0) return null;
  const barW = 100 / items.length;
  return (
    <svg viewBox={`0 0 ${items.length * 60} ${height}`} style={{width: "100%", height: height, display: "block"}}>
      {items.map((it, i) => {
        const h = Math.max(1, (Math.abs(it.val) / maxVal) * (height - 24));
        const y = it.val >= 0 ? height - 16 - h : height - 16;
        return (
          <g key={i}>
            <rect x={i * 60 + 8} y={y} width={44} height={h} rx={4} fill={it.color} opacity={0.75} />
            <text x={i * 60 + 30} y={height - 2} textAnchor="middle" fontSize={9} fill="#6b7b6b" fontFamily="DM Sans">{it.label.length > 8 ? it.label.slice(0,7) + "…" : it.label}</text>
            <text x={i * 60 + 30} y={y - 3} textAnchor="middle" fontSize={9} fontWeight="700" fill={it.color} fontFamily="DM Sans">{"£"}{Math.abs(it.val) >= 1000 ? (Math.abs(it.val)/1000).toFixed(0)+"k" : Math.abs(it.val).toFixed(0)}</text>
          </g>
        );
      })}
    </svg>
  );

const BudgetTracker = ({fields, setFields, budgets, progState, onSave}) => {
  const fieldCosts = (fId) => {
    const cp = budgets.cp?.fieldIds?.includes(fId) ? (budgets.cp.costHa||0) : 0;
    const hb = budgets.herb?.fieldIds?.includes(fId) ? (budgets.herb.costHa||0) : 0;
    const fe = budgets.fert?.fieldIds?.includes(fId) ? (budgets.fert.costHa||0) : 0;
    const op = budgets.ops?.fieldIds?.includes(fId) ? (budgets.ops.costHa||0) : 0;
    return {cp, herb: hb, fert: fe, ops: op, total: cp + hb + fe + op};
  };
  const uf = (id,f,v) => setFields(p => p.map(x => x.id===id?{...x,[f]:v}:x));

  const totalHa = fields.reduce((s,f) => s+(f.ha||0), 0);
  let farmGross = 0, farmCosts = 0, farmStraw = 0, farmSfi = 0;
  const fieldData = fields.map(f => {
    const fc = fieldCosts(f.id);
    const rev = (f.ha||0) * (f.yieldT||0) * (f.grainPrice||0);
    const cost = fc.total * (f.ha||0);
    const strawRev = (f.strawYield||0) * (f.strawPrice||0) * (f.ha||0);
    const sfiRev = (f.sfiPayments||[]).reduce((s,p) => s + (p.ha||0) * (p.rate||0), 0);
    const totalIncome = rev + strawRev + sfiRev;
    const margin = totalIncome - cost;
    farmGross += rev; farmCosts += cost; farmStraw += strawRev; farmSfi += sfiRev;
    return {...f, fc, rev, cost, strawRev, sfiRev, totalIncome, margin};
  });
  const farmTotalIncome = farmGross + farmStraw + farmSfi;
  const farmMargin = farmTotalIncome - farmCosts;
  const catTotals = {
    cp: fieldData.reduce((s,f) => s + f.fc.cp * (f.ha||0), 0),
    herb: fieldData.reduce((s,f) => s + f.fc.herb * (f.ha||0), 0),
    fert: fieldData.reduce((s,f) => s + f.fc.fert * (f.ha||0), 0),

  const rmInv = id => setInvoices(prev => prev.filter(i=>i.id!==id));
  const uif = (id,f,v) => setInvoices(prev => prev.map(i=>i.id===id?{...i,[f]:v}:i));

  const handleInvPdf = (invId, e) => {
    const file = e.target.files?.[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => uif(invId, "pdfFile", ev.target.result);
    uif(invId, "pdfName", file.name);
    reader.readAsDataURL(file);
  };

  // Filter + sort invoices
  const filteredInv = invoices.filter(inv => {
    if (invCatFilter !== "all" && inv.category !== invCatFilter) return false;
    if (invStatusFilter !== "all" && inv.status !== invStatusFilter) return false;
    if (invSearch) {
      const q = invSearch.toLowerCase();
      return (inv.supplier||"").toLowerCase().includes(q) || (inv.description||"").toLowerCase().includes(q) || (inv.ref||"").toLowerCase().includes(q) || (inv.pdfName||"").toLowerCase().includes(q);
    }
    return true;
  }).sort((a,b) => {
    if (invSort === "date_desc") return b.date.localeCompare(a.date);
    if (invSort === "date_asc") return a.date.localeCompare(b.date);
    if (invSort === "amount_desc") return (b.amount||0) - (a.amount||0);
    if (invSort === "amount_asc") return (a.amount||0) - (b.amount||0);
    if (invSort === "supplier") return (a.supplier||"").localeCompare(b.supplier||"");
    return 0;
  });

  const invTotalByCategory = INV_CATS.map(cat => ({
    ...cat,
    total: invoices.filter(i=>i.category===cat.id).reduce((s,i)=>s+(+i.amount||0),0),
    count: invoices.filter(i=>i.category===cat.id).length,
  })).filter(c=>c.count>0);

  // ─── Sales ledger ───
  const livestockSales = (progState?.livestock?.herds||[]).filter(h=>h.count>0);

  return (
    <div>
      {/* Section navigation */}
      <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        {SECTIONS.map(s => (
          <button key={s.id} onClick={()=>setSection(s.id)} style={{padding:"6px 14px",fontSize:11,fontWeight:600,borderRadius:8,border:"none",cursor:"pointer",transition:"all 0.2s",background:section===s.id?"#2c6e3f":"#f0f2ee",color:section===s.id?"#fff":"#6b7b6b"}}>{s.label}</button>
        ))}
      </div>

      {/* ══════ DASHBOARD ══════ */}
      {section === "dashboard" && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginBottom:12}}>
            {[
              {label:"Grain Revenue",val:farmGross,color:"#2c6e3f",icon:"🌾"},
              {label:"Straw Sales",val:farmStraw,color:"#b8922a",icon:"🪵"},
              {label:"SFI / Env Payments",val:farmSfi,color:"#4a7c59",icon:"🌿"},
              {label:"Total Income",val:farmTotalIncome,color:"#1a6b3a",icon:"💰"},
              {label:"Total Costs",val:farmCosts,color:"#c0392b",icon:"📉"},
              {label:"Net Margin",val:farmMargin,color:farmMargin>=0?"#2c6e3f":"#c0392b",icon:farmMargin>=0?"📈":"⚠️"},
            ].map(c => (
              <div key={c.label} style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:"10px 14px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                <div style={{fontSize:11,color:"#6b7b6b",marginBottom:4}}>{c.icon} {c.label}</div>
                <div style={{fontSize:20,fontWeight:700,color:c.color}}>{"£"}{c.val.toLocaleString()}</div>
                {totalHa > 0 && <div style={{fontSize:11,color:"#94a394"}}>{"£"}{(c.val/totalHa).toFixed(0)}/ha</div>}
              </div>
            ))}
          </div>
          {/* Cost breakdown */}
          {farmCosts > 0 && (
            <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Programme Cost Breakdown</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
                {[
                  {label:"Fungicides",val:catTotals.cp,color:"#c17f24"},
                  {label:"Herbicides",val:catTotals.herb,color:"#3a8a6e"},
                  {label:"Fertiliser",val:catTotals.fert,color:"#4a7c59"},
                  {label:"Operations",val:catTotals.ops,color:"#b8922a"},
                ].filter(c => c.val > 0).map(c => {
                  const pct = farmCosts > 0 ? (c.val / farmCosts * 100).toFixed(0) : 0;
                  return (
                    <div key={c.label} style={{flex:"1 1 120px",background:"#f7f8f6",borderRadius:8,padding:"8px 12px",borderLeft:`3px solid ${c.color}`}}>
                      <div style={{fontSize:11,color:"#6b7b6b"}}>{c.label}</div>
                      <div style={{fontSize:16,fontWeight:700,color:c.color}}>{"£"}{c.val.toLocaleString()}</div>
                      <div style={{fontSize:11,color:"#94a394"}}>{pct}%</div>
                      <div style={{height:4,background:"#e2e6de",borderRadius:2,marginTop:4}}><div style={{height:4,background:c.color,borderRadius:2,width:`${pct}%`}} /></div>
                    </div>
                  );
                })}
              </div>
              <BudgetBar items={[{label:"Fung",val:catTotals.cp,color:"#c17f24"},{label:"Herb",val:catTotals.herb,color:"#3a8a6e"},{label:"Fert",val:catTotals.fert,color:"#4a7c59"},{label:"Ops",val:catTotals.ops,color:"#b8922a"}].filter(c=>c.val>0)} height={140} maxVal={Math.max(catTotals.cp,catTotals.herb,catTotals.fert,catTotals.ops)} />
            </div>
          )}
          {/* Invoice spending by category */}
          {invoices.length > 0 && (
            <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#6b7b6b",textTransform:"uppercase",marginBottom:8}}>Invoice Spending by Category</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {invTotalByCategory.map(c => (
                  <div key={c.id} style={{flex:"1 1 120px",background:"#f7f8f6",borderRadius:8,padding:"6px 10px",borderLeft:`3px solid ${c.color}`}}>
                    <div style={{fontSize:10,color:"#6b7b6b"}}>{c.icon} {c.label}</div>
                    <div style={{fontSize:14,fontWeight:700,color:c.color}}>{"£"}{c.total.toLocaleString()}</div>
                    <div style={{fontSize:10,color:"#94a394"}}>{c.count} invoice{c.count>1?"s":""}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Profit by Field chart */}
          {fieldData.some(f => f.rev > 0) && (
            <div style={{background:"#fff",border:"1px solid #e2e6de",borderRadius:10,padding:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",marginBottom:12}}>
